    request.PromoteAppVersionRequest:
      description: Request body for promoting an application version to a target stage.
      required:
      - target_stage
      properties:
        target_stage:
          type: string
          description: The target stage to which the application version should be
            promoted.
        promotion_type:
          $ref: '#/components/schemas/request.PromoteOperation'
          description: 'The type of promotion to perform:

            - `copy`: Copies the application version to the target stage, preserving
            the source artifacts. This is the default. **Note:** No physical copy
            occurs if the source and target repositories are identical.

            - `move`: Moves the application version to the target stage, transferring
            the source.

            - `dry_run`: Simulates the promotion without actually performing it.

            '
        included_repository_keys:
          items:
            type: string
          type: array
          description: 'Defines specific repositories to include in the promotion.

            If this property is left undefined, all repositories (except those specifically
            excluded) are included in the promotion.

            **Important:** If one or more repositories are specifically included,
            all other repositories are excluded (regardless of what is defined in
            `excluded_repository_keys`).

            '
        excluded_repository_keys:
          items:
            type: string
          type: array
          description: Defines specific repositories to exclude from the promotion.
        artifact_additional_properties:
          items:
            $ref: '#/components/schemas/request.ArtifactAdditionalProperty'
          type: array
          description: 'Key-value pairs that define properties to add to each promoted
            artifact on top of any existing properties.

            **Note:** If a property with the same key already exists on the artifact,
            the value defined in `artifact_additional_properties` will override the
            previous value.

            '
        overwrite_strategy:
          type: string
          default: latest
          description: 'Defines the overwrite policy for handling write-protected
            artifacts that already exist in the target repository during promotion.
            This is primarily relevant for Docker image promotions where mutable tags
            (such as `:latest`) may already point to a protected artifact in the target
            stage.

            - `latest` (default): Overwrite is permitted only if the conflicting artifact''s
            tag is exactly `latest`.

            - `all`: Overwrite is permitted for any conflicting artifact in the target,
            regardless of the tag name.

            - `disabled`: No overwrite is permitted. The promotion fails with a `409
            Conflict` if a write-protected artifact exists at the target path.

            '
          enum:
          - latest
          - all
          - disabled
        promotion_authorization_type:
          type: string
      type: object
    request.PromoteOperation:
      description: 'The type of promotion to perform:

        - `copy`: Copies the application version to the target stage, preserving the
        source artifacts. This is the default. **Note:** No physical copy occurs if
        the source and target repositories are identical.

        - `move`: Moves the application version to the target stage, transferring
        the source.

        - `dry_run`: Simulates the promotion without actually performing it.

        '
      enum:
      - move
      - copy
      - keep
      - dry_run
      type: string
      x-enum-varnames:
      - PromoteOperationMove
      - PromoteOperationCopy
      - PromoteOperationKeep
      - PromoteOperationDryRun
    request.ReleaseApplicationVersionRequest:
      description: Request body for releasing an application version to the PROD stage.
      properties:
        promotion_type:
          $ref: '#/components/schemas/request.PromoteOperation'
          description: 'The type of release to perform:

            - `copy`: Copies the application version to the target stage, preserving
            the source artifacts. This is the default. **Note:** No physical copy
            occurs if the source and target repositories are identical.

            - `move`: Moves the application version to the target stage, transferring
            the source.

            - `dry_run`: Simulates the release without actually performing it.

            '
        included_repository_keys:
          items:
            type: string
          type: array
          description: Use this option to include only the specified repository keys
            in the promotion.
        excluded_repository_keys:
          items:
            type: string
          type: array
          description: Use this option to exclude the specified repository keys from
            the promotion.
        artifact_additional_properties:
          items:
            $ref: '#/components/schemas/request.ArtifactAdditionalProperty'
          type: array
          description: 'Key-value pairs that define properties to add to each promoted
            artifact on top of any existing properties.

            **Note:** If a property with the same key already exists on the artifact,
            the value defined in `artifact_additional_properties` will override the
            previous value.

            '
        overwrite_strategy:
          type: string
          default: latest
          description: 'Defines the overwrite policy for handling write-protected
            artifacts that already exist in the target repository during release.
            This is primarily relevant for Docker image releases where mutable tags
            (such as `:latest`) may already point to a protected artifact in the PROD
            stage.

            - `latest` (default): Overwrite is permitted only if the conflicting artifact''s
            tag is exactly `latest`.

            - `all`: Overwrite is permitted for any conflicting artifact in the target,
            regardless of the tag name.

            - `disabled`: No overwrite is permitted. The release fails with a `409
            Conflict` if a write-protected artifact exists at the target path.

            '
          enum:
          - latest
          - all
          - disabled
        promotion_authorization_type:
          type: string
      type: object
    request.RollbackAppVersionRequest:
      description: Request body for rolling back an application version promotion.
      required:
