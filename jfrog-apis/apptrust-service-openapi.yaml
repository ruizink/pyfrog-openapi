    request.UpdateAppVersionRequest:
      description: Request body for updating an application version's tag and/or properties.
      properties:
        tag:
          type: string
          description: 'The new tag to associate with the application version. Max
            length 128 characters. The tag is commonly used to represent the Git branch.

            If an empty string (`""`) is provided, the existing tag will be removed.
            If the field is omitted, the tag remains unchanged.

            The tag must adhere to defined format rules (alphanumeric start/end, with
            dashes, underscores, dots).

            '
        properties:
          additionalProperties:
            items:
              type: string
            type: array
          type: object
          description: 'An object where each key is a property name (string) and its
            value is an array of strings representing the values for that property.

            Providing a key with an array of strings replaces any existing values
            for that specific key.

            Providing a key with an empty array (`[]`) clears all values for that
            key, but the key itself remains. Property keys not included in this object
            are not affected.

            '
        delete_properties:
          items:
            type: string
          type: array
          description: A list of property keys (strings) to completely remove from
            the application version. These keys and their associated values will be
            deleted.
        add_sources:
          $ref: '#/components/schemas/request.CreateAppVersionSources'
          description: 'Additional sources to add to the existing application version.
            Uses the same format as the `sources` field in the Create Application
            Version request. Sources can include artifacts, packages, builds, Release
            Bundles, and other application versions.

            '
        async:
          type: boolean
          description: 'Determines whether the operation should be asynchronous (`true`)
            or synchronous (`false`).

            '
        dry_run:
          type: boolean
          description: 'When set to `true`, simulates the update operation without
            actually applying any changes. Use this to validate the request before
            committing.

            '
        fail_fast:
          type: boolean
          description: 'When set to `true`, the operation stops immediately upon encountering
            the first error. When `false` or omitted, the operation continues processing
            and reports all errors at the end.

            '
        filters:
          $ref: '#/components/schemas/request.CreateAppVersionFilters'
          description: 'Filters for including or excluding specific artifacts or packages
            when adding sources to the application version. Uses the same format as
            the `filters` field in the Create Application Version request.

            '
      type: object
