  /v1/applications/{application_key}/versions/{version}/rollback:
    post:
      operationId: rollbackApplicationVersion
      description: 'Rolls back the latest promotion of the specified application version
        to its previous stage. This action removes the promotion record, but the audit
        log will retain a history of the rollback. The behavior of the rollback on
        the artifacts in the application version depends on the original promotion
        type:


        - **Copy promotion:** Artifacts in the current stage''s repositories are deleted.

        - **Move promotion:** Artifacts are removed from the current stage''s repositories
        and restored to the previous stage''s repositories from a secure internal
        repository.


        **Note:** Rollback can be performed from the PROD stage, if needed.


        **Note:** If an artifact in the target stage has been overwritten by a newer
        promotion (i.e., the artifact''s SHA-256 no longer matches the version''s
        original manifest), that artifact is skipped during rollback and a warning
        is returned. This prevents accidental deletion of artifacts that now belong
        to a different version.


        **Consumes:** application/json

        '
      parameters:
      - description: The unique application key.
        in: path
        name: application_key
        required: true
        schema:
          type: string
      - description: The application version.
        in: path
        name: version
        required: true
        schema:
          type: string
      - description: 'Determines whether the operation should be asynchronous (`true`)
          or synchronous (`false`).

          The default value is `false`, which means that Artifactory waits for application
          version promotion to complete before allowing you to move on to the next
          task.

          '
        in: query
