            '
        tag:
          type: string
          description: A tag to be associated with the application version. A tag
            is a single free text value, limited to 128 characters, beginning and
            ending with an alphanumeric character ([a-z0-9A-Z]) with dashes (-), underscores
            (_), dots (.), and alphanumerics in between. The tag is usually used to
            represent the branch.
        filters:
          $ref: '#/components/schemas/request.CreateAppVersionFilters'
          description: Enables you to create a new application version based on the
            contents of an existing version, but excluding one or more artifacts or
            including one or more artifacts from a defined source.
        draft:
          type: boolean
          description: 'When set to `true`, creates the application version in draft
            mode. A draft version can be iteratively modified -- its content (artifacts,
            builds, packages) can be added to and its version name can be renamed.
            Security scans are not triggered until the version is finalized. Promoting
            a draft version automatically finalizes (locks and signs) it before promotion
            proceeds.

            '
        dry_run:
          type: boolean
          default: false
          description: 'When set to `true`, simulates the version creation without
            persisting any data. All backend validations are performed -- including
            verifying that builds exist, artifacts are accessible, and the version
            name is valid -- but no application version is saved. Use this to validate
            your request payload and catch errors before committing to an actual creation.

            '
      required:
      - sources
      - version
      type: object
    request.CreateAppVersionSourceFilter:
      description: 'Filter for including or excluding artifacts/packages from the
        application version.

        For artifacts: At least one field (`path` or `sha256`) must be specified.

        For packages: At least one field (`package_type`, `package_name`, or `package_version`)
        must be specified.

        '
      properties:
        package_type:
          type: string
          description: Filter attribute for packages. Can be "docker", "npm", "maven",
            "pypi", etc.
        package_name:
          type: string
          description: 'Filter attribute for packages. Wildcards (`*`) supported.

            Wildcard rules: Wild card (*) can be at start or end of string only (e.g.,
            frontend-*, *-dev, *.jar). Single wild card per field. No regex patterns
            or character class.

            '
        package_version:
          type: string
          description: Filter attribute for packages. Wildcards (`*`) supported.
        path:
          type: string
          description: Filter attribute for packages. Wildcards (`*`) supported.
        sha256:
          type: string
          description: Filter attribute for artifacts. The string must be an exact
            match.
      type: object
    request.CreateAppVersionSources:
      description: 'The list of sources to include in the version. Sources can include:
        artifacts, packages, builds, Release Bundles, and other application versions.

        **Important:** You must define at least one source.

        '
      properties:
        aql:
          type: string
          description: The contents of the AQL query to include in the application
            version.
        skip_docker_manifest_resolution:
          type: boolean
          default: false
          description: Determines whether to skip the resolution of the Docker manifest,
            which adds the image layers to the application version. The default value
            is `false` (the manifest is resolved and image layers are included).
        artifacts:
          items:
            $ref: '#/components/schemas/request.CreateAppVersionArtifactsSources'
          type: array
          description: The list of artifacts to include in the application version.
        packages:
          items:
            $ref: '#/components/schemas/request.CreateAppVersionPackagesSources'
          type: array
          description: The list of packages to include in the application version.
        builds:
          items:
            $ref: '#/components/schemas/request.CreateAppVersionBuildsSources'
          type: array
          description: The list of builds to include in the application version.
        release_bundles:
          items:
            $ref: '#/components/schemas/request.CreateAppVersionReleaseBundlesSources'
          type: array
          description: The list of Release Bundles v2 to include in the application
            version.
        versions:
          items:
            $ref: '#/components/schemas/request.CreateAppVersionVersionsSources'
          type: array
          description: The list of application versions to include in this application
            version.
      type: object
    request.CreateAppVersionVersionsSources:
      description: Reference to another application version to include as a source.
      properties:
        application_key:
          type: string
          description: The application key. The default is the same `application_key`
            as the application for which this version is being created.
        version:
          type: string
          description: The application version.
      required:
      - version
      type: object
    request.CreateApplicationDto:
      required:
      - application_name
      - application_key
      - project_key
      properties:
        application_name:
          type: string
          description: The application display name. Must be a unique string within
            the scope of the project, 1-255 alphanumeric characters in length, including
            underscores, hyphens, and spaces.
        application_key:
          type: string
          description: The application key. Must be 2-64 lowercase alphanumeric characters,
            beginning with a letter (hyphens are supported). The key must be unique
            and immutable.
        project_key:
          type: string
          description: The key of the project associated with the application.
        description:
          type: string
          description: A free-text description of the application.
        maturity_level:
          type: string
          description: 'The maturity level of the application:

            - `unspecified`

            - `experimental`

            - `production`

            - `end_of_life`

            '
          enum:
          - unspecified
          - experimental
          - production
          - end_of_life
        criticality:
          type: string
          description: 'A classification of how critical the application is for your
            business:

            - `unspecified` (default)

            - `low`

            - `medium`

            - `high`

            - `critical`

            '
          enum:
          - unspecified
          - low
          - medium
          - high
          - critical
        labels:
          additionalProperties:
            type: string
          type: object
          description: 'Key-value pairs for labeling the application. Each key and
            value is free text, limited to 255 characters, beginning and ending with
            an alphanumeric character ([a-z0-9A-Z]) with dashes (-), underscores (_),
            dots (.), and alphanumerics in between.

            Each label must have both a key and a value. Empty values are not permitted.

            '
        user_owners:
          items:
            type: string
          type: array
          description: List of users defined in the project who own the application.
        group_owners:
          items:
            type: string
          type: array
          description: List of user groups defined in the project who own the application.
      type: object
    request.CreateApplicationsBatchDto:
