openapi: 3.0.1
info:
  contact: {}
  description: This is the API documentation for the AppTrust Service.
  title: AppTrust Service API
  version: '1.0'
tags:
- name: Activity log
- name: Application
- name: Application version
- name: Application version promotion
- name: Application version release
- name: Application version rollback
- name: Bound packages
- name: Integrations
- name: Metrics
- name: Project
- name: System
servers:
- url: http://{jfrog_url}/apptrust/api
paths:
  /integrations/config:
    put:
      operationId: saveIntegrationConfig
      description: Saves configuration details (host and authentication token) for
        ServiceNow integration to JFrog AppTrust or an internal secret store
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/request.SaveConfigRequest'
        description: Integration configuration
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.SaveConfigResponse'
          description: Configuration saved successfully
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Invalid integration type or configuration format
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Internal server error
      summary: Save integration configuration
      tags:
      - Integrations
      x-codegen-request-body-name: request
  /v1/activity/log:
    get:
      operationId: getActivityLog
      description: 'Returns activity logs, with optional sorting and filtering parameters.


        **Note:** All array parameters can be specified multiple times separated by
        commas.

        '
      parameters:
      - description: Filters by application key.
        explode: false
        in: query
        name: application_key
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Filters by project key.
        explode: false
        in: query
        name: project_key
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Filter by application name (can be specified multiple times).
        explode: false
        in: query
        name: application_name
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Filter by project name (can be specified multiple times).
        explode: false
        in: query
        name: project_name
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Filter by timestamp from (UNIX timestamp).
        in: query
        name: timestamp_from
        schema:
          type: integer
      - description: Filter by timestamp to (UNIX timestamp).
        in: query
        name: timestamp_to
        schema:
          type: integer
      - description: Filters by subject type.
        explode: false
        in: query
        name: subject_type
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Filter by subject id.
        in: query
        name: subject_id
        schema:
          type: string
      - description: Filters by subject name.
        in: query
        name: subject_name
        schema:
          type: string
      - description: Filters by event type.
        explode: false
        in: query
        name: event_type
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Filters by event category.
        explode: false
        in: query
        name: event_category
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Filters by result (`success`, `failure`, `warning`).
        explode: false
        in: query
        name: result
        schema:
          items:
            type: string
            enum:
            - success
            - failure
            - warning
          type: array
        style: form
      - description: Filters by prefix.
        in: query
        name: prefix
        schema:
          type: string
      - description: 'Defines the field by which to sort results (`timestamp`, `event_id`,
          `subject_type`, `subject_name`, `event_type`, `event_category`, `project_key`,
          `created_by`).

          The default is `timestamp`.

          '
        in: query
        name: sort_by
        schema:
          default: timestamp
          type: string
          enum:
          - timestamp
          - event_id
          - subject_type
          - subject_name
          - event_type
          - event_category
          - project_key
          - created_by
      - description: 'Defines the sort direction (`asc`, `desc`).

          The default is `desc`.

          '
        in: query
        name: sort
        schema:
          default: desc
          type: string
          enum:
          - asc
          - desc
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.ActivityLogResponse'
              example:
                activity_logs:
                - event_id: 01HN1234567890ABCDEFGHIJK
                  timestamp: 1672531200000
                  subject_type: application
                  subject_name: catalina-app
                  event_description: Application version 1.2.0 promoted to QA
                  event_type: promote
                  event_category: lifecycle
                  result: success
                  additional_data:
                    version: 1.2.0
                    stage: QA
                  created_by: admin@example.com
                  application_key: catalina-app
                  application_name: Catalina App
                  project_key: catalina
                  project_name: Catalina Project
                - event_id: 01HN0987654321ZYXWVUTSRQP
                  timestamp: 1672527600000
                  subject_type: application
                  subject_name: catalina-app
                  event_description: Application created successfully
                  event_type: create
                  event_category: lifecycle
                  result: success
                  additional_data: {}
                  created_by: admin@example.com
                  application_key: catalina-app
                  application_name: Catalina App
                  project_key: catalina
                  project_name: Catalina Project
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Credentials
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Permission Denied
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Internal Server Error
      summary: Get activity log
      tags:
      - Activity log
  /v1/applications:
    get:
      operationId: listApplications
      description: 'Returns a list of applications, including the latest version and
        the total number of versions.

        '
      parameters:
      - description: The key of the project associated with the application.
        in: query
        name: project_key
        schema:
          type: string
      - description: Filters results by the application name.
        in: query
        name: name
        schema:
          type: string
      - description: Filters results by application criticality.
        in: query
        name: criticality
        schema:
          type: string
      - description: Filters results by application maturity.
        in: query
        name: maturity
        schema:
          type: string
      - description: 'Filters by application labels. This filter can be used multiple
          times (once for each label). Key and Value are separated by a colon (:).

          Labels in the format ''key:value''. You can also search only for the key.
          If you want to search only for the value use the format '':value''.

          '
        explode: true
        in: query
        name: label
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Filters results by application owners (user or group). This filter
          can be used multiple times (once for each owner).
        explode: true
        in: query
        name: owner
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Sets the maximum number of versions to return at one time. Used
          for pagination purposes.
        in: query
        name: limit
        schema:
          default: 100
          type: integer
      - description: Sets the number of records to skip before returning the query
          response. Used for pagination purposes.
        in: query
        name: offset
        schema:
          default: 0
          type: integer
      - description: 'Defines whether to order the applications by `name` or `created`.

          The default is `created`.

          '
        in: query
        name: order_by
        schema:
          default: created
          enum:
          - name
          - created
          type: string
      - description: 'Defines whether to list the application in ascending (`true`)
          or descending (`false`) order.

          The default is `false`.

          '
        in: query
        name: order_asc
        schema:
          default: false
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.GetApplicationsResponse'
              example:
                applications:
                - project_name: Catalina
                  project_key: catalina
                  created: '2024-05-18T11:26:02.912Z'
                  application_name: Catalina-App
                  application_key: catalina-app
                  application_version_latest: 1.0.0
                  application_version_tag: stable
                  application_versions_count: 1
                - project_name: Default
                  project_key: default
                  created: '2024-05-18T11:25:35.936Z'
                  application_name: Commons-App
                  application_key: commons-app
                  application_version_latest: 2.1.1
                  application_version_tag: nightly
                  application_versions_count: 5
                total: 2
                limit: 10
                offset: 0
          description: Success
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Credentials
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Permission Denied
      summary: Get applications
      tags:
      - Application
    post:
      operationId: createApplication
      description: 'Creates a new application.


        **Consumes:** application/json

        '
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/request.CreateApplicationDto'
            example:
              application_name: Catalina-App
              application_key: catalina_app
              project_key: catalina
              description: This application contains enhancements to login performance.
              maturity_level: production
              criticality: low
              labels:
                environment: production
                region: us-east
              user_owners:
              - JohnD
              - Dave Rice
              - Alina Hood
              group_owners:
              - DevOps
              - Platform Admins
        description: Create Application Request
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.SingleApplicationResponse'
              example:
                application_name: Catalina-App
                application_key: catalina_app
                project_key: catalina
                description: This application contains enhancements to login performance.
                maturity_level: production
                criticality: low
                labels:
                  environment: production
                  region: us-east
                user_owners:
                - JohnD
                - Dave Rice
                - Alina Hood
                group_owners:
                - DevOps
                - Platform Admins
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Credentials
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Permission Denied
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Conflict
      summary: Create application
      tags:
      - Application
      x-codegen-request-body-name: application
  /v1/applications/{application_key}:
    delete:
      operationId: deleteApplication
      description: 'Deletes the specified application from the JFrog platform, including
        all associated versions.

        '
      parameters:
      - description: The application key.
        in: path
        name: application_key
        required: true
        schema:
          type: string
      - description: 'Determines whether the operation should be asynchronous (`true`)
          or synchronous (`false`).

          The default value is `false`, which means that Artifactory waits for application
          deletion to complete before allowing you to move on to the next task.

          '
        in: query
        name: async
        schema:
          default: false
          type: boolean
      responses:
        '202':
          content: {}
          description: Deleted (asynchronous)
        '204':
          content: {}
          description: Deleted (synchronous)
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Credentials
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Permission Denied
      summary: Delete application
      tags:
      - Application
    get:
      operationId: getApplication
      description: 'Returns the details of a selected application, such as its creation
        time, owners, defined labels, and so on.

        '
      parameters:
      - description: The application key.
        in: path
        name: application_key
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.ApplicationDetailsResponse'
              example:
                project_name: Catalina
                project_key: catalina
                application_name: Catalina-App
                application_key: catalina_app
                signing_key: catalina-key
                description: This application contains enhancements to login performance.
                maturity: production
                criticality: low
                labels:
                  environment: production
                  region: us-east
                user_owners:
                - JohnD
                - Dave Rice
                - Alina Hood
                group_owners:
                - DevOps
                - Platform Admins
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Credentials
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Permission Denied
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Application Not Found
      summary: Get application details
      tags:
      - Application
    patch:
      operationId: updateApplication
      description: 'Updates the definition of the specified application with new data.
        All fields in the body are optional, which means that only the fields included
        in the request body will be replaced.


        **Note:** The `application_key` and `project_key` cannot be modified.


        **Consumes:** application/json

        '
      parameters:
      - description: The application key.
        in: path
        name: application_key
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/request.UpdateApplicationDto'
            example:
              application_name: Catalina-App
              description: This application contains enhancements to login performance.
              maturity: production
              criticality: low
              labels:
                environment: production
                region: us-east
              user_owners:
              - JohnD
              - Dave Rice
              - Alina Hood
              group_owners:
              - DevOps
              - Platform Admins
        description: Update Application Request
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.SingleApplicationResponse'
              example:
                application_name: Catalina-App
                description: This application contains enhancements to login performance.
                maturity: production
                criticality: low
                labels:
                  environment: production
                  region: us-east
                user_owners:
                - JohnD
                - Dave Rice
                - Alina Hood
                group_owners:
                - DevOps
                - Platform Admins
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Request
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Permission Denied
      summary: Update application
      tags:
      - Application
      x-codegen-request-body-name: application
  /v1/applications/{application_key}/packages:
    get:
      operationId: listApplicationPackages
      description: 'Returns a paginated list of unique packages bound with the specified
        application, including summary details.

        '
      parameters:
      - description: The unique identifier for the application.
        in: path
        name: application_key
        required: true
        schema:
          type: string
      - description: Filters the results according to a specific package type (for
          example, `maven`, `docker`, `generic`, etc.).
        in: query
        name: type
        schema:
          type: string
      - description: Filters the results according to a specific package name.
        in: query
        name: name
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.PackageSummariesResponse'
              example:
                packages:
                - name: portal-ui-components
                  type: npm
                  latest_version: 2.5.1
                  num_versions: 5
                - name: portal-auth-client
                  type: npm
                  latest_version: 1.3.0
                  num_versions: 3
                pagination:
                  offset: 0
                  limit: 10
                  total_items: 2
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Credentials
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Permission Denied
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Not Found
      summary: Get application package bindings
      tags:
      - Bound packages
    post:
      operationId: bindPackageToApplication
      description: 'Binds a specific package version with the specified application.
        A specific package version can be bound to only one application.


        **Consumes:** application/json

        '
      parameters:
      - description: The unique identifier for the application.
        in: path
        name: application_key
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/request.BindPackageHttpRequest'
            example:
              package_type: maven
              package_name: com.example:common-utils
              package_version: 1.2.3
        description: Package binding request
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.BindPackageResponse'
              example:
                application_key: my-web-app
                package_type: maven
                package_name: com.example:common-utils
                package_version: 1.2.3
                bound_at: '2025-06-04T20:30:00Z'
                bound_by: user@example.com
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Credentials
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Permission Denied
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Conflict
      summary: Bind package version
      tags:
      - Bound packages
      x-codegen-request-body-name: package
  /v1/applications/{application_key}/packages/{type}/{name}:
    get:
      operationId: getApplicationPackageVersions
      description: 'Returns a list of package versions that are bound with the specified
        application.


        **Consumes:** application/json

        '
      parameters:
      - description: The unique identifier for the application.
        in: path
        name: application_key
        required: true
        schema:
          type: string
      - description: The package type (for example, `maven`, `docker`).
        in: path
        name: type
        required: true
        schema:
          type: string
      - description: The package name.
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: Sets the number of records to skip for pagination purposes. The
          default value is `0`.
        in: query
        name: offset
        schema:
          default: 0
          type: integer
      - description: Sets the maximum number of versions to return at one time (up
          to 250). The default value is `25`.
        in: query
        name: limit
        schema:
          default: 25
          type: integer
      - description: The package version. If not defined, all package versions are
          returned.
        in: query
        name: package_version
        schema:
          type: string
      - description: 'Searches for matching version strings within the bound package
          versions.

          '
        in: query
        name: search
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.PackageVersions'
              example:
                versions:
                - version: 2.5.1
                  vcs_url: https://github.com/my-org/web-portal.git
                  vcs_branch: main
                  vcs_revision: a1b2c3d4e5f67890
                - version: 2.5.0
                  vcs_url: https://github.com/my-org/web-portal.git
                  vcs_branch: feature/new-ui
                  vcs_revision: f6e5d4c3b2a10987
                offset: 0
                limit: 2
                total: 5
          description: Success
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Credentials
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Permission Denied
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Not Found
      summary: Get bound package versions
      tags:
      - Bound packages
  /v1/applications/{application_key}/packages/{type}/{name}/{version}:
    delete:
      operationId: unbindPackageFromApplication
      description: 'Disassociates (unbinds) the specified package version from the
        specified application. This action removes the ownership link between them,
        and the package version will no longer be considered as belonging to the application.

        '
      parameters:
      - description: The unique application identifier.
        in: path
        name: application_key
        required: true
        schema:
          type: string
      - description: The package type (`maven`, `docker`, `npm`, `generic`, etc.)
        in: path
        name: type
        required: true
        schema:
          type: string
      - description: The package name.
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: The package version.
        in: path
        name: version
        required: true
        schema:
          type: string
      responses:
        '204':
          content: {}
          description: Deleted
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Credentials
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Permission Denied
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Not Found
      summary: Unbind package version
      tags:
      - Bound packages
  /v1/applications/{application_key}/unsync_integration:
    post:
      operationId: unsyncIntegration
      description: Unsyncs an integration from an application by removing integration-related
        labels. The integration must be present in the request context.
      parameters:
      - description: Application key
        in: path
        name: application_key
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.UnsyncIntegrationResponse'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Request
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Not Found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Internal Server Error
      summary: Unsync integration
      tags:
      - Application
  /v1/applications/{application_key}/versions:
    get:
      operationId: listApplicationVersions
      description: 'Returns a list of application versions associated with the specified
        application key.

        '
      parameters:
      - description: The unique application key.
        in: path
        name: application_key
        required: true
        schema:
          type: string
      - description: Filters by the user who created the application version.
        in: query
        name: created_by
        schema:
          type: string
