              example:
                application_key: video-encoder
                version: 1.5.0
                project_key: MEDIA-PROJ
                rollback_from_stage: qa
                rollback_to_stage: dev
          description: Ok (synchronous)
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.RollbackAppVersionResponse'
          description: Ok (asynchronous)
        '400':
