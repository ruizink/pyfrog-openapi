            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Bad Credentials
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Permission Denied
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors.Error'
          description: Not Found
