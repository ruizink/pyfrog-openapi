openapi: 3.1.0
info:
  title: JFrog Artifactory Cleanup Policies API
  description: REST API for managing cleanup policies in JFrog Artifactory. This includes
    cleanup policies for Packages, Release Bundles V2, and Builds.
  version: 1.0.0
  contact:
    name: JFrog Support
servers:
- url: https://{jfrog_url}/artifactory/api/cleanup
  description: Cleanup Policies API base path
tags:
- name: Package Cleanup Policies
  description: Package cleanup policy management operations
- name: Release Bundle Cleanup Policies
  description: Release bundle cleanup policy management operations
- name: Build Cleanup Policies
  description: Build cleanup policy management operations
- name: Common Cleanup Policies
  description: Common cleanup policy operations
security:
- BasicAuth: []
- ApiKeyAuth: []
- BearerAuth: []
paths:
  /packages/policies/{policyKey}:
    post:
      tags:
      - Package Cleanup Policies
      summary: Create a Package Cleanup Policy
      description: This API is called to create a new package-level cleanup policy.
        Packages Cleanup Policies APIs are supported on Artifactory version 7.98.2
        and later.
      operationId: createPackageCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: An ID that is used to identify the cleanup policy. A minimum
          of three characters is required and can include letters, numbers, underscore
          and hyphen.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackageCleanupPolicyRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageCleanupPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
      - Package Cleanup Policies
      summary: Update a Package-Level Cleanup Policy
      description: This REST API is called to update configuration settings for an
        existing package-level cleanup policy. A policy cannot be updated if it is
        currently running.
      operationId: updatePackageCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: The ID that identifies the policy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackageCleanupPolicyRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageCleanupPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
      - Package Cleanup Policies
      summary: Get Single Package Cleanup Policy by Key
      description: This API is called to provide details on a single package cleanup
        policy.
      operationId: getPackageCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: The ID that identifies the policy.
      - name: checkRepoAvailability
        in: query
        required: false
        schema:
          type: boolean
          default: false
        description: Whether to check repository availability when retrieving the
          policy.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageCleanupPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
      - Package Cleanup Policies
      summary: Delete Package Cleanup Policy
      description: Deletes a cleanup policy. A policy cannot be deleted if it is currently
        running.
      operationId: deletePackageCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: The ID that identifies the policy.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /packages/policies:
    get:
      tags:
      - Package Cleanup Policies
      summary: Get all Package Cleanup Policies
      description: This API is called to return a list of all the existing package
        cleanup policies for either a specific project or for the entire system.
      operationId: getAllPackageCleanupPolicies
      parameters:
      - name: projectKey
        in: query
        schema:
          type: string
        description: This parameter is used when calling this API to return all cleanup
          policies for a specific project. This parameter is optional for a platform
          admin, but not using it will return all cleanup policies in Artifactory,
          both global policies and project-level policies. This parameter is mandatory
          for a project admin.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PackageCleanupPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /packages/policies/{policyKey}/enablement:
    post:
      tags:
      - Package Cleanup Policies
      summary: Enable/Disable a Package Cleanup Policy
      description: This REST API is called to enable or disable a package cleanup
        policy. A policy must be enabled for it to run according to the automated
        schedule set in the cron expression or to trigger a run manually. A dry run
        can be performed on a policy that is disabled.
      operationId: enableDisablePackageCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: The ID that identifies the policy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyEnablementRequest'
      responses:
        '200':
          description: Success
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /packages/policies/{policyKey}/run:
    put:
      tags:
      - Package Cleanup Policies
      summary: Manually Run Package Cleanup Policy
      description: This REST API is called to manually run a package cleanup policy.
      operationId: runPackageCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: ID of the policy you want to run.
      - name: dryRun
        in: query
        schema:
          type: boolean
          default: false
        description: Optional, default is FALSE. Dry runs are used to run a policy
          without actual cleanup. It produces a report used to determine which packages
          will be removed if an actual run will be performed.
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /bundles/policies:
    get:
      tags:
      - Release Bundle Cleanup Policies
      summary: Get All Cleanup Bundle Policies
      description: This API is called to return a list of all the existing release
        bundle cleanup policies for either a specific project or for the entire system.
      operationId: getAllReleaseBundleCleanupPolicies
      parameters:
      - name: projectKey
        in: query
        schema:
          type: string
        description: This parameter is used when calling this API to return all cleanup
          policies for a specific project. This parameter is optional for a platform
          admin, but not using it will return all cleanup policies in Artifactory,
