      security:
      - BearerAuth: []
      - BasicAuth: []
      - ApiKeyAuth: []
components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-JFrog-Art-Api
    BearerAuth:
      type: http
      scheme: bearer
  responses:
    BadRequestResponse:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              status:
                type: integer
              message:
                type: string
    PolicyEnablementRequest:
      type: object
      required:
      - enabled
      properties:
        enabled:
          type: boolean
          description: A true value means the policy can be executed. A false value
            means that it cannot.
    PolicyActionRequest:
      type: object
      required:
      - action
      properties:
        action:
          type: string
          enum:
          - stop
          description: Use the stop action to stop the policy run.
    RunPolicyResponse:
      type: object
      properties:
        triggerId:
          type: integer
          description: An ID that identifies the run. This ID is used by the Stop
            a Running Cleanup Policy API and other run-related APIs.
    PackageCleanupPolicyRequest:
      type: object
      required:
      - key
      - searchCriteria
      properties:
        key:
          type: string
          description: An ID that is used to identify the cleanup policy. A minimum
            of three characters is required and can include letters, numbers, underscore
            and hyphen.
        description:
          type: string
          maxLength: 256
          description: A description of the policy.
        cronExp:
          type: string
          description: The cron expression that determines when the policy is run.
            This parameter is not mandatory, however if left empty the policy will
            not run automatically and can only be triggered manually.
        projectKey:
          type: string
          description: This key is obtained from the Project Settings screen. This
            parameter is used only for project-level cleanup policies, it is not used
            for global-level policies.
        itemType:
          type: string
          description: The type of item (package).
        durationInMinutes:
          type: integer
          description: The maximum duration (in minutes) for policy execution, after
            which the policy will stop running even if not completed.
        enabled:
          type: boolean
          description: A cleanup policy must be created inactive. This parameter is
            optional, but if used it must be set to FALSE. If set to TRUE when calling
            this API, the API call will fail and an error message is received.
        skipTrashcan:
          type: boolean
          description: A true value means that when this policy is executed, packages
            will be permanently deleted. false means that when the policy is executed
            packages will be deleted to the Trash Can.
        searchCriteria:
          $ref: '#/components/schemas/PackageCleanupSearchCriteria'
    PackageCleanupSearchCriteria:
      type: object
      required:
      - packageTypes
      - repos
      - includedPackages
      properties:
        packageTypes:
          type: array
          items:
            type: string
          description: The package types that are cleaned up by the policy. You must
            enter at least one package type.
        repos:
          type: array
          items:
            type: string
          description: Specify one or more patterns for the repository name(s) on
            which you want the cleanup policy to run. You can also specify explicit
            repository names. Specifying at least one pattern or explicit name is
            mandatory.
        excludedRepos:
          type: array
          items:
            type: string
          description: Specify patterns for repository names or explicit repository
            names that you want excluded from the cleanup policy.
        includedPackages:
          type: array
          items:
            type: string
          description: Specify a pattern for a package name or an explicit package
            name on which you want the cleanup policy to run. To include all packages,
            use "**".
        excludedPackages:
          type: array
          items:
            type: string
          description: Specify explicit package names that you want excluded from
            the policy. Only explicit names (and not patterns) are accepted.
        includeAllProjects:
          type: boolean
          description: Set this value to true if you want the policy to run on all
            Artifactory projects. The default value is false. This parameter is relevant
            only on the global level, for Platform Admins.
        includedProjects:
          type: array
          items:
            type: string
          description: Enter the project keys for the projects on which you want the
            policy to run. To include repositories that are not assigned to any project,
            enter the project key default.
        includeAllStages:
          type: boolean
          description: Set this value to true if you want the policy to run on all
            stages/environments. When true, includedStages should be empty.
        includedStages:
          type: array
          items:
            type: string
          description: List of specific stages/environments to include in the policy.
            When includeAllStages is false, at least one stage must be specified.
        createdBeforeInMonths:
          type: integer
          minimum: 0
          description: The cleanup policy will delete packages based on how long ago
            they were created. Before Version 7.111 Use this param if you are using
            versions below 7.111.
        createdBeforeInDays:
          type: integer
          minimum: 0
          description: The cleanup policy will delete packages based on how long ago
            they were created. From Version 7.111 Onwards. A day in this context is
            a 24-hour period from the moment the policy is executed.
        lastDownloadedBeforeInMonths:
          type: integer
          minimum: 0
          description: The cleanup policy will delete packages based on how long ago
            they were downloaded. Before Version 7.111.
        lastDownloadedBeforeInDays:
          type: integer
          minimum: 0
          description: The cleanup policy will delete packages based on how long ago
            they were downloaded. From Version 7.111 Onwards.
        keepLastNVersions:
          type: integer
          minimum: 0
          description: Set a value for the number of latest versions to keep. The
            cleanup policy will remove all versions prior to the number you select
            here. The latest version is always excluded.
        includedProperties:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: A key-value pair applied to the lead artifact of a package.
            Packages with this property will be deleted.
        excludedProperties:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: A key-value pair applied to the lead artifact of a package.
            Packages with this property will be excluded from deletion.
        includedPackageVersions:
          type: array
          items:
            type: string
          description: Specify package version to include explicitly or use wildcards.
            Available from V 7.127 (Cloud) and V 7.125.7 (Self-managed).
        excludedPackageVersions:
          type: array
          items:
            type: string
          description: Specify explicit package versions that you want excluded from
            the policy. Supports patterns such as 1.*, *.1.
    PackageCleanupPolicyResponse:
      type: object
      properties:
        key:
          type: string
          description: The ID that identifies the policy.
        description:
          type: string
          description: Description that was defined for the policy.
        cronExp:
          type: string
          description: The cron expression that determines when the policy is run.
        projectKey:
          type: string
          description: The project key if this is a project-level policy.
        itemType:
          type: string
          description: The type of item (package).
        durationInMinutes:
          type: integer
          description: The maximum duration (in minutes) for policy execution.
        enabled:
          type: boolean
          description: Indicates if the cleanup policy is active (true) or disabled
            (false).
        skipTrashcan:
          type: boolean
          description: Indicates if packages are permanently deleted or sent to Trash
            Can.
        searchCriteria:
          $ref: '#/components/schemas/PackageCleanupSearchCriteria'
    ReleaseBundleCleanupPolicyRequest:
      type: object
      required:
      - key
      - itemType
      - searchCriteria
      properties:
        key:
          type: string
          description: A unique identifier for the cleanup policy. A minimum of three
            characters is required, including letters, numbers, underscore and hyphen.
        description:
          type: string
          maxLength: 256
          description: A brief description of the cleanup policy.
        cronExp:
          type: string
          description: A cron expression specifying when the cleanup job will run.
            This parameter is not mandatory, however if left empty the policy will
            not run automatically and can only be triggered manually.
        projectKey:
          type: string
          description: This key is obtained from the Project Settings screen. This
            parameter is used only for project-level cleanup policies.
        itemType:
          type: string
          enum:
          - releaseBundle
          description: The type of items to clean up (releaseBundle). This field is
            required.
        durationInMinutes:
          type: integer
          description: The maximum duration (in minutes) for policy execution, after
            which the policy will stop running even if not completed.
        searchCriteria:
          $ref: '#/components/schemas/ReleaseBundleCleanupSearchCriteria'
    ReleaseBundleCleanupSearchCriteria:
      type: object
      required:
      - includeAllProjects
      - includedProjects
      - releaseBundles
      - excludePromotedEnvironments
      properties:
        includeAllProjects:
          type: boolean
          description: Specifies whether to include all projects in the search (true
            to include).
        includedProjects:
          type: array
          items:
            type: string
          description: A list of specific project keys to include in the search.
        releaseBundles:
          type: array
          items:
            $ref: '#/components/schemas/ReleaseBundleTarget'
          description: An array specifying the release bundles to consider during
            cleanup.
        excludePromotedEnvironments:
          type: array
          items:
            type: string
          description: A list of environments to exclude from the cleanup process.
            To exclude all, set to **.
        excludeAllPromotedEnvironments:
          type: boolean
          description: Specifies whether to exclude all promoted environments from
            cleanup.
        createdBeforeInMonths:
          type: integer
          minimum: 0
          description: Specifies the time frame for filtering based on item creation
            date. Before Version 7.119.0.
        createdBeforeInDays:
          type: integer
          minimum: 0
          description: Specifies the time frame for filtering based on item creation
            date. From Version 7.119.0 Onwards.
    ReleaseBundleTarget:
      type: object
      required:
      - name
      - projectKey
      properties:
        name:
          type: string
          description: The name of the release bundle. Set "**" to include all bundles.
        projectKey:
          type: string
          description: The project identifier associated with the release bundle.
            Leave blank for global level.
    ReleaseBundleCleanupPolicyResponse:
      type: object
      properties:
        key:
          type: string
          description: The ID that identifies the policy.
        description:
          type: string
          description: Description that was defined for the policy.
        cronExp:
          type: string
          description: The cron expression that determines when the policy is run.
        projectKey:
          type: string
          description: The project key if this is a project-level policy.
        itemType:
          type: string
          enum:
          - releaseBundle
          description: The type of items (releaseBundle).
        durationInMinutes:
          type: integer
          description: The maximum duration (in minutes) for policy execution.
        enabled:
          type: boolean
          description: Indicates if the cleanup policy is active (true) or disabled
            (false).
        searchCriteria:
          $ref: '#/components/schemas/ReleaseBundleCleanupSearchCriteria'
    BuildCleanupPolicyRequest:
      type: object
      required:
      - key
      - itemType
      - searchCriteria
      properties:
        key:
          type: string
          description: A unique identifier for the cleanup policy. A minimum of three
            characters is required, including letters, numbers, underscore and hyphen.
        description:
          type: string
          maxLength: 256
          description: A brief description of the cleanup policy.
        cronExp:
          type: string
          description: A cron expression specifying when the cleanup job will run.
            This parameter is not mandatory, however if left empty the policy will
            not run automatically and can only be triggered manually.
        projectKey:
          type: string
          description: This key is obtained from the Project Settings screen. This
            parameter is used only for project-level cleanup policies.
        itemType:
          type: string
          enum:
          - build
          description: The type of items to clean up (build). This field is required.
        durationInMinutes:
          type: integer
          description: The maximum duration (in minutes) for policy execution, after
            which the policy will stop running even if not completed.
        enabled:
          type: boolean
          description: Indicates if the cleanup policy is active (true) or disabled
            (false). A cleanup policy must be created inactive.
        deleteArtifacts:
          type: boolean
          description: Deletes the artifacts associated with the build (true to delete).
        skipTrashcan:
          type: boolean
          description: A true value means that when this policy is executed, builds
            will be permanently deleted. false means that when the policy is executed
            builds will be deleted to the Trash Can.
        searchCriteria:
          $ref: '#/components/schemas/BuildCleanupSearchCriteria'
    BuildCleanupSearchCriteria:
      type: object
      required:
      - includeAllProjects
      - includedProjects
      - includedBuilds
      properties:
        includeAllProjects:
          type: boolean
          description: Specifies whether to include all projects in the search (true
            to include).
        includedProjects:
          type: array
          items:
            type: string
          description: A list of specific project keys to include in the search.
        includedBuilds:
          type: array
          items:
            $ref: '#/components/schemas/BuildTarget'
          description: Builds to consider during cleanup.
        excludeBuildsWithReleaseBundles:
          type: boolean
          description: Specifies whether to exclude builds with release bundles (true
            to exclude).
        createdBeforeInMonths:
          type: integer
          minimum: 0
          description: Specifies the time frame for filtering based on item creation
            date (legacy).
        createdBeforeInDays:
          type: integer
          minimum: 0
          description: Specifies the time frame for filtering based on item creation
            date (e.g., 40 days).
    BuildTarget:
      type: object
      required:
      - name
      - projectKey
      properties:
        name:
          type: string
          description: The name of the build. Use wildcards at the end to match any
            suffix.
        projectKey:
          type: string
          description: The project identifier associated with the build. Leave blank
            for global level.
    BuildCleanupPolicyResponse:
      type: object
      properties:
        key:
          type: string
          description: The ID that identifies the policy.
        description:
          type: string
          description: Description that was defined for the policy.
        cronExp:
          type: string
          description: The cron expression that determines when the policy is run.
        projectKey:
          type: string
          description: The project key if this is a project-level policy.
        itemType:
          type: string
          enum:
          - build
          description: The type of items (build).
        durationInMinutes:
          type: integer
          description: The maximum duration (in minutes) for policy execution.
        enabled:
          type: boolean
          description: Indicates if the cleanup policy is active (true) or disabled
            (false).
        deleteArtifacts:
          type: boolean
          description: Indicates if artifacts associated with the build are deleted.
        skipTrashcan:
          type: boolean
          description: Indicates if builds are permanently deleted or sent to Trash
            Can.
        searchCriteria:
          $ref: '#/components/schemas/BuildCleanupSearchCriteria'
    CleanupPolicyView:
      type: object
      properties:
        policies:
          type: array
          items:
            $ref: '#/components/schemas/CleanupPolicyEntry'
    CleanupPolicyEntry:
      type: object
      properties:
        itemType:
          type: string
          description: The type of items (package, build, releaseBundle).
        policyKey:
          type: string
          description: The unique identifier of the policy.
        nextRunTime:
          type: integer
          format: int64
          description: The next scheduled run time in epoch milliseconds.
        enabled:
          type: boolean
          description: Whether the policy is enabled.
        displayProject:
          type: string
          description: The display name of the project.
        lastRunData:
          $ref: '#/components/schemas/CleanupPolicyLastRun'
        includedProjects:
          type: array
          items:
            type: string
          description: List of included project keys.
    CleanupPolicyLastRun:
      type: object
      properties:
        status:
          type: string
          description: The status of the last run.
        lastRunTime:
          type: integer
          format: int64
          description: The last run time in epoch milliseconds.
        dryRun:
          type: boolean
          description: Whether the last run was a dry run.
        runId:
          type: integer
          description: The run ID of the last execution.
        reportDownloaded:
          type: boolean
          description: Whether the report was downloaded.
        totalItems:
          type: integer
          format: int64
          description: Total items processed in the last run.
    CleanupPolicyRunView:
      type: object
      properties:
        runViews:
          type: array
          items:
            $ref: '#/components/schemas/CleanupPolicyRunViewEntry'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CleanupPolicyRunViewEntry:
      type: object
      properties:
        runId:
          type: integer
        itemType:
          type: string
          enum:
          - package
          - build
          - releaseBundle
        policyKey:
          type: string
        displayProject:
          type: string
        startTime:
          type: integer
          format: int64
        endTime:
          type: integer
          format: int64
        totalItems:
          type: integer
          format: int64
        cleanedSize:
          type: integer
          format: int64
        cleanedItems:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - IN_PROGRESS
          - IN_PROGRESS_WITH_ERRORS
          - COMPLETED
          - COMPLETED_WITH_ERRORS
          - STOPPED
          - STOPPING
          - FAILED
          - PENDING_WARM
          - PARTIAL_WARMED
          - WARMED
        triggeredBy:
          type: string
        manual:
          type: boolean
        dryRun:
          type: boolean
        policyTaskId:
          type: integer
        includedProjects:
          type: array
          items:
            type: string
    Pagination:
      type: object
      properties:
        pageSize:
          type: integer
          format: int64
          description: Number of items per page.
        currentPage:
          type: integer
          format: int64
          description: The current page number.
        lastPage:
          type: integer
          format: int64
          description: The last page number.
        total:
          type: integer
          format: int64
          description: Total number of items.
    RunSummaryResponse:
      type: object
      properties:
        policySummary:
          $ref: '#/components/schemas/PolicySummary'
        executionSummary:
          $ref: '#/components/schemas/ExecutionSummary'
        processedItemsSummary:
          $ref: '#/components/schemas/ProcessedItemsSummary'
        runConfiguration:
          $ref: '#/components/schemas/RunConfiguration'
    PolicySummary:
      type: object
      properties:
        policyName:
          type: string
        runId:
          type: integer
        dryRun:
          type: boolean
        status:
          type: string
        triggeredBy:
          type: string
    ExecutionSummary:
      type: object
      properties:
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        durationMillis:
          type: integer
          format: int64
    ProcessedItemsSummary:
      type: object
      properties:
        itemType:
          type: string
        totalItems:
          type: integer
          format: int64
        processedItems:
