          for a project admin.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReleaseBundleCleanupPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /bundles/policies/{policyKey}:
    post:
      tags:
      - Release Bundle Cleanup Policies
      summary: Create a Release Bundle Cleanup Policy
      description: This API is called to create a new release bundle cleanup policy.
        Release Bundles V2 Cleanup Policies APIs are supported on Artifactory version
        7.104.2 and later.
      operationId: createReleaseBundleCleanupPolicy
      parameters:
