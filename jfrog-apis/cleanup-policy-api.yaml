  /policies/runs/view:
    get:
      tags:
      - Common Cleanup Policies
      summary: Get Policy Runs View
      operationId: getCleanupPolicyRunsView
      parameters:
      - name: itemTypes
        in: query
        schema:
          type: array
          items:
            type: string
      - name: from
        in: query
        schema:
          type: integer
          format: int64
      - name: to
        in: query
        schema:
          type: integer
          format: int64
      - name: policyKey
        in: query
        schema:
          type: string
      - name: projectKey
        in: query
        schema:
          type: string
      - name: page
        in: query
        schema:
          type: integer
      - name: pageSize
        in: query
        schema:
          type: integer
      - name: sortBy
        in: query
        schema:
          type: string
      - name: sortOrder
        in: query
        schema:
          type: string
