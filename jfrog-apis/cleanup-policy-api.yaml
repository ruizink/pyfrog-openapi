      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseBundleCleanupPolicyRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseBundleCleanupPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
      - Release Bundle Cleanup Policies
      summary: Update Release Bundle Cleanup Policy
      operationId: updateReleaseBundleCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseBundleCleanupPolicyRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseBundleCleanupPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
      - Release Bundle Cleanup Policies
      summary: Get Single Release Bundle Cleanup Policy by Key
      description: This API is called to provide details on a single release bundle
        cleanup policy.
      operationId: getReleaseBundleCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: The ID that identifies the policy.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseBundleCleanupPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
      - Release Bundle Cleanup Policies
      summary: Delete Release Bundle Cleanup Policy
      description: Deletes a cleanup policy. A policy cannot be deleted if it is currently
        running.
      operationId: deleteReleaseBundleCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: The ID that identifies the policy.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /bundles/policies/{policyKey}/enablement:
    post:
      tags:
      - Release Bundle Cleanup Policies
      summary: Enable/Disable Release Bundle Cleanup Policy
      description: This REST API is called to enable or disable a cleanup policy.
        A policy must be enabled for it to run according to the automated schedule
        set in the cron expression or to trigger a run manually. A dry run can be
        performed on a policy that is disabled.
      operationId: enableDisableReleaseBundleCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: The ID that identifies the policy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyEnablementRequest'
      responses:
        '200':
          description: Success
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /bundles/policies/{policyKey}/run:
    put:
      tags:
      - Release Bundle Cleanup Policies
      summary: Manually Run Release Bundle Cleanup Policy
      description: This REST API is called to manually run a release bundle cleanup
        policy.
      operationId: runReleaseBundleCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: ID of the policy you want to run.
      - name: dryRun
        in: query
        schema:
          type: boolean
          default: false
        description: Optional, default is FALSE. Dry runs are used to run a policy
          without actual cleanup. It produces a report used to determine which packages
          will be removed if an actual run will be performed.
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /builds/policies:
    get:
      tags:
      - Build Cleanup Policies
      summary: Get All Build Cleanup Policies
      description: This API is called to return a list of all the existing build cleanup
        policies for either a specific project or for the entire system.
      operationId: getAllBuildCleanupPolicies
      parameters:
      - name: projectKey
        in: query
        schema:
          type: string
        description: This parameter is used when calling this API to return all cleanup
          policies for a specific project. This parameter is optional for a platform
          admin, but not using it will return all cleanup policies in Artifactory,
          both global policies and project-level policies. This parameter is mandatory
          for a project admin.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  policies:
                    type: array
                    items:
                      $ref: '#/components/schemas/CleanupPolicyEntry'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /builds/policies/{policyKey}:
    post:
      tags:
      - Build Cleanup Policies
      summary: Create Build Cleanup Policy
      description: This API is called to create a new build cleanup policy. Build
        Cleanup Policies APIs are supported on Artifactory version 7.125 and later.
      operationId: createBuildCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: A unique identifier for the cleanup policy. A minimum of three
          characters is required, including letters, numbers, underscore and hyphen.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildCleanupPolicyRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildCleanupPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
      - Build Cleanup Policies
      summary: Update Build Cleanup Policy
      description: This REST API is called to update configuration settings for an
        existing build cleanup policy. A policy cannot be updated if it is currently
        running.
      operationId: updateBuildCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: The ID that identifies the policy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildCleanupPolicyRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildCleanupPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
      - Build Cleanup Policies
      summary: Get Single Build Cleanup Policy by Key
      description: This API is called to provide details on a single build cleanup
        policy.
      operationId: getBuildCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: The ID that identifies the policy.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildCleanupPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
      - Build Cleanup Policies
      summary: Delete Build Cleanup Policy
      description: Deletes a cleanup policy. A policy cannot be deleted if it is currently
        running.
      operationId: deleteBuildCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: The ID that identifies the policy.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /builds/policies/{policyKey}/enablement:
    post:
      tags:
      - Build Cleanup Policies
      summary: Enable/Disable Build Cleanup Policy
      description: This REST API is called to enable or disable a cleanup policy.
        A policy must be enabled for it to run according to the automated schedule
        set in the cron expression or to trigger a run manually. A dry run can be
        performed on a policy that is disabled.
      operationId: enableDisableBuildCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: The ID that identifies the policy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyEnablementRequest'
      responses:
        '200':
          description: Success
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /builds/policies/{policyKey}/run:
    put:
      tags:
      - Build Cleanup Policies
      summary: Manually Run Build Cleanup Policy
      description: This REST API is called to manually run a build cleanup policy.
      operationId: runBuildCleanupPolicy
      parameters:
      - name: policyKey
        in: path
        required: true
        schema:
          type: string
        description: ID of the policy you want to run.
      - name: dryRun
        in: query
        schema:
          type: boolean
          default: false
        description: Optional, default is FALSE. Dry runs are used to run a policy
          without actual cleanup. It produces a report used to determine which packages
          will be removed if an actual run will be performed.
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /policies/runs/{runId}:
    put:
      tags:
      - Common Cleanup Policies
      summary: Stop a Running Cleanup Policy
      description: This REST API is called to stop a cleanup policy that is currently
        running. Once a policy has been stopped, it cannot be resumed from the point
        where it stopped.
      operationId: stopRunningCleanupPolicy
      parameters:
      - name: runId
        in: path
        required: true
        schema:
          type: integer
        description: An ID that identifies the run. This ID is received when calling
          the Manually Run Release Bundle Cleanup Policy API and Manually Run Package
          Cleanup Policy API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyActionRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /policies/runs/forceStopAll:
    put:
      tags:
      - Common Cleanup Policies
      summary: Stop All Running Cleanup Policies
      description: This API is called to stop all running cleanup policies on the
        global level. This API stops packages, builds and release bundles running
        policies.
      operationId: stopAllRunningCleanupPolicies
      responses:
        '202':
          description: Accepted
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /policies/forceDisableAll:
    put:
      tags:
      - Common Cleanup Policies
      summary: Disable All Cleanup Policies
      description: This API is called to disable all cleanup policies on the global
        level. This API disables packages, builds and release bundles policies.
      operationId: disableAllCleanupPolicies
      parameters:
      - name: projectKey
        in: query
        required: false
        schema:
          type: string
        description: Optional. If provided, disables policies only for the specified
          project. If not provided, disables all global-level policies.
      responses:
        '200':
          description: Success
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
