  /policies/runs/summaryReports:
    get:
      tags:
      - Common Cleanup Policies
      summary: View Cleanup Policy Run Summary Report
      description: This REST API is called to view a summary report on a cleanup policy
        run. Platform admins can view run summary reports for both global cleanup
        policies and project-specific cleanup policies. Since 7.117
      operationId: viewCleanupPolicyRunSummaryReport
      parameters:
      - name: triggerId
        in: query
        required: true
