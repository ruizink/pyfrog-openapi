openapi: 3.1.0
info:
  title: JFrog Distribution API
  description: REST API for JFrog Distribution - manages distribution of release bundles
    to edge nodes. Supports both Release Bundles V1 and V2 workflows including distribution,
    remote deletion, air-gap export, signing key management, and distribution tracking.
  version: 1.0.0
  contact:
    name: JFrog Support
servers:
- url: https://{jfrog_url}/distribution/api
  description: JFrog Platform
  variables:
    jfrog_url:
      default: myserver.jfrog.io
      description: Your JFrog Platform hostname (e.g., mycompany.jfrog.io)
tags:
- name: Release Bundles V1
  description: Release Bundle V1 management and distribution status operations
- name: Distribute Release Bundle V1
  description: V1 distribution, deletion, and abort operations
- name: Distribute Release Bundle V2
  description: V2 distribution, abort, remote delete, and tracker operations
- name: Export and Import Release Bundle V1
  description: V1 release bundle air-gap export and import operations
- name: Signing Keys
  description: Signing key retrieval and propagation
- name: GPG Keys
  description: GPG/PGP key management and propagation
- name: Token
  description: Access token creation, listing, and revocation
- name: Permissions
  description: Destination permission management
- name: Maintenance
  description: Maintenance operations including redistribution of release bundles
    to edge nodes
- name: Metrics
  description: Distribution service metrics in OpenMetrics format
- name: System
  description: System health, info, and support bundle operations
paths:
  /v2/distribution/distribute/{release_bundle_name}/{release_bundle_version}:
    post:
      tags:
      - Distribute Release Bundle V2
      summary: Distribute Release Bundle V2 Version
      description: Distributes a Release Bundle v2 to the specified target edge nodes.
        The distribution rules define which sites receive the bundle. Supports dry-run
        mode to simulate the distribution without executing it.
      operationId: distributeReleaseBundleV2Version
      parameters:
      - $ref: '#/components/parameters/releaseBundleNamePath'
      - $ref: '#/components/parameters/releaseBundleVersionPath'
      - $ref: '#/components/parameters/repositoryKeyQuery'
      - $ref: '#/components/parameters/projectQuery'
      - name: X-GPG-PASSPHRASE
        in: header
        description: GPG passphrase for signing the release bundle during distribution
        schema:
          type: string
      requestBody:
        required: true
        description: Distribution configuration including target rules and options
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RBv2DistributionRequest'
            examples:
              distributeToAll:
                summary: Distribute to all edge nodes
                value:
                  dry_run: false
                  auto_create_missing_repositories: true
                  distribution_rules:
                  - site_name: '*'
              distributeToSpecificSite:
                summary: Distribute to a specific site
                value:
                  dry_run: false
                  distribution_rules:
                  - site_name: edge-node-1
      responses:
        '200':
          description: Success - Distribution initiated (or dry-run result)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionResponse'
        '400':
          description: Bad Request - Invalid request or signing key issue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - A distribution is already in progress for this release
            bundle version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/distribution/abort/{release_bundle_name}/{release_bundle_version}:
    put:
      tags:
      - Distribute Release Bundle V2
      summary: Abort Release Bundle V2 Distribution
      description: Aborts an in-progress distribution of a Release Bundle v2. Sends
        abort signals to all edge nodes that are currently receiving the distribution.
      operationId: abortReleaseBundleV2Distribution
      parameters:
      - $ref: '#/components/parameters/releaseBundleNamePath'
      - $ref: '#/components/parameters/releaseBundleVersionPath'
      - $ref: '#/components/parameters/repositoryKeyQuery'
      - $ref: '#/components/parameters/projectQuery'
      responses:
        '202':
          description: Accepted - Abort signal sent to edge nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlatformServiceInstance'
        '204':
          description: No Content - No active distributions to abort
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/distribution/remote_delete/{release_bundle_name}/{release_bundle_version}:
    post:
      tags:
      - Distribute Release Bundle V2
      summary: Remote Delete Release Bundle V2 Distribution
      description: Remotely deletes a Release Bundle v2 from edge nodes. The distribution
        rules define which sites should have the bundle removed. Supports dry-run
        mode.
      operationId: remoteDeleteReleaseBundleV2Distribution
      parameters:
      - $ref: '#/components/parameters/releaseBundleNamePath'
      - $ref: '#/components/parameters/releaseBundleVersionPath'
      - $ref: '#/components/parameters/repositoryKeyQuery'
      - $ref: '#/components/parameters/projectQuery'
      requestBody:
        required: true
        description: Distribution rules defining target sites for remote deletion
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DistributionRequest'
      responses:
        '200':
          description: Success - Dry run result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionResponse'
        '202':
          description: Accepted - Remote delete initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/distribution/trackers/{release_bundle_name}/{release_bundle_version}:
    get:
      tags:
      - Distribute Release Bundle V2
      summary: Get Release Bundle V2 Distribution Trackers
      description: Returns a list of distribution trackers for a Release Bundle v2.
        Each tracker represents a distribution operation and its overall status.
      operationId: getReleaseBundleV2DistributionTrackers
      parameters:
      - $ref: '#/components/parameters/releaseBundleNamePath'
      - $ref: '#/components/parameters/releaseBundleVersionPath'
      - $ref: '#/components/parameters/repositoryKeyQuery'
      - $ref: '#/components/parameters/projectQuery'
      responses:
        '200':
          description: Success - List of distribution trackers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DistributionTrackerSimple'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/distribution/trackers/{release_bundle_name}/{release_bundle_version}/{distribution_tracker}:
    get:
      tags:
      - Distribute Release Bundle V2
      summary: Get Distribution Status Details by Tracker ID
      description: Returns detailed distribution progress for a specific distribution
        tracker, including per-edge-node status.
      operationId: getDistributionStatusDetailsByTrackerId
      parameters:
      - $ref: '#/components/parameters/releaseBundleNamePath'
      - $ref: '#/components/parameters/releaseBundleVersionPath'
      - name: distribution_tracker
        in: path
        required: true
        description: Distribution tracker ID
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Success - Distribution progress details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionProgress'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/distribution/key/{key_name}:
    get:
      tags:
      - Signing Keys
      summary: Get Public Signing Key for Distribution
      description: Returns the public signing key content by key name. Requires admin
        permission.
      operationId: getPublicSigningKeyForDistribution
      parameters:
      - name: key_name
        in: path
        required: true
        description: Name of the signing key
        schema:
          type: string
      responses:
        '200':
          description: Success - Public key content
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - Admin permission required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/distribution/key/propagate/{key_name}:
    post:
      tags:
      - Signing Keys
      summary: Propagate Public Signing Key
      description: Propagates the release bundle signing key (used to verify release
        bundle integrity) to all connected edge nodes by key name. Returns a propagation
        report with the status for each edge node. Requires admin permission.
      operationId: propagatePublicSigningKey
      parameters:
      - name: key_name
        in: path
        required: true
        description: Name of the signing key to propagate
        schema:
          type: string
      responses:
        '200':
          description: Success - Propagation report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropagationReport'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - Admin permission required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/distribution/{release_bundle_name}/{release_bundle_version}:
    post:
      tags:
      - Distribute Release Bundle V1
      summary: Distribute Release Bundle V1 Version
      description: Distributes a signed Release Bundle V1 to the specified target
        edge nodes. The distribution rules define which sites receive the bundle.
        Supports dry-run mode to simulate the distribution without executing it.
      operationId: distributeReleaseBundleV1Version
      parameters:
      - $ref: '#/components/parameters/releaseBundleNamePath'
      - $ref: '#/components/parameters/releaseBundleVersionPath'
      requestBody:
        required: true
        description: Distribution configuration including target rules
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DistributionRequest'
            examples:
              distributeToAll:
                summary: Distribute to all edge nodes
                value:
                  dry_run: false
                  distribution_rules:
                  - site_name: '*'
      responses:
        '200':
          description: Success - Dry run result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionResponse'
        '202':
          description: Accepted - Distribution initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/distribution/{release_bundle_name}/{release_bundle_version}/delete:
    post:
      tags:
      - Distribute Release Bundle V1
      summary: Delete Release Bundle V1 Version from Distribution Edges
      description: Remotely deletes a Release Bundle V1 version from edge nodes. The
        distribution rules define which sites should have the bundle removed. Supports
        dry-run mode.
      operationId: deleteReleaseBundleV1VersionFromDistributionEdges
      parameters:
      - $ref: '#/components/parameters/releaseBundleNamePath'
      - $ref: '#/components/parameters/releaseBundleVersionPath'
      requestBody:
        required: true
        description: Deletion rules including target sites and post-deletion behavior
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteReleaseBundleRequest'
      responses:
        '200':
          description: Success - Dry run result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionResponse'
        '202':
          description: Accepted - Delete initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/distribution/{release_bundle_name}/{release_bundle_version}/abort:
    put:
      tags:
      - Distribute Release Bundle V1
      summary: Abort Release Bundle V1 Distribution
      description: Aborts an in-progress V1 distribution. Sends abort signals to all
        edge nodes that are currently receiving the distribution.
      operationId: abortReleaseBundleV1Distribution
      parameters:
      - $ref: '#/components/parameters/releaseBundleNamePath'
      - $ref: '#/components/parameters/releaseBundleVersionPath'
      responses:
        '202':
          description: Accepted - Abort signal sent to edge nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlatformServiceInstance'
        '204':
          description: No Content - No active distributions to abort
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/dynamic/distribute:
    post:
      tags:
      - Distribute Release Bundle V1
      summary: Dynamic Distribute Release Bundle V1
      description: 'Creates a release bundle from the given spec, signs it (using
        optional GPG passphrase), and distributes it to the target edge nodes in one
        request.

        The release bundle name and version are generated by the service. Distribution
        rules define which sites receive the bundle.

        '
      operationId: distributeDynamicReleaseBundleV1
      parameters:
      - name: X-GPG-PASSPHRASE
        in: header
        description: GPG passphrase for signing the release bundle (optional if key
          is not passphrase-protected)
        schema:
          type: string
      requestBody:
        required: true
        description: Release bundle spec and distribution target rules
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DynamicDistributionRequest'
            examples:
              distributeToAll:
                summary: Distribute to all edge nodes
                value:
                  distribution_rules:
                  - site_name: '*'
                  spec:
                    queries: []
              distributeToSpecificSite:
                summary: Distribute to a specific site
                value:
                  distribution_rules:
                  - site_name: edge-node-1
                  spec:
                    queries: []
      responses:
        '202':
          description: Accepted - Dynamic distribution initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DynamicDistributionResponse'
        '400':
          description: Bad Request - Invalid request body or signing key issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
  /v1/distribution/edge_nodes:
    get:
      tags:
      - Distribute Release Bundle V1
      summary: Get Distribution Edge Nodes
      description: Returns a list of registered edge nodes connected to the Distribution
        service.
      operationId: getDistributionEdgeNodes
      parameters:
      - name: limit
        in: query
        description: Maximum number of edge nodes to return
        schema:
          type: integer
      - name: include_source_artifactory
        in: query
        description: Whether to include the source Artifactory instance in the response
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: Success - List of edge nodes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeNodesInfo'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/release_bundle:
    get:
      tags:
      - Release Bundles V1
      summary: Get All Bundles
      description: Returns a list of all V1 release bundles managed by the Distribution
        service.
      operationId: getAllBundles
      parameters:
      - name: start_pos
        in: query
        description: Start position for pagination
        schema:
          type: integer
      responses:
        '200':
          description: Success - List of release bundles
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    version:
                      type: string
                    status:
                      type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
      - Release Bundles V1
      summary: Create Release Bundle V1 Version
      description: Creates a new V1 release bundle. The bundle is created with the
        specified artifacts and configuration. If a GPG passphrase is provided, the
        bundle is signed during creation.
      operationId: createReleaseBundleV1Version
      parameters:
      - name: X-GPG-PASSPHRASE
        in: header
        description: GPG passphrase for signing the bundle during creation
        schema:
          type: string
      - $ref: '#/components/parameters/projectQuery'
      requestBody:
        required: true
        description: Release bundle creation request with name, version, spec, and
          optional signing
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseBundleCreation'
      responses:
        '200':
          description: Success - Release bundle created
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad Request - Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/release_bundle/{release_bundle_name}:
    get:
      tags:
      - Release Bundles V1
      summary: Get Release Bundle V1 Versions by Name
      description: Returns all versions of a named V1 release bundle.
      operationId: getReleaseBundleV1VersionsByName
      parameters:
      - $ref: '#/components/parameters/releaseBundleNamePath'
      - name: start_pos
        in: query
        description: Start position for pagination
        schema:
          type: integer
      responses:
        '200':
          description: Success - List of release bundle versions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    version:
                      type: string
                    created:
                      type: string
                      format: date-time
                    status:
                      type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - The specified release bundle was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Release Bundles V1
      summary: Delete All Release Bundle V1 Versions
      description: Deletes all versions of a named V1 release bundle from the Distribution
        service.
      operationId: deleteAllReleaseBundleV1Versions
      parameters:
      - $ref: '#/components/parameters/releaseBundleNamePath'
      - name: archive
        in: query
        description: Whether to archive instead of permanently delete
        schema:
          type: boolean
      responses:
        '204':
          description: No Content - All versions deleted
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/release_bundle/{release_bundle_name}/LATEST:
    get:
      tags:
      - Release Bundles V1
      summary: Get Latest Release Bundle V1 Version
      description: Returns the latest version of a named V1 release bundle.
      operationId: getLatestReleaseBundleV1Version
      parameters:
      - $ref: '#/components/parameters/releaseBundleNamePath'
      responses:
        '200':
          description: Success - Latest release bundle version details
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - The specified release bundle was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/release_bundle/{release_bundle_name}/{release_bundle_version}:
    get:
      tags:
      - Release Bundles V1
      summary: Get Release Bundle V1 Version Details
      description: Returns details of a specific V1 release bundle version. Supports
        JWS and JOSE response formats.
      operationId: getReleaseBundleV1VersionDetails
      parameters:
      - $ref: '#/components/parameters/releaseBundleNamePath'
      - $ref: '#/components/parameters/releaseBundleVersionPath'
      - name: format
        in: query
        description: Response format
        schema:
          type: string
          enum:
          - jws
          - jose
      responses:
        '200':
          description: Success - Release bundle version details
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  version:
                    type: string
                  description:
                    type: string
                  created:
                    type: string
                    format: date-time
                  status:
                    type: string
                  artifacts:
                    type: array
                    items:
                      type: object
                      properties:
                        repo_path:
                          type: string
                        checksum:
                          type: string
                        props:
                          type: array
                          items:
                            type: object
            application/jose:
              schema:
                type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - The specified release bundle version was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    head:
      tags:
      - Release Bundles V1
      summary: Get Release Bundle V1 Version SHA-256
      description: Returns the SHA-256 checksum of a release bundle version in the
        X-Checksum-Sha256 response header.
      operationId: getReleaseBundleV1VersionSha256
      parameters:
      - $ref: '#/components/parameters/releaseBundleNamePath'
      - $ref: '#/components/parameters/releaseBundleVersionPath'
      responses:
        '200':
          description: Success - SHA-256 returned in header
          headers:
            X-Checksum-Sha256:
              description: SHA-256 checksum of the release bundle
              schema:
                type: string
        '401':
          description: Bad Credentials
        '404':
          description: Not Found
    put:
      tags:
      - Release Bundles V1
      summary: Update Release Bundle V1 Version
      description: Updates an existing V1 release bundle version with new artifacts
        or configuration.
      operationId: updateReleaseBundleV1Version
      parameters:
      - $ref: '#/components/parameters/releaseBundleNamePath'
      - $ref: '#/components/parameters/releaseBundleVersionPath'
      - name: X-GPG-PASSPHRASE
        in: header
        description: GPG passphrase for signing
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseBundleCreation'
      responses:
        '200':
          description: Success - Release bundle updated
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad Request - Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Release Bundles V1
      summary: Delete Release Bundle V1 Version
      description: Deletes a specific V1 release bundle version from the Distribution
        service.
      operationId: deleteReleaseBundleV1Version
      parameters:
      - $ref: '#/components/parameters/releaseBundleNamePath'
      - $ref: '#/components/parameters/releaseBundleVersionPath'
      - name: archive
        in: query
        description: Whether to archive instead of permanently delete
        schema:
          type: boolean
      responses:
        '204':
          description: No Content - Version deleted
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
