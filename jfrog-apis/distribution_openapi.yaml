                releaseBundlesSchema: RBV1
                distributionFriendlyId: 42
                status: IN_PROGRESS
                distributionTrackerId: 12345
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - Admin permission required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/maintenance/generate_token/{actionType}:
    get:
      tags:
      - Maintenance
      summary: Generate Maintenance Execution Token
      description: 'Generates a time-limited encrypted token required to execute a
        maintenance action.

        The token must be used within 3 minutes. Pass the returned token as the request
        body

        to the execute endpoint.


        Requires admin permissions.

        '
      operationId: generateMaintenanceExecutionToken
      parameters:
      - name: actionType
        in: path
        required: true
        description: The type of maintenance action to generate a token for
        schema:
          type: string
          enum:
          - STOP_ALL
          - UNLOCK_STUCK
      responses:
        '200':
          description: Success - Token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Encrypted time-limited execution token (valid for
                      3 minutes)
              example:
                token: encrypted_token_string
        '400':
          description: Bad Request - Invalid action type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - Admin permission required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/maintenance/execute/{actionType}:
    post:
      tags:
      - Maintenance
      summary: Execute Maintenance Action
      description: "Executes a maintenance action using a previously generated token.\
        \ Two action types are supported:\n\n- **UNLOCK_STUCK**: Unlocks all stuck\
        \ distributions, allowing them to be retried or cleaned up.\n  Returns a report\
        \ listing the stuck distributions and whether they were unlocked.\n- **STOP_ALL**:\
        \ Force-stops all in-progress distributions across the cluster, aborts all\n\
        \  non-final trackers in the database, and flushes the task queue. Returns\
        \ a report with\n  affected tracker counts and queue flush status.\n\nThe\
        \ `dryRun` query parameter (defaults to `true`) allows previewing what would\
        \ be affected\nwithout actually performing the action.\n\nRequires admin permissions.\n"
      operationId: executeMaintenanceAction
      parameters:
      - name: actionType
        in: path
        required: true
        description: The type of maintenance action to execute
        schema:
          type: string
          enum:
          - STOP_ALL
          - UNLOCK_STUCK
      - name: dryRun
        in: query
        required: false
        description: If true (default), simulates the action without executing it.
          Set to false to actually perform the action.
        schema:
          type: boolean
          default: true
      requestBody:
        required: true
        description: The encrypted execution token obtained from the generate_token
          endpoint
        content:
          text/plain:
            schema:
              type: string
      responses:
        '202':
          description: Accepted - Action executed (or dry-run result). Response schema
            depends on actionType.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/UnlockStuckReport'
                - $ref: '#/components/schemas/ForceStopAllReport'
        '400':
          description: Bad Request - Invalid action type or token validation failed
            (expired, wrong action type).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - Admin permission required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/maintenance/distributeByLastDays:
    post:
      tags:
      - Maintenance
      summary: Distribute by Last Days
      description: 'Redistributes all release bundles that were distributed within
        a specified time window to a target edge node.

        The time window is defined by a date and a number of days to look back from
        that date.

        For example, specifying `date: "2025-03-11"` and `lastNumberOfDays: 7` will
        redistribute all release bundles

        that were distributed in the 7-day window ending on March 11, 2025.


        The `lastNumberOfDays` value must be between 1 and the configured maximum
        (default: 7).


        Requires admin permissions.

        '
      operationId: distributeByLastDays
      requestBody:
        required: true
        description: Configuration for the time-based redistribution
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DistributeByLastDaysRequest'
            examples:
              redistributeLastWeek:
                summary: Redistribute last 7 days to an edge node
                value:
                  date: '2025-03-11'
                  lastNumberOfDays: 7
                  edgeName: edge-node-1
                  autoCreateMissingRepositories: true
              redistributeLastDay:
                summary: Redistribute last day to an edge node
                value:
                  date: '2025-03-11'
                  lastNumberOfDays: 1
                  edgeName: edge-node-1
                  autoCreateMissingRepositories: false
      responses:
        '200':
          description: Success - Redistribution triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributeByLastDaysResponse'
              example:
                totalTriggered: 3
                triggered:
                - release-bundles-v2/my-bundle/1.0.0
                - release-bundles-v2/my-bundle/1.1.0
                - release-bundles-v2/another-bundle/2.0.0
        '400':
          description: Bad Request - Invalid date format, lastNumberOfDays out of
            range, or edge node not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - Admin permission required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics:
    get:
      tags:
      - Metrics
      summary: Get Open Metrics for Distribution
      description: 'Returns Distribution service metrics in OpenMetrics (Prometheus)
        text format.


        The following metrics are returned:


        | Metric | Description | Prometheus Metric Type |

        |--------|-------------|----------------------|

        | `jfds_total_number_of_release_bundles_total` | The total number of Release
        Bundles created. | COUNTER |

        | `jfds_number_of_created_release_bundle_versions_total` | The number of Release
        Bundle versions created per request type (API, UI). | COUNTER |

        | `jfds_number_of_signed_release_bundle_versions_total` | The total number
        of signed Release Bundle versions. | COUNTER |

        | `jfds_number_of_deleted_release_bundle_versions_total` | The total number
        of deleted Release Bundle versions. | COUNTER |

        | `jfds_size_of_release_bundle_versions_in_bytes_total` | The size (in bytes)
        of all artifacts in all signed Release Bundle versions. | COUNTER |

        | `jfds_number_of_artifacts_in_release_bundle_version_max` | The maximum number
        of artifacts in a Release Bundle version. | GAUGE |

        | `jfds_number_of_artifacts_in_release_bundle_version_bucket` | The number
        of artifacts in a Release Bundle version (rounded off into units of 10, 50,
        100, 500, 1000, 5000, 10000, 50000, and infinite). | HISTOGRAM |

        | `jfds_number_of_artifacts_in_release_bundle_version_per_package_type_total`
        | The number of artifacts in a Release Bundle version per package type. |
        COUNTER |

        | `jfds_number_of_artifactory_queries_total` | The number of queries used
        to construct the Release Bundle. | COUNTER |

        | `jfds_number_of_queries_with_additional_properties_total` | The number of
        queries containing additional properties. | COUNTER |

        | `jfds_number_of_queries_with_path_mapping_total` | The total number of queries
        that include path mapping (path and repo modifications). | COUNTER |

        | `jfds_number_of_path_mapping_based_on_last_promotion_total` | The total
        number of path mappings based on the last successful Release Bundle v2 promotion.
        | COUNTER |

        | `jfds_number_of_modifications_of_path_total` | The total number of modifications
        made to the original path during distribution operations. | COUNTER |

        | `jfds_number_of_modifications_of_repo_total` | The total number of modifications
        that have been made to the original repository. | COUNTER |

        | `jfds_distribution_build_info` | The Distribution service version and revision.
        | GAUGE |

        | `jfds_total_number_of_distribution_requests_total` | The total number of
        Release Bundle v1 distribution start actions. | COUNTER |

        | `jfds_total_number_of_distribution_requests_v2_total` | The total number
        of Release Bundle v2 distribution start actions. | COUNTER |

        | `jfds_total_number_of_distribution_requests_with_project_v2_total` | The
        total number of Release Bundle v2 distribution start actions performed in
        the context of a project. | COUNTER |

        | `jfds_number_of_distribution_requests_per_trigger_type_total` | The total
        number of Release Bundle (v1 & v2) distribution start actions per request
        type (API, UI). | COUNTER |

        | `jfds_total_number_of_exports_requests_v2_total` | The total number of export
        operations for Release Bundle v2 versions. | COUNTER |

        | `jfds_number_of_distributions_per_status_total` | The total number of Release
        Bundle v1 distributions per status (completed, failed). | COUNTER |

        | `jfds_number_of_distributions_per_status_v2_total` | The total number of
        Release Bundle v2 distributions per status (completed, failed). | COUNTER
        |

        | `jfds_number_of_exports_per_status_v2_total` | The total number of export
        operations per status (completed, failed). | COUNTER |

        | `jfds_number_of_remote_deletion_requests_per_trigger_type_total` | The total
        number of Release Bundle v1 remote delete actions per request type (API, UI).
        | COUNTER |

        | `jfds_number_of_remote_deletion_requests_per_trigger_type_v2_total` | The
        total number of Release Bundle v2 remote delete actions per request type (API,
        UI). | COUNTER |

        | `jfds_number_of_approved_distributions_total` | The total number of Release
        Bundle v1 distribution/exports approved by Xray. | COUNTER |

        | `jfds_number_of_approved_distributions_v2_total` | The number of Release
        Bundle v2 distributions/exports approved by Xray. | COUNTER |

        | `jfds_number_of_xray_scan_result_not_allowed_total` | The total number of
        distribution failures due to Xray scan results of NOT ALLOWED. Possible reasons:
        blocked, not_indexed (v2 only), not_found_in_artifactory (v2 only). | COUNTER
        |

        | `jfds_number_of_rejected_distributions_total` | The total number of Release
        Bundle v1 distribution/exports blocked by Xray. | COUNTER |

        | `jfds_number_of_rejected_distributions_v2_total` | The total number of Release
        Bundle v2 distribution/exports blocked by Xray. | COUNTER |

        | `jfds_number_of_api_requests_per_endpoint_total` | The total number of API
        requests that were processed per endpoint. | COUNTER |

        '
      operationId: getOpenMetricsForDistribution
      responses:
        '200':
          description: Success - Metrics in OpenMetrics format
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - Requires system metrics read permission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/system/ping:
    get:
      tags:
      - System
      summary: Distribution Ping
      description: 'Health check that indicates whether the Distribution service is
        running and its dependent services (e.g. Artifactory, Access) are available.

        Returns a JSON body with status. May allow unauthenticated access depending
        on platform configuration; otherwise returns 401.

        '
      operationId: distributionPing
      security: []
      responses:
        '200':
          description: Success - Service and dependent services are alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
              example:
                message: ok
                status_code: 200
        '401':
          description: Unauthorized - Unauthenticated access is forbidden (e.g. when
            anonymous access is disabled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
              example:
                detail: Unauthenticated access to the following path '/v1/system/ping'
                  is forbidden.
                message: Authentication failed - Forbidden
                status_code: 401
        '500':
          description: Internal Server Error - One or more dependent services are
            unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
  /v1/system/info:
    get:
      tags:
      - System
      summary: Get Distribution System Info
      description: Returns system information about the Distribution service including
        version, service ID, and health status (STABLE/UNSTABLE). When dependent services
        are unavailable, status is UNSTABLE and message describes which services are
        down.
      operationId: getDistributionSystemInfo
      responses:
        '200':
          description: Success - System information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemInfo'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
  /v1/system/settings:
    get:
      tags:
      - System
      summary: Get Distribution System Settings
      description: Returns the current system settings for the Distribution service.
        Requires admin permissions.
      operationId: getDistributionSystemSettings
      responses:
        '200':
          description: Success - Current system settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSettings'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
        '403':
          description: Permission Denied - Admin permission required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
    post:
      tags:
      - System
      summary: Update Distribution System Settings
      description: Updates the system settings for the Distribution service. Requires
        admin permissions.
      operationId: updateDistributionSystemSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemSettings'
      responses:
        '200':
          description: Success - Settings updated (no response body)
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
        '403':
          description: Permission Denied - Admin permission required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
components:
  parameters:
    releaseBundleNamePath:
      name: release_bundle_name
      in: path
      required: true
      description: Release bundle name
      schema:
        type: string
    releaseBundleVersionPath:
      name: release_bundle_version
      in: path
      required: true
      description: Release bundle version
      schema:
        type: string
    repositoryKeyQuery:
      name: repository_key
      in: query
      description: Storing repository key for the release bundle
      schema:
        type: string
    projectQuery:
      name: project
      in: query
      description: JFrog project key
      schema:
        type: string
  schemas:
    ErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              status:
                type: integer
              message:
                type: string
        detail:
          type: string
        message:
          type: string
        status_code:
          type: integer
    MessageStatusResponse:
      type: object
      description: Common response body with message and HTTP status code. Used for
        ping success and for many error responses (401, 500) across the API.
      properties:
        message:
          type: string
          description: Human-readable message
        status_code:
          type: integer
          description: HTTP status code
        detail:
          type: string
          description: Optional extra detail (e.g. path that is forbidden for 401)
    SystemInfo:
      type: object
      description: System information for the Distribution service
      properties:
        version:
          type: string
          description: Distribution service version
        serviceId:
          type: string
          description: Formatted service identifier
        status:
          type: string
          enum:
          - STABLE
          - UNSTABLE
          description: Health status; UNSTABLE when one or more dependent services
            are unavailable
        message:
          type: string
          description: Present when status is UNSTABLE; describes which dependent
            services are unavailable
    RBv2DistributionRequest:
      type: object
      description: Request model for distributing a Release Bundle v2
      properties:
        dry_run:
          type: boolean
          description: If true, simulates the distribution without actually performing
            it
          default: false
        distribution_rules:
          type: array
          description: Rules defining target sites and optional filters
          items:
            $ref: '#/components/schemas/DistributionRule'
        auto_create_missing_repositories:
          type: boolean
          description: Whether to auto-create missing repositories on target edge
            nodes
        modifications:
          type: object
          description: Path mapping modifications for the distribution
        insecure_tls:
          type: boolean
          description: Whether to allow insecure TLS connections to edge nodes
    DistributionRequest:
      type: object
      description: Request model for distribution operations
      properties:
        dry_run:
          type: boolean
          description: If true, simulates the operation without actually performing
            it
          default: false
        distribution_rules:
          type: array
          description: Rules defining target sites
          items:
            $ref: '#/components/schemas/DistributionRule'
        auto_create_missing_repositories:
          type: boolean
          description: Whether to auto-create missing repositories on target edge
            nodes
    DeleteReleaseBundleRequest:
      type: object
      description: Request model for deleting a release bundle from edge nodes
      properties:
        dry_run:
          type: boolean
          description: If true, simulates the deletion without actually performing
            it
          default: false
        distribution_rules:
          type: array
          description: Rules defining target sites for deletion
          items:
            $ref: '#/components/schemas/DistributionRule'
        on_success:
          type: string
          description: Action to perform on the source after successful remote deletion
          enum:
          - keep
          - delete
    DistributionRule:
      type: object
      description: Rule defining distribution targets
      properties:
        site_name:
          type: string
          description: Target site name. Use * to target all sites.
        city_name:
          type: string
          description: City name filter
        country_codes:
          type: array
          items:
            type: string
          description: Country code filters (ISO 3166-1 alpha-2)
    DynamicDistributionRequest:
      type: object
      description: Request body for dynamic distribution - release bundle spec and
        distribution target rules
      required:
      - distribution_rules
      properties:
        distribution_rules:
          type: array
          description: Rules defining target edge nodes/sites
          minItems: 1
          items:
            $ref: '#/components/schemas/DistributionRule'
        spec:
          type: object
          description: Release bundle content spec (queries and optional project key)
          properties:
            queries:
              type: array
              description: List of queries defining which artifacts to include in
                the release bundle
              items: {}
            project_key:
              type: string
              description: JFrog project key
    DistributionResponse:
      type: object
      description: Response from a distribution or deletion operation (V1/V2 distribute,
        V1 delete)
      properties:
        id:
          type: integer
          format: int64
          description: Distribution tracker ID
        sites:
          type: array
          description: Target edge nodes the distribution was sent to (or will be
            sent to)
          items:
            $ref: '#/components/schemas/PlatformServiceInstance'
    DynamicDistributionResponse:
      type: object
      description: Response from dynamic distribution - same as DistributionResponse
        plus the generated release bundle name and version
      allOf:
      - $ref: '#/components/schemas/DistributionResponse'
      - type: object
        required:
        - name
        - version
        properties:
          name:
            type: string
            description: Generated release bundle name
          version:
            type: string
            description: Generated release bundle version
    DistributionTrackerSimple:
      type: object
      description: Simple distribution tracker summary
      properties:
        distribution_id:
          type: integer
          format: int64
          description: Distribution tracker ID
        status:
          type: string
          description: Overall distribution status
        distributed_by:
          type: string
          description: User who initiated the distribution
        started:
          type: string
          description: Timestamp when the distribution was started
        type:
          type: string
          description: Distribution type (distribute, delete)
    DistributionProgress:
      type: object
      description: Detailed distribution progress including per-edge-node status
      properties:
        distribution_id:
          type: integer
          format: int64
        status:
          type: string
        distributed_by:
          type: string
        started:
          type: string
        type:
          type: string
        edge_nodes:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              service_id:
                type: string
              status:
                type: string
    PlatformServiceInstance:
      type: object
      description: Platform service instance (edge node) information
      properties:
        service_id:
          type: string
          description: Unique service identifier
        name:
          type: string
          description: Display name of the service instance
        type:
          type: string
          description: Service type (e.g. Artifactory)
    EdgeNodesInfo:
      type: object
      description: Information about connected edge nodes
      properties:
        edge_nodes:
          type: array
          items:
            $ref: '#/components/schemas/PlatformServiceInstance'
    PropagationReport:
      type: object
      description: Report of key propagation results across edge nodes
    ReleaseBundleCreation:
      type: object
      description: Request model for creating or updating a V1 release bundle
    DestinationPermission:
      type: object
      description: Destination permission controlling which users and groups can distribute
        or delete release bundles to specific edge nodes
      properties:
        id:
          type: string
          description: Unique permission identifier (read-only, assigned by the system)
          readOnly: true
        name:
          type: string
          description: Display name of the permission (read-only, set from the path
            parameter)
          readOnly: true
        resourceType:
          type: string
          description: Resource type (always "DESTINATION")
          readOnly: true
          enum:
          - DESTINATION
        distribution_destinations:
          type: array
          description: Rules defining which edge nodes this permission grants access
            to. Use site name, city name, and/or country codes to target specific
            nodes.
          items:
            type: object
            properties:
              siteName:
                type: string
                description: Target site name. Use "*" to match all sites.
              cityName:
                type: string
                description: City name filter
              countryCodes:
                type: array
                items:
                  type: string
                description: Country code filters (ISO 3166-1 alpha-2)
        principals:
          type: object
          description: Users and groups with their permitted actions
          properties:
            users:
              type: object
              description: Map of username to list of permitted action codes (e.g.,
                "distribute", "delete")
              additionalProperties:
                type: array
                items:
                  type: string
                  enum:
                  - distribute
                  - delete
            groups:
              type: object
              description: Map of group name to list of permitted action codes (e.g.,
                "distribute", "delete")
              additionalProperties:
                type: array
                items:
                  type: string
                  enum:
                  - distribute
                  - delete
    StuckDistribution:
      type: object
      description: A distribution that is stuck in a non-final state
      properties:
        bundleName:
          type: string
          description: Name of the release bundle
        bundleVersion:
          type: string
          description: Version of the release bundle
        releaseBundlesSchema:
          type: string
          description: Release bundle schema type
          enum:
          - RBV1
          - RBV2
          - RBV2_ATW
        distributionFriendlyId:
          type: integer
          format: int64
          description: User-facing distribution ID
        status:
          type: string
          description: Current distribution status
          enum:
          - STORING_IN_PROGRESS
          - XRAY_SCAN_IN_PROGRESS
          - QUEUED
          - IN_PROGRESS
          - VALIDATE
          - CLOSE_IN_PROGRESS
          - ABORT_IN_PROGRESS
        distributionTrackerId:
          type: integer
          format: int64
          description: Internal distribution tracker ID
    UnlockStuckReport:
      type: object
      description: Report from the UNLOCK_STUCK maintenance action
      properties:
        stuckDistributions:
          type: array
          description: List of distributions that were identified as stuck
          items:
            $ref: '#/components/schemas/StuckDistribution'
        unlocked:
          type: boolean
          description: Whether the stuck distributions were actually unlocked (false
            if dry-run)
    ForceStopAllReport:
      type: object
      description: Report from the STOP_ALL maintenance action
      properties:
        trackersDbInfo:
          type: object
          description: Database tracker update counts
          properties:
            affectedEdgeTrackerArtifacts:
              type: integer
              description: Number of edge node tracker artifacts that were (or would
                be) marked as aborted
            affectedEdgeTrackers:
              type: integer
              description: Number of edge node trackers that were (or would be) marked
                as aborted
            affectedTrackers:
              type: integer
              description: Number of distribution trackers that were (or would be)
                marked as aborted
        tasksQueueFlushed:
          type: boolean
          description: Whether the task queue was actually flushed (false if dry-run)
    DistributeByLastDaysRequest:
      type: object
      description: Request model for redistributing release bundles from a time window
        to a target edge node
      required:
      - date
      - lastNumberOfDays
      - edgeName
      properties:
        date:
          type: string
          description: End date for the time window in YYYY-MM-DD format
          example: '2025-03-11'
        lastNumberOfDays:
          type: integer
          description: 'Number of days to look back from the specified date. Must
            be between 1 and the configured maximum (default: 7).'
          minimum: 1
          example: 7
        edgeName:
          type: string
          description: Name of the target edge node to redistribute the release bundles
            to
          example: edge-node-1
        autoCreateMissingRepositories:
          type: boolean
          description: Whether to automatically create missing repositories on the
            target edge node
          default: false
    DistributeByLastDaysResponse:
      type: object
      description: Response from the distribute by last days operation
      properties:
        totalTriggered:
          type: integer
          description: Total number of release bundles triggered for redistribution
          example: 3
        triggered:
          type: array
          description: Identifiers of the release bundles that were triggered for
            redistribution (format repository/name/version)
          items:
            type: string
          uniqueItems: true
          example:
          - release-bundles-v2/my-bundle/1.0.0
          - release-bundles-v2/my-bundle/1.1.0
    SystemSettings:
      type: object
      description: Distribution system settings
      properties:
        call_home_enabled:
          type: boolean
          description: Whether the Call Home feature is enabled
    TokenResponse:
      type: object
      description: OAuth2 token response (create or refresh)
      properties:
        access_token:
          type: string
          description: The access token value
        expires_in:
          type: integer
          format: int64
          description: Token validity in seconds
        scope:
          type: string
          description: Granted scopes
        token_type:
          type: string
          description: Token type (e.g. Bearer)
        refresh_token:
          type: string
          description: Refresh token (when refreshable)
    TokenInfo:
      type: object
      description: Token metadata (for list endpoint)
      properties:
        token_id:
          type: string
          description: Unique token identifier
        issuer:
          type: string
          description: Token issuer
        subject:
          type: string
          description: Token subject (username)
        issued_at:
          type: integer
          format: int64
          description: Issued-at time (epoch seconds)
        expiry:
          type: integer
          format: int64
          description: Expiration time (epoch seconds)
        refreshable:
          type: boolean
          description: Whether the token can be refreshed
    TokensResponse:
      type: object
      description: List of token info
      properties:
        tokens:
          type: array
          items:
            $ref: '#/components/schemas/TokenInfo'
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    BearerAuth:
      type: http
      scheme: bearer
security:
- BasicAuth: []
- BearerAuth: []
