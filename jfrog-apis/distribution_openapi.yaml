  /v1/security/permissions/{permission_name}:
    get:
      tags:
      - Permissions
      summary: Get Permission by Name
      description: Returns a specific destination permission by name. Requires admin
        permissions.
      operationId: getDistributionPermissionByName
      parameters:
      - name: permission_name
        in: path
        required: true
        description: Permission name
        schema:
          type: string
      responses:
        '200':
          description: Success - Permission details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DestinationPermission'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - The specified permission was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
      - Permissions
      summary: Create or Update Destination Permission by Name
      description: 'Creates or updates a destination permission that controls which
        users and groups can

        distribute or delete release bundles to specific edge nodes.


        The `distribution_destinations` field is required and defines the target edge
        nodes

        using site name, city name, and/or country code filters. The `principals`
        field defines

        which users and groups are granted which actions (distribute, delete).


        If a permission with the given name does not exist, it will be created. If
        it already

        exists, it will be updated.


        Requires admin permissions.

        '
      operationId: setDistributionPermission
      parameters:
      - name: permission_name
        in: path
        required: true
        description: Permission name to create or update
        schema:
          type: string
      requestBody:
        required: true
        description: Permission configuration with destination rules and principal
          actions
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DestinationPermission'
            examples:
              allSites:
                summary: Grant distribute and delete to a user for all sites
                value:
                  distribution_destinations:
                  - siteName: '*'
                  principals:
                    users:
                      admin_user:
                      - distribute
                      - delete
                    groups:
                      dev-team:
                      - distribute
              specificSite:
                summary: Grant distribute to a group for a specific site
                value:
                  distribution_destinations:
                  - siteName: edge-node-1
                  - siteName: edge-node-2
                  principals:
                    groups:
                      release-managers:
                      - distribute
                      - delete
      responses:
        '200':
          description: Success - Permission created or updated. Returns the persisted
            permission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DestinationPermission'
        '400':
          description: Bad Request - Invalid permission configuration (e.g., missing
            distribution_destinations).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - A permission conflict occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Permissions
      summary: Delete Permission by Name
      description: Deletes a destination permission by name. Requires admin permissions.
      operationId: deleteDistributionPermission
      parameters:
      - name: permission_name
        in: path
        required: true
        description: Permission name to delete
        schema:
          type: string
      responses:
        '204':
          description: No Content - Permission deleted successfully
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - The specified permission was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
