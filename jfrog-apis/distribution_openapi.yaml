  /v1/security/token:
    post:
      tags:
      - Token
      summary: Create or Refresh Token
      description: 'Creates a new access token (grant_type=client_credentials) or
        refreshes an existing one (grant_type=refresh_token).

        Request must be application/x-www-form-urlencoded.


        **Create token (client_credentials):** Requires username and optionally scope,
        expires_in, refreshable.

        Supported scopes are admin and groups. Non-admin users can only create tokens
        for themselves and cannot request admin scope.


        **Refresh token (refresh_token):** Requires grant_type, refresh_token, and
        access_token; optionally expires_in and refreshable.

        '
      operationId: createOrRefreshToken
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  description: OAuth2 grant type
                  enum:
                  - client_credentials
                  - refresh_token
                  default: client_credentials
                username:
                  type: string
                  description: Required for client_credentials; user to create token
                    for
                scope:
                  type: string
                  description: Space-separated scopes (e.g. "admin" or "groups")
                expires_in:
                  type: integer
                  format: int64
                  description: Token validity in seconds (0 or omitted for default)
                  default: 0
                refreshable:
                  type: boolean
                  description: Whether the token can be refreshed
                refresh_token:
                  type: string
                  description: Required for refresh_token grant; the refresh token
                access_token:
                  type: string
                  description: Required for refresh_token grant; the current access
                    token
      responses:
        '200':
          description: OK - Token refreshed (refresh_token grant)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '201':
          description: Created - New token created (client_credentials grant)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Bad Request - Invalid parameters or grant type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
        '403':
          description: Forbidden - Not allowed to create token for this user or with
            requested scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
    get:
      tags:
      - Token
      summary: Get Token Infos
      description: Returns information about tokens (e.g. token ID, issuer, subject,
        expiry). Requires admin permission.
      operationId: getTokenInfos
      responses:
        '200':
          description: Success - List of token info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
        '403':
          description: Permission Denied - Admin permission required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
  /v1/security/token/revoke:
    post:
      tags:
      - Token
      summary: Revoke Token
      description: 'Revokes a token by providing either the token value (access or
        refresh token) or the token ID.

        Request must be application/x-www-form-urlencoded. See RFC 7009 (Token Revocation).

        Requires admin permission.

        '
      operationId: revokeToken
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: The access token or refresh token to revoke (mutually
                    exclusive with token_id)
                token_id:
                  type: string
                  description: The ID of the token to revoke (mutually exclusive with
                    token)
      responses:
        '200':
          description: Success - Token revoked
        '400':
          description: Bad Request - Missing or invalid parameters (e.g. both token
            and token_id provided)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
        '403':
          description: Permission Denied - Admin permission required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
        '404':
          description: Not Found - Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageStatusResponse'
