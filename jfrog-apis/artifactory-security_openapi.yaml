security:
- BasicAuth: []
- ApiKeyAuth: []
- BearerAuth: []
components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-JFrog-Art-Api
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    ErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              status:
                type: integer
                description: HTTP status code
              message:
                type: string
                description: Error message
    UserConfiguration:
      type: object
      properties:
        name:
          type: string
          description: The username
        email:
          type: string
          description: The user's email address
        lastLoggedIn:
          type: string
          format: date-time
          description: Last login timestamp in ISO8601 format
        realm:
          type: string
          description: The user's authentication realm
        admin:
          type: boolean
          description: Whether the user is an administrator
        profileUpdatable:
          type: boolean
          description: Whether the user can update their own profile
        internalPasswordDisabled:
          type: boolean
          description: Whether internal password authentication is disabled
        groups:
          type: array
          items:
            type: string
          description: List of groups the user belongs to
        disableUIAccess:
          type: boolean
          description: Whether UI access is disabled for this user
        policyViewer:
          type: boolean
          description: Whether the user has policy viewer permissions
        policyManager:
          type: boolean
          description: Whether the user has policy manager permissions
        watchManager:
          type: boolean
          description: Whether the user has watch manager permissions
        reportsManager:
          type: boolean
          description: Whether the user has reports manager permissions
        mfaStatus:
          type: string
          description: Multi-factor authentication status
          enum:
          - NONE
          - ENABLED
          - DISABLED
        status:
          type: string
          description: User account status
          enum:
          - ENABLED
          - DISABLED
          - LOCKED
