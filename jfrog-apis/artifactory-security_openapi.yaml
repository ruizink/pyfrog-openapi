openapi: 3.1.0
info:
  title: JFrog Artifactory Security API
  description: "REST API for managing security settings in JFrog Artifactory, including\
    \ users, permissions, API keys, GPG keys, certificates, and encryption. \n\nNote\
    \ - From Artifactory release 7.49.3, the security APIs are being decoupled from\
    \ Artifactory and moving to JFrog Platform Access. This means that the security\
    \ APIs below are planned to be deprecated at a later stage. We recommend using\
    \ the available new APIs for all your security and access needs moving forward.\n"
  version: 1.0.0
  contact:
    name: JFrog Support
servers:
- url: https://{jfrog_url}/artifactory/api
  description: JFrog Platform
  variables:
    jfrog_url:
      default: myserver.jfrog.io
      description: Your JFrog Platform hostname (e.g., mycompany.jfrog.io)
tags:
- name: Users
  description: User management operations
- name: Permissions
  description: Permission target management operations
- name: API Keys
  description: API key management operations
- name: GPG Keys
  description: Basic GPG key management operations
- name: GPG Trusted Keys
  description: Distribution GPG trusted key management operations
- name: GPG Key Pairs
  description: GPG key pair management for signing operations
- name: Certificates
  description: Certificate management operations
- name: Encryption
  description: Encryption management operations
- name: User Lock Policy
  description: User lock policy management operations
- name: Password Management
  description: Password management operations
paths:
  /security/users/{userName}:
    get:
      tags:
      - Users
      summary: Get User Details
      description: "Get the details of an Artifactory user.\n\nSince: 2.4.0\n\nNotes:\
        \ Requires Artifactory Pro. \n\nSecurity: Requires an admin user"
      operationId: getUserDetails
      parameters:
      - name: userName
        in: path
        required: true
        schema:
          type: string
        description: The name of the user
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserConfiguration'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - The specified resource was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/encryptedPassword:
    get:
      tags:
      - Password Management
      summary: Get User Encrypted Password
      description: "Get the encrypted password of the authenticated requestor. \n\n\
        The request needs to be authenticated using a clear-text password. If you\
        \ authenticate with an API key, the encrypted API key will be returned in\
        \ the response.\n\nSince: 3.3.0\n\nSecurity: Requires a privileged user"
      operationId: getUserEncryptedPassword
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/users/authorization/expirePassword:
    post:
      tags:
      - Password Management
      summary: Expire Password for Multiple Users
      description: 'Expires password for a list of users


        Since: 4.4.2


        Notes: Requires Artifactory Pro


        Security: Requires an admin user'
      operationId: expirePasswordForMultipleUsers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
              description: List of user names
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/users/authorization/unexpirePassword/{userName}:
    post:
      tags:
      - Password Management
      summary: Unexpire Password for a Single User
      description: "Unexpires a user's password. \n\nArtifactory REST API Future Breaking\
        \ Change: In an upcoming release of Artifactory, JFrog will expire the \"\
        Unexpire Password for a Single User\" endpoint from the Artifactory REST APIs\
        \ and the UI that goes with it (once API v1 is fully deprecated). This means\
        \ this API will not available in Artifactory REST API V2.\n\nSince: 4.4.2\n\
        \nNotes: Requires Artifactory Pro\n\nSecurity: Requires an admin user"
      operationId: unexpirePasswordForSingleUser
      parameters:
      - name: userName
        in: path
        required: true
        schema:
          type: string
        description: The name of the user
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - The specified resource was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/userLockPolicy:
    get:
      tags:
      - User Lock Policy
      summary: Retrieve User Lock Policy
      description: 'Returns the currently configured user lock policy.


        Since: 4.4


        Security: Requires a valid admin user'
      operationId: getUserLockPolicy
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  loginAttempts:
                    type: integer
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
      - User Lock Policy
      summary: Configure User Lock Policy
      description: 'Configures the user lock policy that locks users out of their
        account if the number of repeated incorrect login attempts exceeds the configured
        maximum allowed.


        Since: 4.4


        Security: Requires a valid admin user'
      operationId: configureUserLockPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - enabled
              - loginAttempts
              properties:
                enabled:
                  type: boolean
                  description: Enable or disable the user lock policy
                loginAttempts:
                  type: integer
                  description: The maximum number of login attempts allowed
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/lockedUsers:
    get:
      tags:
      - User Lock Policy
      summary: Get Locked Out Users
      description: 'If locking out users is enabled, lists all users that were locked
        out due to recurrent incorrect login attempts.


        Since: 4.4


        Security: Requires a valid admin user'
      operationId: getLockedOutUsers
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/unlockUsers:
    post:
      tags:
      - User Lock Policy
      summary: Unlock Locked-Out Users
      description: 'Unlocks a list of users that were locked out due to recurrent
        incorrect login attempts.


        Since: 4.4


        Security: Requires a valid admin user'
      operationId: unlockLockedOutUsers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
              description: List of user names
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/unlockAllUsers:
    post:
      tags:
      - User Lock Policy
      summary: Unlock All Locked Out Users
      description: 'Unlocks all users that were locked out due to recurrent incorrect
        login attempts.


        Since: 4.4


        Security: Requires a valid admin user'
      operationId: unlockAllLockedOutUsers
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/configuration/passwordExpirationPolicy:
    get:
      tags:
      - Password Management
      summary: Get Password Expiration Policy
      description: 'Returns the password expiration policy


        Since: 4.4.2


        Notes: Requires Artifactory Pro


        Security: Requires an admin user'
      operationId: getPasswordExpirationPolicy
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: string
                  passwordMaxAge:
                    type: string
                  notifyByEmail:
                    type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
      - Password Management
      summary: Set Password Expiration Policy
      description: 'Sets the password expiration policy


        Since: 4.4.2


        Notes: Requires Artifactory Pro


        Security: Requires an admin user'
      operationId: setPasswordExpirationPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: string
                  enum:
                  - 'true'
                  - 'false'
                passwordMaxAge:
                  type: string
                  description: Password max age (1-999)
                notifyByEmail:
                  type: string
                  enum:
                  - 'true'
                  - 'false'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/apiKey:
    post:
      tags:
      - API Keys
      summary: Create API Key
      description: 'Create an API key for the current user. Returns an error if API
        key already exists - use regenerate API key instead.


        Since: 4.3.0'
      operationId: createApiKey
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKey:
                    type: string
        '400':
          description: Bad Request - API key already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
      - API Keys
      summary: Regenerate API Key
      description: 'Regenerate an API key for the current user


        Since: 4.3.0'
      operationId: regenerateApiKey
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKey:
                    type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
      - API Keys
      summary: Get API Key
      description: 'Get the current user''s own API key


        Since: 4.3.0'
      operationId: getApiKey
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKey:
                    type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - API key does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - API Keys
      summary: Revoke API Key
      description: 'Revokes the current user''s API key or all API keys currently
        defined in the system.


        Since: 4.3.0'
      operationId: revokeApiKey
      parameters:
      - name: deleteAll
        in: query
        schema:
          type: integer
          enum:
          - 0
          - 1
        description: When set to 1, revokes all API keys currently defined in the
          system. Requires admin privileges.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/apiKey/{username}:
    delete:
      tags:
      - API Keys
      summary: Revoke User API Key
      description: 'Revokes the API key of another user.


        Since: 4.3.0


        Security: Requires a privileged user (Admin only)'
      operationId: revokeUserApiKey
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
        description: The name of the user
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - The specified resource was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/permissions:
    get:
      tags:
      - Permissions
      summary: Get Permission Targets
      description: 'Get the permission targets list


        Since: 2.4.0


        Notes: Requires Artifactory Pro. To support spaces in the User or Group or
        Permission names, a Plus symbol (+) is automatically placed when there is
        a space. This is set by default as the artifactory.


        Security: Requires an admin user'
      operationId: getPermissionTargets
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    uri:
                      type: string
                      format: uri
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/permissions/{permissionTargetName}:
    get:
      tags:
      - Permissions
      summary: Get Permission Target Details
      description: "Returns the details of an Artifactory Permission Target\n\nSince:\
        \ 2.4.0\n\nNotes: Requires Artifactory Pro. \n\nSecurity: Requires an admin\
        \ user"
      operationId: getPermissionTargetDetails
      parameters:
      - name: permissionTargetName
        in: path
        required: true
        schema:
          type: string
        description: The name of the permission target
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - The specified resource was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
      - Permissions
      summary: Create or Replace Permission Target
      description: "Creates a new permission target in the JFrog Unified Platform\
        \ or replaces an existing permission target\n\nSince: 2.4.0\n\nNotes: Requires\
        \ Artifactory Pro. \n\n- Missing values will be set to the default values\
        \ as defined by the consumed type.\n\n- Please note when adding Release Bundles\
        \ permission targets\n\n- Requires an Edge/Enterprise+ license\n\nOn Edge\
        \ nodes, the repositories section in the request body can be left empty or\
        \ contain the ‘release-bundles’ default repository. No other repositories\
        \ are allowed. An Enterprise+ license allows you to add any repository\n\n\
        The default repository in the repository section is “release-bundles” for\
        \ both Edge/EntPlus licenses. (if user create permission target with empty\
        \ repositories section the repository that we put is “release bundles”)\n\n\
        - To support spaces in the User or Group or Permission names, a Plus symbol\
        \ (+) is automatically placed when there is a space. This is set by default\
        \ as the artifactory.\n\nsecurity.api.plus.insteadof.space property is set\
        \ to true. If you want to use the + (plus) symbol, set the artifactory.security.api.plus.insteadof.space\
        \ to false.\n\nSecurity: Requires an admin user"
      operationId: createOrReplacePermissionTarget
      parameters:
      - name: permissionTargetName
        in: path
        required: true
        schema:
          type: string
        description: The name of the permission target
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - repositories
              properties:
                name:
                  type: string
                  description: The name of the permission target
                includesPattern:
                  type: string
                  description: A regex pattern that defines which repositories to
                    include in this permission. The default is "**" (all).
                excludesPattern:
                  type: string
                  description: A regex pattern that defines which repositories to
                    explicitly exclude from this permission. The default is "" (none).
                repositories:
                  type: array
                  items:
                    type: string
                  description: Defines the local and remote repositories included
                    as resources for this permission. Note - Virtual repositories
                    are not supported.
                principals:
                  type: object
                  properties:
                    users:
                      type: object
                      additionalProperties:
                        type: array
                        items:
                          type: string
                          enum:
                          - m
                          - d
                          - w
                          - n
                          - r
                          - mxm
                          - x
                      description: Permissions are set/returned according to the following
                        conventions m=admin; d=delete; w=deploy; n=annotate; r=read;
                        mxm=managedXrayMeta; x=distribute
                    groups:
                      type: object
                      additionalProperties:
                        type: array
                        items:
                          type: string
                          enum:
                          - m
                          - d
                          - w
                          - n
                          - r
                          - mxm
                          - x
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
