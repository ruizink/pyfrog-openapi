        created_by:
          type: string
          description: User who created the promotion
        created:
          type: string
          description: Creation timestamp
        created_millis:
          type: integer
          format: int64
          description: Creation timestamp in milliseconds
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/BundleItemDescriptorModel'
          description: List of artifacts in the promotion
    GetPromotionsByArtifactResponse:
      type: object
      properties:
        promotions:
          type: array
          items:
            $ref: '#/components/schemas/PromotionSummary'
        total:
          type: integer
          description: Total number of promotions
    DistributeBundleRequest:
      type: object
      properties:
        auto_create_missing_repositories:
          type: boolean
          description: Determines whether to create missing repositories automatically
            on the distribution targets. The default value is false.
        distribution_rules:
          type: array
          items:
            $ref: '#/components/schemas/DistributionRule'
          description: Filters that define which distribution targets to include when
            distributing the Release Bundle
        modifications:
          $ref: '#/components/schemas/DistributionModifications'
          description: Optional path mapping for the artifacts on the distribution
            targets
    DistributionRule:
      type: object
      properties:
        site_name:
          type: string
          description: Defines a wildcard filter for a site name. The default value
            is *.
        city_name:
          type: string
          description: Defines a wildcard filter for a city name. The default value
            is *.
        country_codes:
          type: array
          items:
            type: string
          description: Defines one or more filters for country codes. The default
            value is [*].
    DistributionModifications:
      type: object
      properties:
        default_path_mapping_by_last_promotion:
          type: boolean
          description: When set to true, the repositories used for the most recent
            promotion of the Release Bundle version are provided as the path mapping.
        mappings:
          type: array
          items:
            $ref: '#/components/schemas/PathMapping'
          description: Defines the input and output regex mapping pairs
    PathMapping:
      type: object
      properties:
        input:
          type: string
          description: The input regular expression that defines where the artifacts
            to distribute are located
        output:
          type: string
          description: The output regular expression that defines the target artifact
            path with parameters from the input regex
    DistributeBundleResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
