        description: Release bundle version
        required: true
        schema:
          type: string
          pattern: ^\w[\w\-.+]*$
      - name: project
        in: query
        description: The project key used to determine the Release Bundles repository
        required: false
        schema:
          type: string
      - name: repository_key
        in: query
        description: The Release Bundles repository identifier
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Submitted - The deletion request was submitted successfully.
        '401':
          description: Bad Credentials - Authentication failed.
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Permission Denied - The user does not have Admin permissions.
          content:
            application/json:
              schema:
                type: object
  /release_bundle/{name}/{version}/finalize:
    post:
      tags:
      - BundleResource
      summary: Finalize Release Bundle v2 Version
      description: Finalizes a draft Release Bundle v2 version, making it immutable.
        Once finalized, a bundle version cannot be updated further. This operation
        is idempotent and will succeed even if the bundle is already finalized.
      operationId: finalizeBundleVersion
      parameters:
      - name: name
        in: path
        description: Release bundle name
        required: true
        schema:
          type: string
          pattern: ^\w[\w\-.]*$
      - name: version
        in: path
        description: Release bundle version
        required: true
        schema:
          type: string
          pattern: ^\w[\w\-.+]*$
      - name: project
        in: query
        description: The project key used to determine the Release Bundles repository.
          By convention, each project may contain only one Release Bundles system
          repository with the name <project-key>-release-bundles-v2. This query parameter
          may be used instead of repository_key.
        required: false
        schema:
          type: string
      - name: repository_key
        in: query
        description: The Release Bundles repository identifier that identifies where
          a Release Bundle version resides. If this parameter and the project query
          parameter are not specified, the default value of release-bundles-v2 is
          assumed.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: OK - The Release Bundle version was finalized successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinalizeBundleResponse'
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Permission Denied - The user does not have write permissions
            for the target Release Bundle.
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Not Found - The specified Release Bundle version does not exist.
          content:
            application/json:
              schema:
                type: object
        '409':
          description: Conflict - The Release Bundle version is not in a state that
            can be finalized (e.g., it has failed creation).
          content:
            application/json:
              schema:
                type: object
components:
  parameters:
    ReceivedSourceProjectKeyOptional:
      name: source_project_key
      in: query
      description: The project key of the source from which release bundles were distributed.
        Used to scope received bundles. When not provided, results are not filtered
        by project.
      required: false
      schema:
        type: string
        pattern: ^[a-z][a-z0-9-]*[a-z0-9]$
        minLength: 2
        maxLength: 32
    ReceivedSourceProjectKeyRequired:
      name: source_project_key
      in: query
      description: The project key of the source from which the release bundle was
        distributed. Required for project-scoped release bundles.
      required: true
      schema:
        type: string
        pattern: ^[a-z][a-z0-9-]*[a-z0-9]$
        minLength: 2
        maxLength: 32
        default: default
    ReceivedSourceProjectKeyQueryOptional:
      name: source_project_key
      in: query
      description: The project key of the source from which the release bundle was
        distributed.
      required: false
      schema:
        type: string
        pattern: ^[a-z][a-z0-9-]*[a-z0-9]$
        minLength: 2
        maxLength: 32
    ReceivedPattern:
      name: pattern
      in: query
      description: Filter by name/version/path. Supports wildcards (e.g. * or my-bundle*).
        Default is *.
      required: false
      schema:
        type: string
        default: '*'
    ReceivedOrderByList:
      name: order_by
      in: query
      description: Sort criterion. Options are 'name', 'source_project_key', 'date_received'.
      required: false
      schema:
        type: string
        enum:
        - name
        - source_project_key
        - date_received
        default: date_received
    ReceivedOrderByVersions:
      name: order_by
      in: query
      description: Sort criterion for versions.
      required: false
      schema:
        type: string
    ReceivedOrderByArtifacts:
      name: order_by
      in: query
      description: Sort criterion. Options include 'artifact_name', 'package_type',
        'path', 'size', 'checksum'.
      required: false
      schema:
        type: string
        enum:
        - artifact_name
        - package_type
        - path
        - size
        - checksum
        default: artifact_name
    ReceivedOrderAsc:
      name: order_asc
      in: query
      description: Sort ascending when true, descending when false.
      required: false
      schema:
        type: boolean
        default: false
    ReceivedOffset:
      name: offset
      in: query
      description: Number of records to skip for pagination.
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    ReceivedLimit:
      name: limit
      in: query
      description: Maximum number of records to return. Maximum value is 1000.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
    ReceivedReleaseBundleName:
      name: release_bundle_name
      in: path
      description: Release bundle name
      required: true
      schema:
        type: string
        pattern: ^\w[\w\-.]*$
    ReceivedReleaseBundleVersion:
      name: release_bundle_version
      in: path
      description: Release bundle version
      required: true
      schema:
        type: string
        pattern: ^\w[\w\-.+]*$
    ReceivedAsync:
      name: async
      in: query
      description: When true (default), the deletion is performed asynchronously and
        the API returns 200 when the request is accepted. When false, the API returns
        204 after the deletion completes.
      required: false
      schema:
        type: boolean
        default: true
    ReceivedIsRemoteDeleteByDistribution:
      name: is_remote_delete_by_distribution
      in: query
      description: Indicates that this delete is triggered by a Distribution remote
        delete operation.
      required: false
      schema:
        type: boolean
        default: false
  schemas:
    CreateBundleSourceRequest:
      type: object
      additionalProperties: false
      required:
      - release_bundle_name
      - release_bundle_version
      properties:
        release_bundle_name:
          type: string
          pattern: ^\w[\w\-.]*$
          description: Release bundle name. Must begin with a letter, underscore,
            or digit and consist of letters, underscores, dots, hyphens, or digits.
        release_bundle_version:
          type: string
          pattern: ^\w[\w\-.+]*$
          description: Release bundle version. Must begin with a letter, underscore,
            or digit and consist of letters, underscores, dots, hyphens, plus signs,
            or digits.
        skip_docker_manifest_resolution:
          type: boolean
          description: Whether to skip Docker manifest resolution during bundle creation
          default: false
        source_type:
          type: string
          enum:
          - aql
          - builds
          - artifacts
          - release_bundles
          - packages
          description: Type of source for the bundle. Supported values are 'aql' (Artifactory
            Query Language), 'builds', 'artifacts', 'release_bundles', or 'packages'.
        source:
          type: object
          description: Single source configuration object. The structure depends on
            the source_type. For artifacts, it may contain path patterns. For builds,
            it may contain build name and number. For AQL, it may contain AQL query.
          additionalProperties: true
        sources:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Multiple source configurations. Use this when you need to include
            multiple sources in the bundle. Each source object structure depends on
            the source_type.
        tag:
          type: string
          pattern: ^[\w\-.]*$
          maxLength: 128
          description: Optional tag to assign to the release bundle. Must not contain
            spaces or special characters except hyphens, underscores, and dots.
    CreateBundleResponse:
      type: object
      properties:
        repository_key:
          type: string
          description: Repository key where the bundle is stored
        release_bundle_name:
          type: string
          description: Name of the created release bundle
        release_bundle_version:
          type: string
          description: Version of the created release bundle
        created:
          type: string
          description: Creation timestamp
        tag:
          type: string
          description: Tag assigned to the bundle (only included if not empty)
    UpdateBundleSourceRequest:
      type: object
      additionalProperties: false
      required:
      - release_bundle_name
      - release_bundle_version
      properties:
        release_bundle_name:
          type: string
          pattern: ^\w[\w\-.]*$
          description: Release bundle name. Must begin with a letter, underscore,
            or digit and consist of letters, underscores, dots, hyphens, or digits.
        release_bundle_version:
          type: string
          pattern: ^\w[\w\-.+]*$
          description: Release bundle version. Must begin with a letter, underscore,
            or digit and consist of letters, underscores, dots, hyphens, plus signs,
            or digits.
        add_sources:
          type: array
          items:
            type: object
            additionalProperties: true
          description: List of source configurations to add to the existing draft
            bundle. Each source object structure depends on the source_type (aql,
            builds, artifacts, release_bundles, packages).
        filters:
          $ref: '#/components/schemas/BundleSourceFilters'
    UpdateBundleResponse:
      type: object
      properties:
        repository_key:
          type: string
          description: Repository key where the bundle is stored
        release_bundle_name:
          type: string
          description: Name of the updated release bundle
        release_bundle_version:
          type: string
          description: Version of the updated release bundle
        draft:
          type: boolean
          description: Whether the bundle is still in draft state
        updated:
          type: string
          description: Timestamp when the bundle was updated
        added_artifacts_count:
          type: integer
          description: Number of artifacts added in this update
    BundleSourceFilters:
      type: object
      description: Filters to include or exclude specific artifacts from the bundle
      properties:
        included:
          type: array
          maxItems: 50
          items:
            $ref: '#/components/schemas/BundleSourceFilter'
          description: List of filters for artifacts to include
        excluded:
          type: array
          maxItems: 50
          items:
            $ref: '#/components/schemas/BundleSourceFilter'
          description: List of filters for artifacts to exclude
    BundleSourceFilter:
      type: object
      description: A filter criterion for matching artifacts by package type, name,
        version, path, or SHA-256 checksum
      properties:
        package_type:
          type: string
          maxLength: 32
          description: Package type to filter by (e.g., docker, npm, maven)
        package_name:
          type: string
          maxLength: 255
          description: Package name to filter by
        package_version:
          type: string
          maxLength: 255
          description: Package version to filter by
        path:
          type: string
          maxLength: 1350
          description: Artifact path pattern to filter by
        sha256:
          type: string
          maxLength: 64
          description: SHA-256 checksum to filter by
    GetBundleIdsResponse:
      type: object
      properties:
        release_bundles:
          type: array
          items:
            $ref: '#/components/schemas/BundleId'
    BundleId:
      type: object
      properties:
        repository_key:
          type: string
          description: Repository key where the bundle is stored
        release_bundle_name:
          type: string
          description: Name of the release bundle
        project_key:
          type: string
          description: Project key associated with the bundle
        project_name:
          type: string
          description: Name of the project associated with the bundle
    GetBundleGroupsResponse:
      type: object
      properties:
        release_bundles:
          type: array
          items:
            $ref: '#/components/schemas/BundleGroup'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    BundleGroup:
      type: object
      properties:
        repository_key:
          type: string
          description: Repository key where the bundle is stored
        project_key:
          type: string
          description: Project key associated with the bundle
        project_name:
          type: string
          description: Name of the project associated with the bundle
        service_id:
          type: string
          description: Service ID
        created:
          type: string
          description: Creation timestamp
        release_bundle_name:
          type: string
          description: Name of the release bundle
        release_bundle_version_latest:
          type: string
          description: Latest version of the release bundle
        release_bundle_versions_count:
          type: integer
          description: Total number of versions for this bundle
    GetBundlesResponse:
      type: object
      properties:
        release_bundles:
          type: array
          items:
            $ref: '#/components/schemas/BundleVersionSummary'
        total:
          type: integer
          description: Total number of results.
        limit:
          type: integer
          description: The number of results returned in this page.
        offset:
          type: integer
          description: The offset for the current page of results.
        next_offset:
          type: integer
          description: The offset for the next page of results. A value of -1 indicates
            there are no more pages.
    BundleVersionSummary:
      type: object
      properties:
        status:
          type: string
          description: Status of the bundle version (STARTED, FAILED, COMPLETED, DELETING)
        repository_key:
          type: string
          description: Repository key where the bundle is stored
        release_bundle_name:
          type: string
          description: Name of the release bundle
        release_bundle_version:
          type: string
          description: Version of the release bundle
        release_bundle_status:
          type: string
          description: Release bundle status
        service_id:
          type: string
          description: The unique identifier of the Artifactory instance where the
            Release Bundle version was created
        created_by:
          type: string
          description: The name of the user who created the Release Bundle. Names
            longer than 64 characters will appear truncated.
        created:
          type: string
          description: Timestamp when the new version was created (ISO 8601 format)
        tag:
          type: string
          description: The descriptive tag assigned to the Release Bundle version,
            if any
        release_status:
          type: string
          description: Indicates whether the Release Bundle has been promoted successfully
            to the official release stage (PROD), making it available for consumption.
            Possible values are pre_release and released. Requires release 7.120.1
            or above.
        current_environment:
          type: string
          description: Indicates the most recent environment (for example, QA, Staging)
            to which the Release Bundle version was promoted successfully. If the
            version has not yet been promoted, this value will be an empty string.
            Requires release 7.120.1 or above.
        current_stage:
          type: string
          description: Current stage
        current_promotion_created:
          type: string
          description: Timestamp of current promotion creation
        messages:
          type: array
          items:
            $ref: '#/components/schemas/EventMessage'
          description: Error messages related to the processing of the operation (only
            included if not empty)
        permissions:
          $ref: '#/components/schemas/BundlePermissions'
          description: Whether the user has permission to promote, distribute, and
            delete these Release Bundle versions (only included if not null)
    BundleDescriptorModel:
      type: object
      description: Release bundle descriptor model
      properties:
        service_id:
          type: string
          description: The unique identifier of the Artifactory instance where the
            Release Bundle version was created
        created_by:
          type: string
          description: The name of the user who created the Release Bundle version.
            Names longer than 64 characters will appear truncated.
        created:
          type: string
          description: The timestamp when the Release Bundle version was created (ISO
            8601 standard)
        created_millis:
          type: integer
          format: int64
          description: The timestamp when the Release Bundle version was created (in
            milliseconds)
        total_artifacts_count:
          type: integer
          description: The total number of artifacts included in the Release Bundle
            version
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/BundleItemDescriptorModel'
          description: List of artifacts in the bundle
    GetStatusResponse:
      type: object
      properties:
        status:
          type: string
          description: Status of the bundle version
        messages:
          type: array
          items:
            $ref: '#/components/schemas/EventMessage'
          description: Event messages (only included if not empty)
    BundleReceivedReleaseBundle:
      type: object
      description: Summary of a release bundle that has been received on this instance
        (e.g. as a distribution target).
      properties:
        name:
          type: string
          description: Release bundle name
        latest_version:
          type: string
          description: Latest received version of the release bundle
        source_project_key:
          type: string
          description: Project key of the source from which the bundle was distributed
        number_of_versions:
          type: integer
          description: Total number of received versions for this bundle
        date_received:
          type: integer
          format: int64
          description: Timestamp when the latest version was received (milliseconds
            since epoch)
    GetReceivedBundlesResponse:
      type: object
      description: Response for listing received release bundle versions.
      properties:
        release_bundles:
          type: array
          items:
            $ref: '#/components/schemas/BundleReceivedReleaseBundle'
          description: List of received release bundles matching the query
        total:
          type: integer
          description: Total number of results
    BundleReceivedVersion:
      type: object
      description: A received release bundle version summary.
      properties:
        version:
          type: string
          description: Release bundle version
        date_received:
          type: integer
          format: int64
          description: Timestamp when this version was received (milliseconds since
            epoch)
        size:
          type: integer
          format: int64
          description: Total size in bytes of the received bundle version
    GetReceivedBundleVersionsResponse:
      type: object
      description: Response for listing versions of a received release bundle.
      properties:
        versions:
          type: array
          items:
            $ref: '#/components/schemas/BundleReceivedVersion'
          description: List of received versions for the bundle name
        total:
          type: integer
          description: Total number of results
    BundleVersionArtifact:
      type: object
      description: An artifact belonging to a received release bundle version.
      properties:
        artifact_name:
          type: string
          description: Name of the artifact
        package_type:
          type: string
          description: Package type (e.g. generic, maven, docker)
        path:
          type: string
          description: Repository path of the artifact
        size:
          type: integer
          format: int64
          description: Size of the artifact in bytes
        checksum:
          type: string
          description: Checksum of the artifact (e.g. SHA-256)
        properties:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Additional properties attached to the artifact (if any)
    GetReceivedBundleVersionArtifactsResponse:
      type: object
      description: Response for listing artifacts of a received release bundle version.
      properties:
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/BundleVersionArtifact'
          description: List of artifacts in the received release bundle version
        total:
          type: integer
          description: Total number of results
    AsyncSubmissionResponse:
      type: object
      description: Response body for an asynchronously submitted operation (e.g. delete
        received bundle).
      properties:
        message:
          type: string
          description: Confirmation or status message for the submitted operation
    ErrorResponse:
      type: object
      description: Standard error body for non-2xx responses (400, 401, 403, 404,
        500). Matches Artifactory-style error format.
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorItem'
          description: List of error entries
    ErrorItem:
      type: object
      description: A single error entry in an error response.
      properties:
        status:
          type: integer
          description: HTTP status code (e.g. 400, 401, 403, 404, 500)
        message:
          type: string
          description: Human-readable error message
    Envelope:
      type: object
      description: DSSE (Dead Simple Signing Envelope) signature
      properties:
        payload:
          type: string
          description: Base64-encoded payload
        payloadType:
          type: string
          description: Type of the payload (e.g., application/vnd.in-toto+json)
        signatures:
          type: array
          items:
            type: object
            properties:
              keyid:
                type: string
                description: Key identifier
              sig:
                type: string
                description: Base64-encoded signature
          description: List of signatures
    GetBundlesByArtifactResponse:
      type: object
      properties:
        release_bundles:
          type: array
          items:
            $ref: '#/components/schemas/BundleByArtifactSummary'
          description: List of bundles containing the artifact
        total:
          type: integer
          description: Total number of bundles
        limit:
          type: integer
          description: Maximum number of results per page
        offset:
          type: integer
          description: Pagination offset
    BundleTagRequest:
      type: object
      properties:
        tag:
          type: string
          pattern: ^[\w\-.]*$
          maxLength: 128
          description: Release bundle tag
    SetBundleTagResponse:
      type: object
      properties:
        tag:
          type: string
          description: Tag assigned to the bundle
        release_bundle_name:
          type: string
          description: Name of the release bundle
        release_bundle_version:
          type: string
          description: Version of the release bundle
    BundleItemDescriptorModel:
      type: object
      description: Descriptor for an artifact item in a bundle
      properties:
        path:
          type: string
          description: The path of a Release Bundle item relative to its contents
            directory
        checksum:
          type: string
          description: The SHA-256 checksum of the source artifact
        source_repository_key:
          type: string
          description: The source repository of the artifact
        package_type:
          type: string
          description: The package type of the source repository associated with the
            artifact
        package_name:
          type: string
          description: The name of the package associated with the artifact
        package_version:
          type: string
          description: The version of the package associated with the artifact
        size:
          type: integer
          format: int64
          description: The size of the artifact (in bytes)
        properties:
          type: array
          items:
            $ref: '#/components/schemas/BundleItemProperty'
          description: The source artifact properties that were present when the Release
            Bundle version was created (each property includes a key and values)
    BundleItemProperty:
      type: object
      description: Property associated with a bundle item
      properties:
        key:
          type: string
          description: Property key
        values:
          type: array
          items:
            type: string
          description: List of property values
    BundleByArtifactSummary:
      type: object
      description: Summary of a bundle that contains a specific artifact
      properties:
        release_bundle_name:
          type: string
          description: Name of the release bundle
        release_bundle_version:
          type: string
          description: Version of the release bundle
        origin:
          type: string
          description: Origin of the bundle (source or target)
        project_key:
          type: string
          description: Project key (only if origin is source)
        source_project_key:
          type: string
          description: Source project key (only if origin is target)
        status:
          type: string
          description: Status of the bundle version
        created_by:
          type: string
          description: User who created the bundle
        created:
          type: string
          description: Creation timestamp
        tag:
          type: string
          description: Tag assigned to the bundle
        release_status:
          type: string
          description: Release status
        current_stage:
          type: string
          description: Current stage
    EventMessage:
      type: object
      description: Event message
      properties:
        text:
          type: string
          description: Message text
    BundlePermissions:
      type: object
      description: Permissions for a bundle
      properties:
        create:
          type: boolean
          description: Permission to create
        promote:
          type: boolean
          description: Permission to promote
        distribute:
          type: boolean
          description: Permission to distribute
        delete:
          type: boolean
          description: Permission to delete
        annotate:
          type: boolean
          description: Permission to annotate
    BundleByEnvironmentSummary:
      type: object
      description: Summary of a bundle in a specific environment
      properties:
        repository_key:
          type: string
          description: Repository key where the bundle is stored
        release_bundle_name:
          type: string
          description: Name of the release bundle
        release_bundle_version:
          type: string
          description: Version of the release bundle
        release_status:
          type: string
          description: Release status
        tag:
          type: string
          description: Tag assigned to the bundle
        environment:
          type: string
          description: Environment name
        created:
          type: string
          description: Creation timestamp
        created_millis:
          type: integer
          format: int64
          description: Creation timestamp in milliseconds
        created_by:
          type: string
          description: User who created the bundle
        project_key:
          type: string
          description: Project key associated with the bundle
    CreatePromotionRequest:
      type: object
      properties:
        environment:
          type: string
          description: Name of the target environment for the promotion (deprecated,
            use stage instead)
        stage:
          type: string
          description: Name of the target environment/stage for the promotion
        included_repository_keys:
          type: array
          items:
            type: string
          description: Defines specific repositories to include in the promotion.
            If left undefined, all repositories (except those specifically excluded)
            are included.
        excluded_repository_keys:
          type: array
          items:
            type: string
          description: Defines specific repositories to exclude from the promotion
        included_source_paths:
          type: array
          items:
            type: string
          description: Defines specific source paths to include in the promotion
        excluded_source_paths:
          type: array
          items:
            type: string
          description: Defines specific source paths to exclude from the promotion
        overwrite_strategy:
          type: string
          enum:
          - latest
          - all
          - disabled
          default: disabled
          description: Specifies the strategy for overwriting artifacts when a promotion
            would overwrite a file that is not part of the release bundle. `disabled`
            - (default) The promotion will fail if an artifact can't be overwritten.
            `all` - The promotion will overwrite the artifact regardless it's tag.
            `latest` - The promotion will overwrite the artifact only if the artifact
            has tag `latest`.
        artifact_additional_properties:
          type: array
          items:
            $ref: '#/components/schemas/BundleItemProperty'
          description: Key-value pairs that define properties to add to each promoted
            artifact on top of any existing properties
        promotion_authorization_type:
          type: string
          enum:
          - undefined
          - app_trust_authorized_promotion
          default: undefined
          description: Type of promotion authorization
    PromoteBundleResponse:
      type: object
      properties:
        repository_key:
          type: string
          description: Repository key where the bundle is stored
        release_bundle_name:
          type: string
          description: Name of the release bundle
        release_bundle_version:
          type: string
          description: Version of the release bundle
        environment:
          type: string
          description: Target environment for the promotion
        included_repository_keys:
          type: array
          items:
            type: string
        excluded_repository_keys:
          type: array
          items:
            type: string
        artifact_additional_properties:
          type: array
          items:
            $ref: '#/components/schemas/BundleItemProperty'
        created:
          type: string
          description: Timestamp when the promotion was created (ISO 8601 standard)
        created_millis:
          type: integer
          format: int64
          description: Timestamp when the promotion was created (in milliseconds)
        source_environment:
          type: string
          description: The source environment from which the Release Bundle version
