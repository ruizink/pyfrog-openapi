  /release_bundle/search-by-artifact:
    get:
      tags:
      - BundleResource
      summary: Get Release Bundle v2 Versions by Artifact
      description: Returns a list of Release Bundle v2 versions that contain the specified
        artifact. Supports filtering by bundle name, artifact path, SHA256, and pagination.
      operationId: getBundlesByArtifact
      parameters:
      - name: release_bundle_name
        in: query
        description: Filters by the name of the Release Bundle.
        required: false
        schema:
          type: string
      - name: artifact_path
        in: query
        description: The complete path of the artifact to search for. The request
          must contain either the artifact_path, the sha256, or both.
        required: false
        schema:
          type: string
      - name: sha256
        in: query
        description: Filters by the SHA-256 checksum of the artifact. The request
          must contain either the artifact_path, the sha256, or both.
        required: false
        schema:
          type: string
      - name: project
        in: query
        description: Defines the project associated with the Release Bundles. If this
          parameter is not specified, the default global project is assumed.
        required: false
        schema:
          type: string
      - name: origin
        in: query
        description: Defines where to search for the artifact. 'source' searches the
          Release Bundle versions that have been created on this device. 'target'
          searches the Release Bundle versions that have been received by this device
          when acting as a destination target. If this parameter is not specified,
          both source and target Release Bundle versions are searched.
        required: false
        schema:
          type: string
          enum:
          - both
          - source
          - target
          default: both
      - name: offset
        in: query
        description: Sets the number of records to skip before returning the query
          response. Used for pagination purposes.
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: limit
        in: query
        description: Sets the maximum number of versions to return at one time. Used
          for pagination purposes. If not set, the default is 1000.
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 1000
      - name: order_by
        in: query
        description: Defines the criterion by which to order the returned records.
          Options 'release_bundle_name', 'release_bundle_version'. The default is
          release_bundle_name.
        required: false
        schema:
          type: string
          enum:
          - release_bundle_name
          - release_bundle_version
      - name: order_asc
        in: query
        description: Defines whether to list the Release Bundle versions in ascending
          (true) or descending (false) order. The default value is true.
        required: false
        schema:
          type: boolean
          default: true
      - name: sort
        in: query
        description: Sort criteria
        required: false
        schema:
          type: string
          default: release_bundle_name:asc,release_bundle_version:desc
      responses:
        '200':
          description: OK - Successfully retrieved bundles containing the artifact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBundlesByArtifactResponse'
        '400':
          description: Bad Request - Invalid query parameters.
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Internal server error
          content: {}
