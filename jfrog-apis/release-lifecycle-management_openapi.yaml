    RemoteDeleteDistributionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: The ID number of the distribution operation
        sites:
          type: array
          items:
            $ref: '#/components/schemas/DistributionTarget'
          description: The name, service_id and type of each destination target
