        service_id:
          type: string
          description: The unique identifier of the Artifactory instance where the
            Release Bundle was distributed
        type:
          type: string
          description: The destination target device type (e.g. Artifactory)
    DistributionTracker:
      type: object
      properties:
        distribution_tracker_friendly_id:
