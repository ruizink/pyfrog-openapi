          pattern: ^\w[\w\-.]*$
      - name: version
        in: path
        description: Release bundle version
        required: true
        schema:
          type: string
          pattern: ^\w[\w\-.+]*$
      - name: from_environment
        in: query
        description: The name of the current environment in which the Release Bundle
          version is located. The rollback is executed from this environment.
        required: true
        schema:
          type: string
      - name: async
        in: query
        description: Determines whether the operation should be asynchronous (true)
          or synchronous (false). The default value is true.
        required: false
        schema:
          type: boolean
          default: true
      - name: project
        in: query
        description: Optional project key associated with the promotion
        required: false
        schema:
          type: string
      requestBody:
        required: false
        description: Optional details for the rollback promotion, such as a overwrite_strategy.
          If not provided, a default empty request is used.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRollbackPromotionRequest'
      responses:
        '200':
          description: Submitted (Async) - The rollback request was submitted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RollbackPromotionResponse'
        '201':
          description: Rolled Back (Sync) - The promotion was rolled back successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RollbackPromotionResponse'
        '401':
          description: Bad Credentials - Authentication failed.
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Permission Denied - The user does not have the necessary permissions.
          content:
            application/json:
              schema:
                type: object
