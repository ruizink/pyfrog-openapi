      description: Optional parameters for the rollback promotion operation.
      properties:
        overwrite_strategy:
          type: string
          enum:
          - all
          - latest
          - skip
          default: skip
          description: Specifies the strategy for overwriting artifacts during the
            rollback. It would overwrite a file that is not part of the release bundle.
            `skip` - (default) The overwrite will be skipped. `all` - the rollback
