openapi: 3.1.0
info:
  title: Bundle Handler Service API
  description: API for managing release bundles in JFrog Artifactory - Based on official
    JFrog REST API documentation
  version: 3.x-SNAPSHOT
  contact:
    name: JFrog Support
servers:
- url: https://{jfrog_url}/lifecycle/api/v2
  description: Release Lifecycle Management API base path
tags:
- name: BundleResource
  description: Release bundle management operations
- name: PromotionResource
  description: Release bundle promotion operations
- name: DistributionResource
  description: Release bundle distribution operations. Note These endpoints represent
    the external JFrog Distribution API as documented in the official REST API documentation.
    The internal BundleDistributionResource.java implements different endpoints for
    transaction management (transaction/open, transaction/close).
paths:
  /release_bundle:
    post:
      tags:
      - BundleResource
      summary: Create Release Bundle v2 Version
      description: Creates a new Release Bundle v2, uniquely identified by a combination
        of repository key, name, and version. You can create a Release Bundle version
        using one or a combination of the following source types AQL, Artifacts, Packages,
        Builds, or Release Bundles.
      operationId: createBundleVersion
      requestBody:
        required: true
        description: Release bundle creation request containing bundle name, version,
          source type, and source configurations
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBundleSourceRequest'
            examples:
              artifacts:
                summary: Create bundle from artifacts
                description: Example of creating a bundle from specific artifacts
                  by path
                value:
                  release_bundle_name: my-bundle
                  release_bundle_version: 1.0.0
                  source_type: artifacts
                  source:
                    artifacts:
                    - path: path/to/artifact1.jar
                      sha256: abc123def456...
                    - path: path/to/artifact2.war
                  tag: production
              aql:
                summary: Create bundle from AQL query
                description: Example of creating a bundle using Artifactory Query
                  Language (AQL)
                value:
                  release_bundle_name: my-bundle
                  release_bundle_version: 1.0.0
                  source_type: aql
                  source:
                    aql: 'items.find({"repo": "local-generic", "path": {"$match":
                      "path/to/*"}})'
                  tag: production
              packages:
                summary: Create bundle from packages
                description: Example of creating a bundle from packages (Docker, npm,
                  Maven, etc.)
                value:
                  release_bundle_name: my-bundle
                  release_bundle_version: 1.0.0
                  source_type: packages
                  source:
                    packages:
                    - package_name: my-docker-image
                      package_version: 1.0.0
                      package_type: docker
                      repository_key: local-docker
                    - package_name: my-npm-package
                      package_version: 2.0.0
                      package_type: npm
                      repository_key: local-npm
                  tag: production
              release_bundles:
                summary: Create bundle from other release bundles
                description: Example of creating a bundle that includes artifacts
                  from other release bundles
                value:
                  release_bundle_name: my-bundle
                  release_bundle_version: 1.0.0
                  source_type: release_bundles
                  source:
                    release_bundles:
                    - release_bundle_name: source-bundle-1
                      release_bundle_version: 1.0.0
                      repository_key: my-repo
                      project_key: my-project
                    - release_bundle_name: source-bundle-2
                      release_bundle_version: 2.0.0
                  tag: production
              multiple_sources:
                summary: Create bundle from multiple source types
                description: Example of creating a bundle that combines multiple source
                  types (AQL, artifacts, packages, etc.) in a single request
                value:
                  release_bundle_name: my-bundle
                  release_bundle_version: 1.0.0
                  sources:
                  - source_type: aql
                    aql: 'items.find({"repo": "local-generic", "path": {"$match":
                      "path/to/*"}})'
                  - source_type: artifacts
                    artifacts:
                    - path: path/to/artifact1.jar
                      sha256: abc123def456...
                    - path: path/to/artifact2.war
                  - source_type: packages
                    packages:
                    - package_name: my-docker-image
                      package_version: 1.0.0
                      package_type: docker
                      repository_key: local-docker
                  - source_type: release_bundles
                    release_bundles:
                    - release_bundle_name: source-bundle-1
                      release_bundle_version: 1.0.0
                      repository_key: my-repo
                  tag: production
      parameters:
      - name: async
        in: query
        description: Whether to create the bundle asynchronously
        required: false
        schema:
          type: boolean
          default: true
      - name: fail_fast
        in: query
        description: Whether to fail fast on errors
        required: false
        schema:
          type: boolean
          default: true
      - name: project
        in: query
        description: The project key used to determine the Release Bundles repository.
          By convention, each project may contain only one Release Bundles system
          repository with the name <project-key>-release-bundles-v2. This query parameter
          may be used instead of repository_key.
        required: false
        schema:
          type: string
      - name: repository_key
        in: query
        description: The Release Bundles repository identifier that identifies where
          a Release Bundle version resides. If this parameter and the project query
          parameter are not specified, the default value of release-bundles-v2 is
          assumed.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Submitted (async) - The creation request was submitted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBundleResponse'
        '201':
          description: Created (sync) - The Release Bundle version was created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBundleResponse'
        '400':
          description: Bad Request - The request body is malformed, a required parameter
            is missing, or the AQL is invalid.
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Permission Denied - The user does not have write permissions
            for the target repository.
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Not Found - A specified resource (source artifact, build, package,
            or repository) could not be found.
          content:
            application/json:
              schema:
                type: object
        '409':
          description: Already Exists - A Release Bundle with the same name and version
            already exists in the target repository.
          content:
            application/json:
              schema:
                type: object
    patch:
      tags:
      - BundleResource
      summary: Update Release Bundle v2 Version
      description: Updates an existing draft Release Bundle v2 version by adding new
        sources and/or applying filters. The bundle must be in draft state to be updated.
        You can add sources of any supported type (AQL, Artifacts, Packages, Builds,
        or Release Bundles) and optionally apply inclusion/exclusion filters.
      operationId: updateBundleVersion
      requestBody:
        required: true
        description: Release bundle update request containing bundle name, version,
          sources to add, and optional filters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBundleSourceRequest'
            examples:
              add_artifacts:
                summary: Add artifacts to an existing draft bundle
                description: Example of adding artifact sources to an existing draft
                  Release Bundle version
                value:
                  release_bundle_name: my-bundle
                  release_bundle_version: 1.0.0
                  add_sources:
                  - source_type: artifacts
                    artifacts:
                    - path: path/to/new-artifact.jar
                      sha256: abc123def456...
              add_with_filters:
                summary: Add sources with inclusion/exclusion filters
                description: Example of adding sources while applying filters to include
                  or exclude specific artifacts
                value:
                  release_bundle_name: my-bundle
                  release_bundle_version: 1.0.0
                  add_sources:
                  - source_type: builds
                    builds:
                    - build_name: my-build
                      build_number: '42'
                  filters:
                    included:
                    - package_type: docker
                      package_name: my-image
                    excluded:
                    - path: '**/test/**'
      parameters:
      - name: async
        in: query
        description: Whether to update the bundle asynchronously
        required: false
        schema:
          type: boolean
          default: true
      - name: fail_fast
        in: query
        description: Whether to fail fast on errors
        required: false
        schema:
          type: boolean
          default: true
      - name: dry_run
        in: query
        description: Whether to perform a dry run without actually updating the bundle
        required: false
        schema:
          type: boolean
          default: false
      - name: project
        in: query
        description: The project key used to determine the Release Bundles repository.
          By convention, each project may contain only one Release Bundles system
          repository with the name <project-key>-release-bundles-v2. This query parameter
          may be used instead of repository_key.
        required: false
        schema:
          type: string
      - name: repository_key
        in: query
        description: The Release Bundles repository identifier that identifies where
          a Release Bundle version resides. If this parameter and the project query
          parameter are not specified, the default value of release-bundles-v2 is
          assumed.
        required: false
        schema:
          type: string
      - name: X-JFrog-Signing-Key-Name
        in: header
        description: The name of the signing key to use for signing the release bundle
        required: false
        schema:
          type: string
          maxLength: 255
      responses:
        '200':
          description: Updated - The Release Bundle version was updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateBundleResponse'
        '400':
          description: Bad Request - The request body is malformed or a required parameter
            is missing.
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Permission Denied - The user does not have write permissions
            for the target repository.
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Not Found - The specified Release Bundle version or a source
            resource could not be found. The bundle must exist and be in draft state.
          content:
            application/json:
              schema:
                type: object
  /release_bundle/names:
    get:
      tags:
      - BundleResource
      summary: Get Release Bundle v2 Names
      description: Returns a list of Release Bundle v2 names mapped to their repository
        key (and project key, where applicable).
      operationId: getBundleNames
      parameters:
      - name: project
        in: query
        description: The project key used to determine the Release Bundles repository.
          By convention, each project may contain only one Release Bundles system
          repository with the name <project-key>-release-bundles-v2. This query parameter
          may be used instead of repository_key.
        required: false
        schema:
          type: string
      - name: repository_key
        in: query
        description: The Release Bundles repository identifier that identifies where
          a Release Bundle version resides. If this parameter and the project query
          parameter are not specified, the default value of release-bundles-v2 is
          assumed.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Fetched - Successfully retrieved bundle names
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBundleIdsResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
  /release_bundle/groups:
    get:
      tags:
      - BundleResource
      summary: Get Release Bundle v2 Groups
      description: Returns a list of Release Bundle v2 names mapped to their repository
        key. Each element includes the latest version and the total number of versions.
      operationId: getBundleGroups
      parameters:
      - name: project
        in: query
        description: The project key used to determine the Release Bundles repository.
          By convention, each project may contain only one Release Bundles system
          repository with the name <project-key>-release-bundles-v2. This query parameter
          may be used instead of repository_key.
        required: false
        schema:
          type: string
      - name: repository_key
        in: query
        description: The Release Bundles repository identifier that identifies where
          a Release Bundle version resides. If this parameter and the project query
          parameter are not specified, the default value of release-bundles-v2 is
          assumed.
        required: false
        schema:
          type: string
      - name: filter_by
        in: query
        description: Filter criteria
        required: false
        schema:
          type: string
      - name: filter_by_release_status
        in: query
        description: Filter by release status
        required: false
        schema:
          type: string
      - name: from
        in: query
        description: Start date for filtering
        required: false
        schema:
          type: string
      - name: to
        in: query
        description: End date for filtering
        required: false
        schema:
          type: string
      - name: event
        in: query
        description: Event type filter (CREATED, PROMOTED, DISTRIBUTED, UPDATED, FINALIZED)
        required: false
        schema:
          type: string
          enum:
          - CREATED
          - PROMOTED
          - DISTRIBUTED
          - UPDATED
          - FINALIZED
      - name: order_by
        in: query
        description: Field to order by (release_bundle_name, release_bundle_version_latest,
          created)
        required: false
        schema:
          type: string
          enum:
          - release_bundle_name
          - release_bundle_version_latest
          - created
          default: created
      - name: order_asc
        in: query
        description: Order ascending
        required: false
        schema:
          type: boolean
      - name: offset
        in: query
        description: Pagination offset
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: limit
        in: query
        description: Maximum number of results
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 10
      responses:
        '200':
          description: Fetched - Successfully retrieved bundle groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBundleGroupsResponse'
  /release_bundle/records/{name}:
    get:
      tags:
      - BundleResource
      summary: Get Release Bundle v2 Versions
      description: Returns a list of versions for a specified Release Bundle v2. Records
        are provided regardless of status, including failed attempts at creation.
        You can filter the results based on version, creator, tags, status, and where
        they have been promoted.
      operationId: getBundleVersions
      parameters:
      - name: name
        in: path
        description: Release bundle name
        required: true
        schema:
          type: string
          pattern: ^\w[\w\-.]*$
      - name: project
        in: query
        description: The project key used to determine the Release Bundles repository.
          By convention, each project may contain only one Release Bundles system
          repository with the name <project-key>-release-bundles-v2. This query parameter
          may be used instead of repository_key.
        required: false
        schema:
          type: string
      - name: repository_key
        in: query
        description: The Release Bundles repository identifier that identifies where
          a Release Bundle version resides. If this parameter and the project query
          parameter are not specified, the default value of release-bundles-v2 is
          assumed.
        required: false
        schema:
          type: string
      - name: include
        in: query
        description: Adds details to the response. Supports 'messages' (returns any
          error messages generated when creating the Release Bundle version) and 'permissions'
          (returns user permissions for these versions). Multiple values can be comma-separated.
        required: false
        schema:
          type: string
      - name: filter_by
        in: query
        description: Defines a filter for the list of Release Bundle versions. You
          can filter according to release_bundle_version and created_by. This parameter
          has been replaced with new filters (release_bundle_version, created_by,
          release_status, tag) and will be deprecated in a future version.
        required: false
        schema:
          type: string
      - name: release_bundle_version
        in: query
        description: Filters by the Release Bundle version. Supports a trailing wildcard
          (*) for prefix searching and multiple comma-separated values.
        required: false
        schema:
          type: array
          items:
            type: string
      - name: created_by
        in: query
        description: Filters by the user who created the Release Bundle.
        required: false
        schema:
          type: string
      - name: order_by
        in: query
        description: Defines the sort criterion for the Release Bundle versions. Options
          'created' (sorts by creation timestamp), 'created_by' (sorts by creator
          name), 'release_bundle_name' (sorts by name), 'release_bundle_version' (sorts
          lexicographically), 'release_bundle_semver' (sorts using SemVer rules; versions
          that do not conform to SemVer are added to the end sorted lexicographically).
          Note The release_bundle_semver option pulls the latest 1000 records only
          and does not support pagination. When this option is selected, the offset
          must be set to 0, and the maximum limit is 1000.
        required: false
        schema:
          type: string
          enum:
          - created
          - created_by
          - release_bundle_name
          - release_bundle_version
          - release_bundle_semver
          default: created
      - name: order_asc
        in: query
        description: Defines the sort order. true for ascending order, false for descending
          order. The default value is false.
        required: false
        schema:
          type: boolean
          default: false
      - name: offset
        in: query
        description: Sets the number of records to skip for pagination.
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: limit
        in: query
        description: Sets the maximum number of versions to return at one time. Used
          for pagination purposes. The default value is 25. The maximum value is 255.
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 255
          default: 25
      - name: tag
        in: query
        description: Filters by the assigned Release Bundle tag. Supports a trailing
          wildcard (*) and multiple comma-separated values.
        required: false
        schema:
          type: string
          pattern: ^[\w\-.*,]*$
      - name: release_status
        in: query
        description: Filters by the release status of the Release Bundle. Supports
          multiple comma-separated values. Possible values are 'pre_release' and 'released'.
        required: false
        schema:
          type: string
          enum:
          - PRE_RELEASE
          - RELEASED
          - TRUSTED_RELEASE
      responses:
        '200':
          description: Submitted (asynchronous) - The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBundlesResponse'
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Not Found - The specified Release Bundle name does not exist.
          content:
            application/json:
              schema:
                type: object
  /release_bundle/records/{name}/{version}:
    get:
      tags:
      - BundleResource
      summary: Get Release Bundle v2 Version Details
      description: Returns the details of a selected Release Bundle v2 version, such
        as its creation time, the user who created it, the artifacts it includes,
        and so on. The details are stored in the form of a DSSE attestation, a signature
        envelope with a Base64-encoded payload, which contains a snapshot of the items
        in the Release Bundle.
      operationId: getBundleVersion
      parameters:
      - name: name
        in: path
        description: Release bundle name
        required: true
        schema:
          type: string
          pattern: ^\w[\w\-.]*$
      - name: version
        in: path
        description: Release bundle version
        required: true
        schema:
          type: string
          pattern: ^\w[\w\-.+]*$
      - name: project
        in: query
        description: The project key used to determine the Release Bundles repository.
          By convention, each project may contain only one Release Bundles system
          repository with the name <project-key>-release-bundles-v2. This query parameter
          may be used instead of repository_key.
        required: false
        schema:
          type: string
      - name: repository_key
        in: query
        description: The Release Bundles repository identifier that identifies where
          a Release Bundle version resides. If this parameter and the project query
          parameter are not specified, the default value of release-bundles-v2 is
          assumed.
        required: false
        schema:
          type: string
      - name: offset
        in: query
        description: Sets the number of records to skip before returning the query
          response. Used for pagination purposes. The default is 0.
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: limit
        in: query
        description: Sets the maximum number of artifacts to return at one time. Used
          for pagination purposes.
        required: false
        schema:
          type: integer
          minimum: 1
      responses:
        '200':
          description: Fetched - Successfully retrieved bundle version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleDescriptorModel'
        '400':
          description: Bad Request - The request body is malformed or a required parameter
            is missing.
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Permission Denied - The user does not have read permissions
            for the target Release Bundle.
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Not Found - The specified Release Bundle version does not exist.
          content:
            application/json:
              schema:
                type: object
    delete:
      tags:
      - BundleResource
      summary: Delete Release Bundle v2 Version
      description: Deletes a specific Release Bundle v2 version. Can be performed
        synchronously or asynchronously.
      operationId: deleteBundleVersion
      parameters:
      - name: name
        in: path
        description: Release bundle name
        required: true
        schema:
          type: string
          pattern: ^\w[\w\-.]*$
      - name: version
        in: path
        description: Release bundle version
        required: true
        schema:
          type: string
          pattern: ^\w[\w\-.+]*$
      - name: project
        in: query
        description: The project key used to determine the Release Bundles repository.
          By convention, each project may contain only one Release Bundles system
          repository with the name <project-key>-release-bundles-v2. This query parameter
          may be used instead of repository_key.
        required: false
        schema:
          type: string
      - name: repository_key
        in: query
        description: The Release Bundles repository identifier that identifies where
          a Release Bundle version resides. If this parameter and the project query
          parameter are not specified, the default value of release-bundles-v2 is
          assumed.
        required: false
        schema:
          type: string
      - name: async
        in: query
        description: Determines whether the operation should be asynchronous (true)
          or synchronous (false). The default value is true.
        required: false
        schema:
          type: boolean
          default: true
      - name: is_remote_delete_by_distribution
        in: query
        description: Whether this is a remote delete by distribution
        required: false
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: Submitted (async) - The deletion request was submitted successfully.
        '204':
          description: Deleted (sync) - The Release Bundle version was deleted successfully.
        '400':
          description: Bad Request - The request body is malformed or a required parameter
            is missing.
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Permission Denied - The user does not have delete permissions
            for the target Release Bundle.
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Not Found - The specified Release Bundle version does not exist.
          content:
            application/json:
              schema:
                type: object
  /release_bundle/records/{name}/latest:
    get:
      tags:
      - BundleResource
      summary: Get Release Bundle v2 Latest Version
      description: Retrieves the latest version of a release bundle by name. Returns
        the bundle descriptor and includes X-Ray SHA256 in response header if available.
      operationId: getBundleVersionLatest
      parameters:
      - name: name
        in: path
        description: Release bundle name
        required: true
        schema:
          type: string
          pattern: ^\w[\w\-.]*$
      - name: project
        in: query
        description: The project key used to determine the Release Bundles repository.
          By convention, each project may contain only one Release Bundles system
          repository with the name <project-key>-release-bundles-v2. This query parameter
          may be used instead of repository_key.
        required: false
        schema:
          type: string
      - name: repository_key
        in: query
        description: The Release Bundles repository identifier that identifies where
          a Release Bundle version resides. If this parameter and the project query
          parameter are not specified, the default value of release-bundles-v2 is
          assumed.
        required: false
        schema:
          type: string
      - name: include
        in: query
        description: Fields to include
        required: false
        schema:
          type: string
      - name: filter_by
        in: query
        description: Filter criteria
        required: false
        schema:
          type: string
      - name: order_by
        in: query
        description: Field to order by (created, created_by, release_bundle_version,
          release_bundle_semver)
        required: false
        schema:
          type: string
          enum:
          - created
          - created_by
          - release_bundle_version
          - release_bundle_semver
          default: created
      - name: order_asc
        in: query
        description: Order ascending
        required: false
        schema:
          type: boolean
      - name: offset
        in: query
        description: Pagination offset
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: limit
        in: query
        description: Maximum number of results
        required: false
        schema:
          type: integer
          minimum: 1
