        offset:
          type: integer
          description: Pagination offset
    PromotionSummary:
      type: object
      properties:
        status:
          type: string
          description: Status of the promotion (STARTED, FAILED, COMPLETED, DELETING,
            SUBMITTED, PENDING, REJECTED)
        repository_key:
          type: string
          description: Unique identifier for the Release Bundles repository
        release_bundle_name:
          type: string
          description: Name of the Release Bundle
        release_bundle_version:
          type: string
          description: Release Bundle version
        environment:
          type: string
          description: Name of the target environment for the promotion
        source_environment:
          type: string
          description: The source environment from which the Release Bundle version
            was promoted
        service_id:
          type: string
          description: The unique identifier of the Artifactory instance where the
            Release Bundle was promoted
        created_by:
          type: string
          description: Name of the user who initiated the promotion
        created:
          type: string
          description: Timestamp when the promotion was created (ISO 8601 standard)
        created_millis:
          type: integer
          format: int64
