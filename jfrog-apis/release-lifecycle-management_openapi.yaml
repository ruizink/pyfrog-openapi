            type: object
          description: List of files currently being distributed
    RemoteDeleteDistributionRequest:
      type: object
      properties:
        distribution_rules:
          type: array
          items:
            $ref: '#/components/schemas/DistributionRule'
          description: Defines which distribution targets (site_name) to include when
