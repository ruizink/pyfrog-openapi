          type: string
          description: The user who initiated distribution
        created:
          type: string
          description: Timestamp when the Release Bundle was created
        finish_time:
          type: string
          description: Timestamp when distribution of the Release Bundle version finished
        targets:
          type: array
          items:
            type: string
          description: The list of distribution targets
    DistributionDetailsResponse:
      type: object
      properties:
        distribution_id:
          type: integer
          format: int64
          description: The ID number of the distribution operation
        distribution_friendly_id:
          type: integer
          description: The sequential distribution number of this Release Bundle version
        type:
          type: string
          description: Indicates whether this action was a distribution request or
            a remote delete request
        release_bundle_name:
          type: string
          description: Name of the Release Bundle
        release_bundle_version:
          type: string
          description: Release Bundle version
        status:
          type: string
          description: The current status of the Release Bundle
        distributed_by:
          type: string
          description: The user who initiated distribution
        start_time:
          type: string
          description: Timestamp when distribution of the Release Bundle version started
        finish_time:
          type: string
          description: Timestamp when distribution of the Release Bundle version finished
        duration:
          type: integer
          description: The duration of the distribution from start to finish (in ms)
        distribution_rules:
          type: array
          items:
            $ref: '#/components/schemas/DistributionRule'
          description: Defines which distribution targets were included in this distribution
        sites:
          type: array
          items:
            $ref: '#/components/schemas/DistributionSiteDetails'
          description: Provides the details of the distribution operation to each
            designated target
    DistributionSiteDetails:
      type: object
      properties:
        status:
          type: string
          description: Status of the distribution to this site
        target_artifactory:
          $ref: '#/components/schemas/DistributionTarget'
          description: The target Artifactory instance
        total_files:
          type: integer
          description: Total number of files to distribute
        total_bytes:
          type: integer
          format: int64
          description: Total number of bytes to distribute
        distributed_files:
          type: integer
          description: Number of files successfully distributed
        distributed_bytes:
          type: integer
          format: int64
          description: Number of bytes successfully distributed
        distributed_by:
          type: string
          description: User who initiated the distribution
        start_time:
          type: string
          description: Timestamp when distribution to this site started
        finish_time:
