      - Scanning V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                repo:
                  type: string
                  description: Repository name.
                path:
                  type: string
                  description: Artifact path in the repository.
              required:
              - repo
              - path
            example:
              repo: my-repository
              path: path-to/manifest.json
      responses:
        '200':
          description: Scan status returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  repo:
                    type: string
                    description: Repository name.
                  path:
                    type: string
                    description: Artifact path.
                  status:
                    type: string
                    description: Overall scan status.
                  last_successful_scan_date:
                    type: string
                    description: Timestamp of the last successful scan (if any).
                  categories:
