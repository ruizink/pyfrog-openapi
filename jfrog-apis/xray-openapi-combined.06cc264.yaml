          content:
            application/json:
              schema:
                type: object
  /api/v1/reports/export/{id}:
    get:
      operationId: export
      summary: Export Report
      description: 'Exports a report and its data to a PDF, JSON, or CSV file. The
        response is a ZIP file stream containing the exported file with the naming
        convention `<file_name>.pdf|json|csv`. The report ID can be retrieved using
        the Get Reports List endpoint.


        Two mandatory query parameters must be provided: `file_name` (desired file
        name without suffix) and `format` (pdf, json, or csv).


        For Xray version 3.21.2 and above with Projects, a Project Admin with Manage
        Security Assets privilege can export a report in the scope of a project by
        using the additional query parameter `projectKey`.


        Requires a user with the Manage Reports role. Since Xray 3.8.

        '
      tags:
      - Reports V1
      parameters:
      - name: id
        in: path
        description: The unique identifier of the report to export.
        required: true
        schema:
          type: string
      - name: file_name
        in: query
        description: The desired file name for download (without a suffix).
        required: true
        schema:
          type: string
      - name: format
        in: query
        description: 'Export format: pdf, json, or csv.'
        required: true
        schema:
          type: string
          enum:
          - pdf
          - json
          - csv
      - name: projectKey
        in: query
        description: Project scope (when Projects are enabled).
        required: false
        schema:
          type: string
      responses:
        '200':
          description: A ZIP file stream containing the exported report.
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '404':
          description: Report not found
          content:
            application/json:
              schema:
                type: object
  /api/v1/reports/{id}:
    get:
      operationId: get-report-details-by-id
      summary: Get Report Details By ID
      description: 'Returns the metadata and status of a report by its unique ID,
        including progress, row count, start/end times, and report type.


        For Xray version 3.21.2 and above with Projects, a Project Admin with Manage
        Security Assets privilege can get report details in the scope of a project
        by using the additional query parameter `projectKey`.


        Requires a user with the Manage Reports role. Since Xray 3.8.

        '
      tags:
      - Reports V1
      parameters:
      - name: id
        in: path
        description: The unique identifier of the report.
        required: true
        schema:
          type: string
      - name: projectKey
        in: query
        description: Project scope (when Projects are enabled).
        required: false
        schema:
          type: string
      responses:
        '200':
          description: OK - Report details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Report identifier.
                  name:
                    type: string
                    description: Report name.
                  status:
                    type: string
                    description: Report status, e.g. pending, running, completed,
                      failed.
                  total_artifacts:
                    type: integer
                    description: Total number of artifacts in the report scope.
                  num_of_processed_artifacts:
                    type: integer
                    description: Number of artifacts processed so far.
                  progress:
                    type: integer
                    description: Progress percentage (0-100).
                  number_of_rows:
                    type: integer
                    description: Number of result rows.
                  start_time:
                    type: string
                    description: Report generation start time.
                  end_time_estimation:
                    type: string
                    description: Estimated end time.
                  error:
                    type: string
                    description: Error message in case of failure.
                  author:
                    type: string
                    description: User who initiated the report.
                  report_type:
                    type: string
                    description: Type of report, e.g. license, vulnerability, operational_risk.
              example:
                id: 1234
                name: vul_report_1
                status: completed
                total_artifacts: 1000
                num_of_processed_artifacts: 10
                progress: 1
                number_of_rows: 10
                start_time: '1970-01-01T02:00:00+02:00'
                end_time_estimation: '1970-01-01T03:00:00+02:00'
                author: admin
                report_type: vulnerability
        '404':
          description: Report not found
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: delete
      summary: Delete Report
      description: 'Deletes a report by its unique ID. Once deleted, the report and
        its data are permanently removed.


        For Xray version 3.21.2 and above with Projects, a Project Admin with Manage
        Security Assets privilege can delete a report in the scope of a project by
        using the additional query parameter `projectKey`.


        Requires a user with the Manage Reports role. Since Xray 3.8.

        '
      tags:
      - Reports V1
      parameters:
      - name: id
        in: path
        description: The unique identifier of the report to delete.
        required: true
        schema:
          type: string
      - name: projectKey
        in: query
        description: Project scope (when Projects are enabled).
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Report deleted successfully
          content:
            application/json:
              schema:
                type: string
              example: report deleted successfully
        '404':
          description: Report not found
          content:
            application/json:
              schema:
                type: object
