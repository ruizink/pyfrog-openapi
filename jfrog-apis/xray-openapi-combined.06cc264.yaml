  /api/v1/forceReindex:
    post:
      operationId: force-reindex
      summary: Force Reindex
      description: 'Triggers a reindex of specified artifacts and/or builds. Use this
        to reindex existing resources that may have missing component data. The total
        number of entities (artifacts + builds) cannot exceed the configured maximum
        (default 1000).


        Requires Admin permission.

        '
      tags:
      - Indexing V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndexingForceReindexRequest'
            example:
              artifactory_id: ''
              artifacts:
              - repository: libs-release-local
                path: org/acme/app/1.0/app-1.0.jar
                sha256: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
              builds:
              - name: my-build
                number: '42'
      responses:
        '200':
          description: 'Reindex completed. Check sent_to_reindex for successfully
            queued items. If failed_send_to_reindex is present, some items could not
            be processed.

            '
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent_to_reindex:
                    type: object
                    description: Items successfully queued for reindexing.
                    properties:
                      artifacts:
                        type: array
                        items:
                          type: object
                          properties:
                            repository:
                              type: string
                            path:
                              type: string
                            sha256:
                              type: string
                      builds:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            number:
                              type: string
                            build_repo:
                              type: string
                  failed_send_to_reindex:
                    type: object
                    description: 'Items that failed to be queued. Only present if
                      there were failures. Each item includes an error field.

                      '
                    properties:
                      artifacts:
                        type: array
                        items:
                          type: object
                          properties:
                            repository:
                              type: string
                            path:
                              type: string
                            sha256:
                              type: string
                            error:
                              type: string
                      builds:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            number:
                              type: string
                            build_repo:
                              type: string
                            error:
                              type: string
              example:
                sent_to_reindex:
                  artifacts:
                  - repository: libs-release-local
                    path: org/acme/app/1.0/app-1.0.jar
                    sha256: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
                  builds:
                  - name: my-build
                    number: '42'
        '400':
          description: 'Too many entities to reindex, or failed to get artifactory
            data.

            '
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Total number of entities to reindex can't be greater than 1000
        '415':
          description: Failed to parse the request body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to parse force reindex request
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to get artifactory data
  /api/v2/index:
    post:
      operationId: scan-now_indexing-v2-openapi
      summary: Scan Now
