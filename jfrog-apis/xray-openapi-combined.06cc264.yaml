        in the path takes precedence over the name in the request body.


        **Notes:**

        - You cannot update the project_key property.

        - A Watch can include both Global and Project Policies.

        - For Xray version 3.21.2 and above with Projects, a Project Admin with Manage
        Security Assets privilege can update a Watch in the scope of a project by
        using the `projectKey` query parameter.


        Requires the ''Manage Watches'' role to be set on the User or Group level.'
      tags:
      - Watches V2
      parameters:
      - name: name
        in: path
        description: Name of the Watch to update.
        required: true
        schema:
          type: string
      - name: projectKey
        in: query
        description: Project key for scoped updates of a project Watch.
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WatchApiV2Request'
            example:
              general_data:
                description: This is a new watch created using API V2
                active: true
              project_resources:
                resources:
                - type: all-repos
                  filters:
                  - type: package-type
                    value: Docker
                  - type: package-type
                    value: Debian
              assigned_policies:
              - name: critial_issues
                type: security
              create_ticket_enabled: true
              ticket_profile: test
              watch_recipients:
              - mymail@acme.com
              - umac@youremail.com
      responses:
        '200':
          description: Success - Watch was successfully updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                    description: Success message.
              example:
                info: Watch was successfully updated
        '400':
          description: 'Failed to update watch: Watch name is empty'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '403':
          description: 'Failed to update watch: no permissions'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: Failed to update the watch. Watch not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '415':
          description: Failed to parse request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Failed to update Watch
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    delete:
      operationId: delete-watch_watches-v2-openapi
      summary: Delete Watch
      description: 'Deletes a Watch by name.


        **Notes:**

        - For Xray version 3.21.2 and above with Projects, a Project Admin with Manage
        Security Assets privilege can delete a Watch in the scope of a project by
        using the `projectKey` query parameter.

        - A Watch can include both Global and Project Policies.


        Requires the ''Manage Watches'' role to be set on the User or Group level.'
      tags:
      - Watches V2
      parameters:
      - name: name
        in: path
        description: Name of the Watch to delete.
        required: true
        schema:
          type: string
      - name: projectKey
        in: query
        description: Project key for scoped deletion of a project Watch.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Success - Watch deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                    description: Success message.
        '403':
          description: Failed to delete Watch
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: Watch not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Failed to delete Watch
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Basic authentication using username/password or API key
  schemas:
    ArtifactsCompareBuildsRequest:
      type: object
      description: Two builds to compare (see Compare Builds / build delta in Xray
        REST API documentation).
      required:
      - source_artifactory_id
      - source_build_name
      - source_build_number
      - target_artifactory_id
      - target_build_name
      - target_build_number
      properties:
        source_artifactory_id:
          type: string
          description: Name of the first Artifactory instance
        source_build_name:
          type: string
          description: Name of the first build
        source_build_number:
          type: string
          description: Number of the first build
        target_artifactory_id:
          type: string
          description: Name of the second Artifactory instance
        target_build_name:
          type: string
          description: Name of the second build
        target_build_number:
          type: string
          description: Number of the second build
    ArtifactsBuildVulnerabilityDiffRequest:
      type: object
      description: Compares vulnerability differences between two build/component
        graphs (PDF §12.41).
      required:
      - source_component_id
      - target_component_id
      properties:
        source_component_id:
          type: string
          description: Source component identifier (e.g. build component id).
        target_component_id:
          type: string
          description: Target component identifier.
        group_by:
          type: string
          description: Grouping key for the diff results.
          enum:
          - severity
          - package_id
    ArtifactsBuildVulnerabilityDiffResponse:
      type: object
      description: Vulnerability diff result grouped by severity or package ID.
      properties:
        data:
          type: object
          description: 'Map of group keys to diff objects containing added, removed,
            changed, and unchanged vulnerability arrays.

            '
    ArtifactsArtifactDependencyGraphRequest:
      type: object
      required:
      - path
      description: Artifact locator for dependency graph (see JFrog documentation).
        Path is the artifact path (/artifactory-name/repo-name/path); default artifactory
        name is often 'Artifactory'.
      properties:
        path:
          type: string
          description: Full path of the artifact, e.g. /default/my-repo/myArtifact/3.14
          example: /Artifactory/pnnl/goss/goss-core-client/0.1.7/goss-core-client-0.1.7-sources.jar
    XrayGenericJsonRequest:
      type: object
      description: JSON request body; refer to JFrog Xray REST API documentation for
        this operation.
      additionalProperties: true
    ContextualAnalysisScanRequest:
      type: object
      description: Start Contextual Analysis scan (PDF §12.37).
      required:
      - component_id
      - path
      - repo
      properties:
        component_id:
          type: string
          description: Artifact component id (e.g. gav://, npm://).
        path:
          type: string
          description: Artifact path in the repository.
        repo:
          type: string
          description: Repository name (included in PDF sample alongside path).
      additionalProperties: true
    CustomIssuesEventMutationRequest:
      type: object
      description: JSON body for creating or updating a vendor issue event (Custom
        Issues API).
      properties:
        id:
          type: string
          description: Unique issue identifier. Cannot have an 'Xray' prefix.
        package_type:
          type: string
          description: Package technology (e.g. maven, npm).
        type:
          type: string
          description: Issue type (e.g. Security).
        provider:
          type: string
          description: Vendor or provider identifier. Cannot be 'JFrog'.
        summary:
          type: string
          description: Short summary of the issue.
        description:
          type: string
          description: Detailed description of the issue.
        severity:
          type: string
          description: Issue severity (e.g. High, Medium, Low, Critical).
        cves:
          type: array
          description: List of associated CVEs.
          items:
            type: object
            properties:
              cve:
                type: string
                description: CVE identifier.
              cvss_v2:
                type: string
                description: CVSS v2 score.
        sources:
          type: array
          description: List of sources for this issue.
          items:
            type: object
            properties:
              source_id:
                type: string
                description: Source identifier (e.g. CVE ID).
        components:
          type: array
          description: List of affected components.
          items:
            type: object
            properties:
              id:
                type: string
                description: Component identifier.
              vulnerable_versions:
                type: array
                description: List of vulnerable version ranges.
                items:
                  type: string
              fixed_versions:
                type: array
                description: List of fixed version ranges (null if none).
                items:
                  type: string
      required:
      - id
      - package_type
      - type
      - provider
      - severity
      - components
      example:
        id: IMP-ISSUE-787
        package_type: maven
        type: Security
        provider: sec-dep
        severity: High
        summary: A very important custom issue
        description: A very important custom issue
        cves:
        - cve: CVE-2017-1000386
          cvss_v2: '2.4'
        sources:
        - source_id: CVE-2017-1000386
        components:
        - id: aero:aero
          vulnerable_versions:
          - '[0.2.3]'
          fixed_versions: null
    IgnoreRulesCreateRequest:
      type: object
      description: 'Request body for creating an ignore rule. Must include notes and
        an ignore_filters object with at least one objective filter.

        '
      required:
      - notes
      - ignore_filters
      properties:
        notes:
          type: string
          description: Free-text note explaining why this rule was created.
          example: ignore CVE-2016-2168 when watch is tstWatch
        expires_at:
          type: string
          format: date-time
          description: 'Optional expiration date in RFC 3339 format. After this date
            the rule is marked as expired and stops suppressing violations.

            '
          example: '2026-06-29T00:00:00Z'
        ignore_filters:
          $ref: '#/components/schemas/IgnoreRuleFilters'
    IgnoreRuleFilters:
      type: object
      description: 'Filters that define what to ignore. Combine objective filters
        (what issue type) with optional scope filters (where to apply). At least one
        objective filter is required.

        '
      properties:
        vulnerabilities:
          type: array
          description: 'List of vulnerability IDs (XRAY-nnnnn) to ignore. Use ["any"]
            to ignore all vulnerabilities.

            '
          items:
            type: string
          example:
          - XRAY-12345
        cves:
          type: array
          description: 'List of CVE IDs to ignore. Use ["any"] to ignore all CVEs.

            '
          items:
            type: string
          example:
          - CVE-2016-2168
        licenses:
          type: array
          description: 'List of license names to ignore. Use ["any"] to ignore all
            licenses.

            '
          items:
            type: string
          example:
          - any
        operational_risk:
          type: array
          description: 'List of operational risk identifiers. Use ["any"] to ignore
            all.

            '
          items:
            type: string
          example:
          - any
        exposures:
          type: object
          description: Exposure-specific filters.
          properties:
            scanners:
              type: array
              description: List of exposure scanner IDs (e.g., EXP-12345).
              items:
                type: string
            categories:
              type: array
              description: Exposure categories (secrets, services, applications, iac,
                malicious_code).
              items:
                type: string
            file_path:
              type: array
              description: Specific file paths to ignore.
              items:
                type: string
            file_path_pattern:
              type: array
              description: File path patterns to ignore.
              items:
                type: string
            fingerprints:
              type: array
              description: Exposure fingerprints to ignore.
              items:
                type: string
        policies:
          type: array
          description: Scope filter - list of policy names.
          items:
            type: string
        watches:
          type: array
          description: Scope filter - list of watch names.
          items:
            type: string
          example:
          - tstWatch
        projects:
          type: array
          description: Scope filter - list of project keys.
          items:
            type: string
        components:
          type: array
          description: Scope filter - list of components (name required, version optional).
          items:
            type: object
            properties:
              name:
                type: string
                description: Component identifier (e.g., docker://alpine, npm://lodash).
              version:
                type: string
                description: Component version. Omit to match all versions.
        artifacts:
          type: array
          description: Scope filter - list of artifacts (name required, version/path
            optional).
          items:
            type: object
            properties:
              name:
                type: string
              version:
                type: string
              path:
                type: string
        builds:
          type: array
          description: Scope filter - list of builds (name required, version/project
            optional).
          items:
            type: object
            properties:
              name:
                type: string
              version:
                type: string
              project:
                type: string
        release-bundles:
          type: array
          description: Scope filter - list of release bundles (name required, version
            optional).
          items:
            type: object
            properties:
              name:
                type: string
              version:
                type: string
        release_bundles_v2:
          type: array
          description: Scope filter - list of v2 release bundles.
          items:
            type: object
            properties:
              name:
                type: string
              version:
                type: string
        docker-layers:
          type: array
          description: Scope filter - list of Docker layer SHA256 hashes.
          items:
            type: string
        git_repositories:
          type: array
          description: Scope filter - list of git repository names.
          items:
            type: string
    IgnoreRuleApiResponse:
      type: object
      description: An ignore rule as returned by the GET endpoints.
      properties:
        id:
          type: string
          description: Unique external identifier of the ignore rule.
          example: 269c3072-4735-4244-4886-17ae1dc5fcd6
        author:
          type: string
          description: User who created the rule.
          example: admin
        created:
          type: string
          format: date-time
          description: Timestamp when the rule was created (RFC 3339).
          example: '2024-01-15T10:30:00.000Z'
        notes:
          type: string
          description: Free-text note explaining the rule.
          example: ignore CVE-2016-2168 when watch is tstWatch
        is_expired:
          type: boolean
          description: Whether the rule has expired.
          example: false
        expires_at:
          type: string
          format: date-time
          description: Expiration date, if set (RFC 3339).
        project_key:
          type: string
          description: Project key if the rule is project-scoped.
        deleted_by:
          type: string
          description: User who deleted the rule (if soft-deleted).
        deleted_at:
          type: string
          format: date-time
          description: Timestamp when the rule was deleted (if soft-deleted).
        ignore_filters:
          $ref: '#/components/schemas/IgnoreRuleFilters'
    IndexingForceReindexRequest:
      type: object
      description: 'Specifies which artifacts and/or builds to reindex. Provide at
        least one artifact or build.

        '
      properties:
        artifactory_id:
          type: string
          description: 'Optional Artifactory instance ID. If omitted, the configured
            instance is used automatically.

            '
        artifacts:
          type: array
          description: List of artifacts to reindex.
          items:
            type: object
            properties:
              repository:
                type: string
                description: Repository name.
                example: libs-release-local
              path:
                type: string
                description: Artifact path within the repository.
                example: org/acme/app/1.0/app-1.0.jar
              sha256:
                type: string
                description: SHA256 checksum of the artifact.
                example: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
        builds:
          type: array
          description: List of builds to reindex.
          items:
            type: object
            required:
            - name
            - number
            properties:
              name:
                type: string
                description: Build name.
                example: my-build
              number:
                type: string
                description: Build number/version.
                example: '42'
              build_repo:
                type: string
                description: Build repository name.
              project:
                type: string
                description: Project key. When set, the build repo is resolved from
                  the project.
        is_non_indexed_repo_allowed:
          type: boolean
          description: If true, allows reindexing artifacts from non-indexed repositories.
      additionalProperties: true
    JiraIntegrationCreateRequest:
      type: object
      description: Create Jira integration (PDF §21.1 — JSON body; query parameters
        none).
      required:
      - connection_name
      - auth_type
      - username
      - password
      - installation_type
      - jira_server_url
      properties:
        connection_name:
          type: string
          description: A unique identifier for the connection.
        auth_type:
          type: string
          description: Authentication method. Valid values — basic.
          enum:
          - basic
        username:
          type: string
          description: Username for authentication.
        password:
          type: string
          description: Password for authentication.
        installation_type:
          type: string
          description: cloud or server.
          enum:
          - cloud
          - server
        jira_server_url:
          type: string
          description: URL of the Jira server where tickets will be created.
          format: uri
        skip_proxy:
          type: boolean
          description: Whether to bypass proxy settings. Default false.
          default: false
      additionalProperties: true
    JiraIntegrationUpdateRequest:
      type: object
      description: Update Jira integration (PDF §21.4 — JSON body; path carries connection
        name; query parameters none).
      required:
      - connection_name
      properties:
        connection_name:
          type: string
          description: Name of the connection to update.
        auth_type:
          type: string
          enum:
          - basic
        username:
          type: string
        password:
          type: string
        installation_type:
          type: string
          enum:
          - cloud
          - server
        jira_server_url:
          type: string
          format: uri
        skip_proxy:
          type: boolean
          default: false
      additionalProperties: true
    JiraIntegrationCreateResponse:
      type: object
      description: Create/update success or error wrapper (PDF).
      properties:
        info:
          type: string
          description: Present on success.
        error:
          type: string
          description: Present on failure responses.
      additionalProperties: true
    JiraIntegrationStatusResponse:
      type: object
      description: Integration health check (PDF §21.3).
      required:
      - status
      - reason
      - time
      - integration_name
      properties:
        status:
          type: string
          description: HEALTHY_INTEGRATION, INTEGRATION_NOT_FOUND, INTERNAL_SERVER_ERROR,
            FAULTY_CONFIGURATION.
        reason:
          type: string
        time:
          type: string
          description: RFC 3339 timestamp.
        integration_name:
          type: string
      additionalProperties: true
    LegalAssignCustomLicenseRequest:
      type: object
      description: Request body for assigning a license to a component.
      required:
      - component
      - license
      properties:
        component:
          type: object
          description: Identifies the component to assign the license to.
          required:
          - package_id
          properties:
            package_id:
              type: string
              description: Package identifier (e.g., npm://lodash, build://my-build).
              example: npm://lodash
            component_name:
              type: string
              description: Component name.
              example: lodash
            pkg_type:
              type: string
              description: Package type (e.g., npm, maven, pypi).
              example: npm
            version:
              type: string
              description: Component version.
              example: 4.17.21
            distribution:
              type: string
              description: Distribution identifier for remote repositories.
            build_repo:
              type: string
              description: Build repository name. Required for build:// components.
        license:
          type: object
          description: Specifies the license to assign. Must be a known license.
          required:
          - name
          properties:
            name:
              type: string
              description: License identifier. Must be a known license in the system.
              example: MIT
            full_name:
              type: string
              description: Full display name of the license.
              example: The MIT License
            references:
              type: array
              description: Array of reference URLs for the license.
              items:
                type: string
            aliases:
              type: array
              description: Array of alternative names for the license.
              items:
                type: string
              example:
              - MIT License
    LegalCreateCustomLicenseRequest:
      type: object
      description: 'Request body for creating a custom license. The name must be unique
        and cannot exceed 128 characters.

        '
      required:
      - name
      properties:
        name:
          type: string
          description: License key/identifier. Must be unique. Maximum 128 characters.
          example: MyCustomLicense
        full_name:
          type: string
          description: Full display name of the license.
          example: My Custom License Full Name
        text:
          type: string
          description: Description or full text of the license.
          example: This is a custom license description
        references:
          type: array
          description: Array of URLs or references related to the license.
          items:
            type: string
          example:
          - https://example.com/license
        aliases:
          type: array
          description: Array of alternative names. Each alias max 128 characters.
          items:
            type: string
          example:
          - MCL
          - MyLicense
        category:
          type: string
          description: License category. Defaults to Uncategorized if not specified.
          example: Permissive
    PolicyAssignToWatchesRequest:
      type: object
      description: 'Request body containing the list of watch names to assign the
        policy to.

        '
      required:
      - watches
      properties:
        watches:
          type: array
          description: 'List of watch names to assign the policy to. Each watch is
            processed independently.

            '
          items:
            type: string
          example:
          - prod-watch
          - staging-watch
    PolicyAssignToWatchesResponse:
      type: object
      description: 'Result of the assignment operation. The `result` object contains
        one entry per watch name from the request, with a status message indicating
        the outcome. Possible status values: "Policy assigned successfully to Watch",
        "Policy was already assigned to Watch", "Watch was not found", "Error Assigning
        Policy to Watch".

        '
      properties:
        result:
          type: object
          description: 'Map of watch name to assignment status string.

            '
          properties:
            '{watch_name}':
              type: string
              description: 'Status message for the watch. Key is the watch name.

                '
              example: Policy assigned successfully to Watch
          example:
            prod-watch: Policy assigned successfully to Watch
            staging-watch: Watch was not found
    PoliciesPolicyMutationRequest:
      type: object
      description: 'Request body for creating or updating a policy. A policy defines
        rules that determine how Xray identifies and acts on issues found during scanning.
        Each policy has a type (security, license, or operational_risk) and contains
        one or more rules. Each rule has criteria (what to match) and actions (what
        to do when matched).

        '
      required:
      - name
      - type
      - rules
      properties:
        name:
          type: string
          description: 'Name of the policy. Must be unique across the system (or within
            a project when using projectKey).

            '
          example: my-security-policy
        description:
          type: string
          description: Optional free-text description of the policy.
          example: Block critical vulnerabilities in production repos
        type:
          type: string
          description: 'The policy type. Determines which criteria fields are available
            in the rules.

            '
          enum:
          - security
          - license
          - operational_risk
          example: security
        rules:
          type: array
          description: 'One or more rules that define the policy behavior. Each rule
            specifies criteria to match and actions to take when matched.

            '
          items:
            $ref: '#/components/schemas/PolicyRule'
    PolicyRule:
      type: object
      description: 'A single rule within a policy. Contains criteria for matching
        issues and actions to execute when criteria are met.

        '
      required:
      - name
      - criteria
      - actions
      properties:
        name:
          type: string
          description: Name of the rule.
          example: critical-vuln-rule
        priority:
          type: integer
          description: 'Priority for ordering between rules. Lower numbers indicate
            higher priority.

            '
          example: 1
        criteria:
          $ref: '#/components/schemas/PolicyCriteria'
        actions:
          $ref: '#/components/schemas/PolicyActions'
    PolicyCriteria:
      type: object
      description: 'Criteria that determine which issues trigger the rule. The available
        fields depend on the policy type. For security policies use min_severity,
        cvss_range, vulnerability_ids, etc. For license policies use allow_licenses,
        banned_licenses, etc. For operational_risk policies use op_risk_min_risk,
        op_risk_custom, etc.

        '
      properties:
        min_severity:
          type: string
          description: 'Minimum severity of vulnerabilities to match. Applies to security
            and exposures policy types.

            '
          enum:
          - critical
          - high
          - medium
          - low
          - all severities
          example: High
        cvss_range:
          $ref: '#/components/schemas/PolicyCvssRange'
        vulnerability_ids:
          type: array
          description: 'Match specific CVEs and/or XRAY IDs. A CVE identifier has
            the format CVE-YYYY-NNNNN, an XRAY ID has the format XRAY-NNNNNN.

            '
          items:
            type: string
          example:
          - CVE-2022-23307
          - XRAY-23432
        fix_version_dependant:
          type: boolean
          description: Only match when a fixed version is available.
        applicable_cves_only:
          type: boolean
          description: Only match CVEs determined to be applicable by contextual analysis.
        malicious_package:
          type: boolean
          description: Match packages identified as malicious.
        exposures:
          $ref: '#/components/schemas/PolicyExposures'
        package_name:
          type: string
          description: 'Filter by specific package name. The name format varies between
            package types.

            '
          example: log4j-core
        package_type:
          type: string
          description: Filter by package type.
          enum:
          - maven
          - docker
          - npm
          - pypi
          - nuget
          - rpm
          - conan
          - debian
          - rubygems
          - generic
          - golang
          - conda
          - composer
          - alpine
          - cargo
          - cran
          - terraformbe
          - bower
          - huggingface
          - oci
          example: maven
        package_versions:
          type: array
          description: 'Filter by specific package versions. Supports exact versions
            and ranges. Any version: (,). Specific version: [v1]. Ranges: (v1,v2)
            open interval, [v1,v2] closed interval, (v1,v2] and [v1,v2) half-open
            intervals.

            '
          items:
            type: string
          example:
          - '[1.1,1.3]'
        allow_licenses:
          type: array
          description: 'List of allowed licenses for license-type policies. Components
            with licenses not in this list will trigger the rule.

            '
          items:
            type: string
          example:
          - GPL-3.0
          - MIT
        allowed_licenses:
          type: array
          description: 'List of allowed licenses (alias for allow_licenses).

            '
          items:
            type: string
          example:
          - BSD
          - AAL
        allow_unknown:
          type: boolean
          description: Whether to allow components with unknown licenses.
          example: true
        banned_licenses:
          type: array
          description: 'List of banned licenses. Components with these licenses will
            trigger the rule.

            '
          items:
            type: string
          example:
          - GPL-3.0
        multi_license_permissive:
          type: boolean
          description: 'Use permissive approach for components with multiple licenses.

            '
        op_risk_min_risk:
          type: string
          description: Minimum operational risk level to match.
          enum:
          - high
          - medium
          - low
          example: medium
        op_risk_custom:
          $ref: '#/components/schemas/PolicyOpRiskCustom'
    PolicyCvssRange:
      type: object
      description: CVSS score range for filtering vulnerabilities.
      properties:
        from:
          type: string
          description: Start of CVSS score range (0.0 - 10.0).
          example: '6.3'
        to:
          type: string
          description: End of CVSS score range (0.0 - 10.0).
          example: '9.0'
    PolicyExposures:
      type: object
      description: 'Criteria for matching exposures (contextual analysis findings).
        Enable specific categories to scope which exposure types trigger the rule.

        '
      properties:
        min_severity:
          type: string
          description: Minimum severity of exposures to match.
          enum:
          - critical
          - high
          - medium
          - low
          - all severities
          example: high
        applications:
          type: boolean
          description: Apply criteria to the applications exposure category.
        iac:
          type: boolean
          description: Apply criteria to the Infrastructure as Code (IaC) exposure
            category.
        malicious_code:
          type: boolean
          description: Apply criteria to the malicious code exposure category.
        secrets:
          type: boolean
          description: Apply criteria to the secrets exposure category.
        services:
          type: boolean
          description: Apply criteria to the services exposure category.
    PolicyOpRiskCustom:
      type: object
      description: 'Custom operational risk criteria. Use use_and_condition or use_or_condition
        to combine multiple conditions.

        '
      properties:
        op_risk_min_risk:
          type: string
          description: Minimum operational risk level.
          enum:
          - high
          - medium
          - low
        use_and_condition:
          type: boolean
          description: 'When true, all custom conditions must be met (AND logic).
            When false, any single condition triggers the rule (OR logic).

            '
        is_eol:
          type: boolean
          description: Match packages that have reached end of life.
        commits_less_than:
          type: integer
          description: Match packages with fewer commits per year than this value.
          enum:
          - 10
          - 25
          - 50
          - 100
        newer_versions_greater_than:
          type: integer
          description: Match packages where newer versions exceed this count.
          enum:
          - 1
          - 2
          - 3
          - 4
          - 5
        committers_less_than:
          type: integer
          description: Match packages with fewer committers per year than this value.
          enum:
          - 1
          - 2
          - 3
          - 4
          - 5
        release_date_greater_than_months:
          type: integer
          description: Match packages with a release date older than this many months.
          enum:
          - 6
          - 12
          - 18
          - 24
          - 30
          - 36
        release_cadence_per_year_less_than:
          type: integer
          description: Match packages with fewer releases per year than this value.
          enum:
          - 1
          - 2
          - 3
          - 4
          - 5
        risk:
          type: string
          description: Minimum operational risk level.
          enum:
          - high
          - medium
          - low
    PolicyActions:
      type: object
      description: 'Actions to execute when a rule''s criteria are matched. Multiple
        actions can be combined.

        '
      properties:
        custom_severity:
          type: string
          description: 'Override the severity of the generated violation. Applies
            only to Operational Risk and License type policies.

            '
          enum:
          - critical
          - high
          - medium
          - low
          example: high
        webhooks:
          type: array
          description: Webhook names to invoke when the rule is triggered.
          items:
            type: string
          example:
          - sec_webhook
        notify_watch_recipients:
          type: boolean
          description: Notify users subscribed to the watch.
          example: true
        notify_deployer:
          type: boolean
          description: Notify the user who deployed the artifact.
          example: true
        mails:
          type: array
          description: Email addresses to notify.
          items:
            type: string
          example:
          - security-team@example.com
        create_ticket_enabled:
          type: boolean
          description: 'Automatically create a Jira ticket for the violation. Requires
            a configured Jira integration.

            '
        block_download:
          $ref: '#/components/schemas/PolicyBlockDownload'
        block_release_bundle_distribution:
          type: boolean
          description: Block distribution of release bundles that match the rule.
        block_release_bundle_promotion:
          type: boolean
          description: Block promotion of release bundles that match the rule.
        fail_build:
          type: boolean
          description: Fail the build if the rule is triggered.
          example: true
        build_failure_grace_period_in_days:
          type: integer
          description: 'Grace period in days before the build is failed. Allows time
            to address the issue without immediately blocking CI/CD.

            '
          example: 5
    PolicyBlockDownload:
      type: object
      description: Controls whether artifact downloads are blocked.
      properties:
        active:
          type: boolean
          description: Block download of artifacts that match the rule.
          example: true
        unscanned:
          type: boolean
          description: Block download of artifacts that have not been scanned.
          example: true
        grace_period_days:
          type: integer
          description: 'Grace period in days before blocking takes effect. Allows
            time to address the issue.

            '
          example: 5
    PolicyApiResponse:
      type: object
      description: 'A policy object as returned by the v1 GET endpoints. Includes
        read-only fields (author, created, modified) in addition to the fields used
        for creation.

        '
      properties:
        name:
          type: string
          description: Name of the policy.
          example: sec-policy
        type:
          type: string
          description: The policy type.
          enum:
          - security
          - license
          - operational_risk
          example: security
        description:
          type: string
          description: Description of the policy.
          example: Block critical vulnerabilities
        author:
          type: string
          description: The user who created the policy.
          example: admin
        rules:
          type: array
          description: The rules defined in this policy.
          items:
            $ref: '#/components/schemas/PolicyApiRuleResponse'
        created:
          type: string
          format: date-time
          description: 'Timestamp when the policy was created. RFC 3339 format.

            '
          example: '2019-12-19T09:17:09.562Z'
        modified:
          type: string
          format: date-time
          description: 'Timestamp when the policy was last modified. RFC 3339 format.

            '
          example: '2024-01-15T10:30:00.000Z'
        watches:
          type: array
          description: Names of watches this policy is assigned to.
          items:
            type: string
          example:
          - prod-watch
          - staging-watch
        project_key:
          type: string
          description: 'The project key if this is a project-scoped policy. Empty
            for global policies.

            '
          example: myproj
    PolicyApiRuleResponse:
      type: object
