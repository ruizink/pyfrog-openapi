                    description: Issue identifier.
                  package_type:
                    type: string
                    description: Package technology.
                  type:
                    type: string
                    description: Issue type.
                  provider:
                    type: string
                    description: Vendor or provider identifier.
                  summary:
                    type: string
                    description: Short summary.
                  description:
                    type: string
                    description: Detailed description.
                  severity:
                    type: string
                    description: Issue severity.
                  created:
                    type: string
                    description: Creation timestamp.
                  cves:
                    type: array
                    description: Associated CVEs.
                    items:
                      type: object
                      properties:
                        cve:
                          type: string
                        cvss_v2:
                          type: string
                  sources:
                    type: array
                    description: Issue sources.
                    items:
                      type: object
                      properties:
                        source_id:
                          type: string
                  components:
                    type: array
                    description: Affected components.
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        vulnerable_versions:
                          type: array
                          items:
                            type: string
                        fixed_versions:
                          type: array
                          items:
                            type: string
                  modified:
                    type: string
                    description: Last modification timestamp.
                  edited:
                    type: string
                    description: Last edit timestamp.
              example:
                id: IMP-ISSUE-787
                package_type: maven
                type: security
                provider: sec-dep
                summary: A very important custom issue
                description: A very important custom issue
                severity: High
                created: '2019-12-17T15:29:31.958350982'
                cves:
                - cve: CVE-2017-1000386
