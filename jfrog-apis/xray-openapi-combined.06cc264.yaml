openapi: 3.1.0
info:
  title: Xray REST APIs
  description: Combined JFrog Xray REST API specification (all endpoints).
  version: '3.140'
servers:
- url: https://jf.example.com/xray
  description: JFrog Platform (Xray)
security:
- basicAuth: []
paths:
  /api/v1/dependencyGraph/artifact:
    post:
      operationId: get-artifact-dependency-graph
      summary: Get Artifact Dependency Graph
      description: 'Retrieves the complete dependency graph for a specified artifact.
        Returns the artifact metadata and a recursive tree of all its component dependencies,
        including package type and component IDs.


        Requires a user with Read permission.

        '
      tags:
      - Artifacts V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactsArtifactDependencyGraphRequest'
            example:
              path: default/libs-release-local/org/acme/app/1.0/app-1.0.jar
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactsArtifactDependencyGraphResponse'
        '400':
          description: Artifact '<PATH&>' doesn't exist or isn't indexed in Xray
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad credentials
          content:
            application/json:
              schema:
                type: object
        '415':
          description: Failed to parse request
          content:
            application/json:
              schema:
                type: object
  /api/v1/dependencyGraph/artifactDelta:
    post:
      operationId: compare-artifacts
      summary: Compare Artifacts
      description: 'Compares two artifacts and produces a delta of their dependency
        components. Returns the source and target artifact metadata plus three component
        lists: added (in target only), removed (in source only), and unchanged (in
        both).


        Requires a user with Read permission.

        '
      tags:
      - Artifacts V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactsCompareArtifactsRequest'
            example:
              source_artifact_path: /pnnl/goss/goss-core-client/0.1.7/goss-core-client-0.1.7-sources.jar
              target_artifact_path: /pnnl/goss/goss-core-client/0.1.8/goss-core-client-0.1.8-sources.jar
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  source_artifact:
                    type: object
                    properties:
                      name:
                        type: string
                      path:
                        type: string
                      pkg_type:
                        type: string
                      sha256:
                        type: string
                      sha1:
                        type: string
                    required:
                    - name
                    - path
                    - pkg_type
                    - sha256
                    - sha1
                  target_artifact:
                    type: object
                    properties:
                      name:
                        type: string
                      path:
                        type: string
                      pkg_type:
                        type: string
                      sha256:
                        type: string
                      sha1:
                        type: string
                    required:
                    - name
                    - path
                    - pkg_type
                    - sha256
                    - sha1
                  removed:
                    type: array
                    items:
                      type: object
                      properties:
                        component_name:
                          type: string
                        component_id:
                          type: string
                        package_type:
                          type: string
                        version:
                          type: string
                        created:
                          type: string
                        modified:
                          type: string
                      required:
                      - component_name
                      - component_id
                      - package_type
                      - version
                      - created
                      - modified
                  added:
                    type: array
                    items:
                      type: object
                      properties:
                        component_name:
                          type: string
                        component_id:
                          type: string
                        package_type:
                          type: string
                        version:
                          type: string
                        created:
                          type: string
                        modified:
                          type: string
                      required:
                      - component_name
                      - component_id
                      - package_type
                      - version
                      - created
                      - modified
                  unchanged:
                    type: array
                    items:
                      type: object
                      properties:
                        component_name:
                          type: string
                        component_id:
                          type: string
                        package_type:
                          type: string
                        version:
                          type: string
                        created:
                          type: string
                        modified:
                          type: string
                      required:
                      - component_name
                      - component_id
                      - package_type
                      - version
                      - created
                      - modified
                required:
                - source_artifact
                - target_artifact
                - removed
                - added
                - unchanged
              example:
                source_artifact:
                  name: artifactory-pro.zip
                  path: art2/ext-release-local/
                  pkg_type: Generic
                  sha256: d160c68ed8879ae42756e159daec1dd7ecfd53b6192321656b72715e20d46dd2
                  sha1: ''
                target_artifact:
                  name: artifactory-pro.zip
                  path: art2/ext-release-local/
                  pkg_type: Generic
                  sha256: d160c68ed8879ae42756e159daec1dd7ecfd53b6192321656b72715e20d46dd2
                  sha1: ''
                removed:
                - component_name: some-component-1.1
                  component_id: pip://some-component:1.1
                  package_type: pip
                  version: '1.1'
                  created: '2008-06-09T16:50:19Z'
                  modified: '2015-07-26T17:49:47Z'
                added:
                - component_name: Jinja2.7.2
                  component_id: pip://Jinja2:2.7.2
                  package_type: pip
                  version: 2.7.2
                  created: '2008-06-09T16:50:19Z'
                  modified: '2015-07-26T17:49:47Z'
                unchanged:
                - component_name: Apache1.4
                  component_id: gav://apache:1.4
                  package_type: maven
                  version: '1.4'
                  created: '2008-06-09T16:50:19Z'
                  modified: '2015-07-26T17:49:47Z'
        '400':
          description: Artifact '<PATH>' doesn't exist or isn't indexed in Xray
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad Credentials
          content:
            application/json:
              schema:
                type: object
        '415':
          description: Failed to parse request
          content:
            application/json:
              schema:
                type: object
  /api/v1/dependencyGraph/build:
    post:
      operationId: get-build-dependency-graph
      summary: Get Build Dependency Graph
      description: 'Retrieves the complete dependency graph for a build identified
        by name and number. Returns the build metadata and a recursive tree of all
        its component dependencies.


        Requires a user with Read permission.

        '
      tags:
      - Artifacts V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                build_name:
                  type: string
                  description: The build name.
                build_number:
                  type: string
                  description: The build number/version.
                artifactory_id:
                  type: string
                  description: Optional Artifactory instance ID.
                build_repo:
                  type: string
                  description: Build repository name.
                project:
                  type: string
                  description: Project key (optional).
              required:
              - build_name
              - build_number
            example:
              build_name: xray-test
              build_number: '157'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  build:
                    type: object
                    properties:
                      name:
                        type: string
                      path:
                        type: string
                      pkg_type:
                        type: string
                      sha256:
                        type: string
                      component_id:
                        type: string
                    required:
                    - name
                    - path
                    - pkg_type
                    - sha256
                    - component_id
                  components:
                    type: array
                    items:
                      type: object
                      properties:
                        component_name:
                          type: string
                        component_id:
                          type: string
                        package_type:
                          type: string
                        created:
                          type: string
                      required:
                      - component_name
                      - component_id
                      - package_type
                      - created
                required:
                - build
                - components
              example:
                build:
                  name: xray-test
                  path: default/test-build-info/xray-test
                  pkg_type: Build
                  sha256: 2e3ccd8c1e952a30f2c2865c9130553bdb11b4ed49b81e6ab08f22a29f5d303b
                  component_id: '[test-build-info]/xray-test:157'
                components:
                - component_name: multi1-3.7-20230730.132458-7-sources.jar
                  component_id: org.jfrog.test:multi1:3.7-20230730.132458-7
                  package_type: Maven
                  created: '2023-07-30T13:25:07Z'
                - component_name: multi1-3.7-20230730.132458-7-tests.jar
                  component_id: org.jfrog.test:multi1:3.7-20230730.132458-7
                  package_type: Maven
                  created: '2023-07-30T13:25:07Z'
                - component_name: javax.mail:mail:1.4.jar
                  component_id: javax.mail:mail:1.4
                  package_type: Maven
                  created: '2022-11-10T13:29:10Z'
                - component_name: hsqldb:hsqldb:1.8.0.10.jar
                  component_id: hsqldb:hsqldb:1.8.0.10
                  package_type: Maven
                  created: '2022-11-10T13:29:24Z'
        '400':
          description: Missing Artifactory ID
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad credentials
          content:
            application/json:
              schema:
                type: object
        '415':
          description: Failed to parse request
          content:
            application/json:
              schema:
                type: object
  /api/v1/dependencyGraph/buildDelta:
    post:
      operationId: compare-builds
      summary: Compare Builds
      description: 'Compares two builds and produces a delta of their dependency components.
        Returns the source and target build metadata plus three component lists: added
        (in target only), removed (in source only), and unchanged (in both).


        Requires a user with Read permission.

        '
      tags:
      - Artifacts V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactsCompareBuildsRequest'
            example:
              source_artifactory_id: default
              source_build_name: my-build
              source_build_number: '1'
              target_artifactory_id: default
              target_build_name: my-build
              target_build_number: '2'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  source_build:
                    type: object
                    properties:
                      name:
                        type: string
                      path:
                        type: string
                      pkg_type:
                        type: string
                      sha256:
                        type: string
                      component_id:
                        type: string
                    required:
                    - name
                    - path
                    - pkg_type
                    - sha256
                    - component_id
                  target_build:
                    type: object
                    properties:
                      name:
                        type: string
                      path:
                        type: string
                      pkg_type:
                        type: string
                      sha256:
                        type: string
                      component_id:
                        type: string
                    required:
                    - name
                    - path
                    - pkg_type
                    - sha256
                    - component_id
                  removed:
                    type: array
                    items:
                      type: object
                      properties:
                        component_name:
                          type: string
                        component_id:
                          type: string
                        package_type:
                          type: string
                        version:
                          type: string
                        created:
                          type: string
                        modified:
                          type: string
                      required:
                      - component_name
                      - component_id
                      - package_type
                      - version
                      - created
                      - modified
                  added:
                    type: array
                    items:
                      type: object
                      properties:
                        component_name:
                          type: string
                        component_id:
                          type: string
                        package_type:
                          type: string
                        version:
                          type: string
                        created:
                          type: string
                        modified:
                          type: string
                      required:
                      - component_name
                      - component_id
                      - package_type
                      - version
                      - created
                      - modified
                  unchanged:
                    type: array
                    items:
                      type: object
                      properties:
                        component_name:
                          type: string
                        component_id:
                          type: string
                        package_type:
                          type: string
                        version:
                          type: string
                        created:
                          type: string
                        modified:
                          type: string
                      required:
                      - component_name
                      - component_id
                      - package_type
                      - version
                      - created
                      - modified
                required:
                - source_build
                - target_build
                - removed
                - added
                - unchanged
              example:
                source_build:
                  name: my-build
                  path: art2/ext-release-local/
                  pkg_type: Generic
                  sha256: d160c68ed8879ae42756e159daec1dd7ecfd53b6192321656b72715e20d46dd2
                  component_id: gav://org.artifactory.pro:artifactory-pro-war:4.14.0
                target_build:
                  name: my-build
                  path: art2/ext-release-local/
                  pkg_type: Generic
                  sha256: d160c68ed8879ae42756e159daec1dd7ecfd53b6192321656b72715e20d46dd2
                  component_id: gav://org.artifactory.pro:artifactory-pro-war:4.14.0
                removed:
                - component_name: some-component-1.1
                  component_id: pip://some-component:1.1
                  package_type: pip
                  version: '1.1'
                  created: '2008-06-09T16:50:19Z'
                  modified: '2015-07-26T17:49:47Z'
                added:
                - component_name: Jinja2.7.2
                  component_id: pip://Jinja2:2.7.2
                  package_type: pip
                  version: 2.7.2
                  created: '2008-06-09T16:50:19Z'
                  modified: '2015-07-26T17:49:47Z'
                unchanged:
                - component_name: Apache1.4
                  component_id: gav://apache:1.4
                  package_type: maven
                  version: '1.4'
                  created: '2008-06-09T16:50:19Z'
                  modified: '2015-07-26T17:49:47Z'
        '400':
          description: The build with the provided identifier doesn't exist or isn't
            indexed in Xray
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad credentials
          content:
            application/json:
              schema:
                type: object
        '415':
          description: Failed to parse request
          content:
            application/json:
              schema:
                type: object
  /api/v1/details/release_bundle/{name}/{version}:
    get:
      operationId: release-bundle-details
      summary: Release Bundle Details
      description: 'Returns the scan status and optionally the license, security,
        and operational risk violations found in a Release Bundle.


        Requires Admin or Read permission.

        '
      tags:
      - Artifacts V1
      parameters:
      - name: name
        in: path
        description: Release bundle name.
        required: true
        schema:
          type: string
        example: my-release-bundle
      - name: version
        in: path
        description: Release bundle version.
        required: true
        schema:
          type: string
        example: 1.0.0
      - name: include_violations
        in: query
        description: 'Whether to include violation details in the response. Default:
          true.'
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Release bundle details retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Scan status of the release bundle.
                    example: ALLOWED
                  violations:
                    type: object
                    description: Violation details (when include_violations is true).
                    properties:
                      license:
                        type: array
                        items:
                          type: object
                      security:
                        type: array
                        items:
                          type: object
                      op_risk:
                        type: array
                        items:
                          type: object
              example:
                status: BLOCKED
                violations:
                  license: []
                  security:
                  - severity: High
                    type: security
                    summary: CVE-2021-44228
                  op_risk: []
        '404':
          description: Release bundle not found or not indexed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '409':
          description: Release bundle not marked for indexing.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/details/release_bundle_v2/{name}/{version}:
    get:
      operationId: release-bundle-v2-details
      summary: Release Bundle V2 Details
      description: 'Returns security, license, and operational risk violations found
        in a Release Bundle V2. Use the `operation` parameter to specify whether to
        check promotion or distribution violations.


        Requires Admin or Read permission. Since Xray 3.82.x.

        '
      tags:
      - Artifacts V1
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: Release bundle V2 name.
        example: my-rb-v2
      - name: version
        in: path
        required: true
        schema:
          type: string
        description: Release bundle V2 version.
        example: '1.1'
      - name: operation
        in: query
        required: true
        description: Which operation to check violations for.
        schema:
          type: string
          enum:
          - promotion
          - distribution
      - name: include_violations
        in: query
        required: false
        description: 'Include violation details in the response. Default: true.'
        schema:
          type: boolean
      - name: projectKey
        in: query
        required: false
        description: Project key scope.
        schema:
          type: string
      responses:
        '200':
          description: Release bundle details (allowed or blocked).
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  version:
                    type: string
                  operation:
                    type: string
                  status:
                    type: string
                    description: 'Status: blocked, allowed.'
                  ui_violations_url:
                    type: string
                  violations:
                    type: object
                    properties:
                      license:
                        type: array
                        items:
                          type: object
                      security:
                        type: array
                        items:
                          type: object
                      op_risk:
                        type: array
                        items:
                          type: object
              example:
                name: my-rb-v2
                version: '1.1'
                operation: promotion
                status: allowed
        '202':
          description: Scan is in progress.
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: Release bundle not found or not indexed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '409':
          description: Release bundle not marked for indexing.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/repos_config:
    put:
      operationId: update-repositories-configurations
      summary: Update Repositories Configurations
      description: 'Updates the scanning configuration for a specific repository,
        including contextual analysis settings, exposures scanning, retention period,
        and path-specific configurations.


        Requires Admin or Index Resources permission.

        '
      tags:
      - Artifacts V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - repo_name
              properties:
                repo_name:
                  type: string
                  description: Name of the repository to configure.
                  example: libs-release-local
                repo_config:
                  type: object
                  description: Repository-level configuration.
                  properties:
                    vuln_contextual_analysis:
                      type: boolean
                      description: Enable contextual analysis for vulnerabilities.
                    retention_in_days:
                      type: integer
                      description: Number of days to retain scan results.
                    exposures:
                      type: object
                      description: Exposures scanning configuration.
                      properties:
                        scanners_category:
                          type: object
                          properties:
                            services_scan:
                              type: boolean
                            secrets_scan:
                              type: boolean
                            applications_scan:
                              type: boolean
                repo_paths_config:
                  type: object
                  description: Path-specific configurations.
                  properties:
                    patterns:
                      type: array
                      description: Path pattern rules.
                      items:
                        type: object
                        properties:
                          include:
                            type: string
                          exclude:
                            type: string
                          index_new_artifacts:
                            type: boolean
                          retention_in_days:
                            type: integer
                    all_other_artifacts:
                      type: object
                      description: Configuration for artifacts not matching any pattern.
                      properties:
                        index_new_artifacts:
                          type: boolean
                        retention_in_days:
                          type: integer
            example:
              repo_name: libs-release-local
              repo_config:
                vuln_contextual_analysis: true
                retention_in_days: 90
                exposures:
                  scanners_category:
                    services_scan: true
                    secrets_scan: true
                    applications_scan: false
      responses:
        '200':
          description: Repository configuration updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
              example:
                info: Repository configuration has been updated successfully
        '400':
          description: Failed to decode request or invalid configuration.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to decode request
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/repos_config/{repo_name}:
    get:
      operationId: get-repositories-configurations
      summary: Get Repository Configuration
      description: 'Returns the scanning configuration for a specific repository,
        including contextual analysis, exposures, retention, and path-specific settings.


        Requires Read permission. Route supports project scope.

        '
      tags:
      - Artifacts V1
      parameters:
      - name: repo_name
        in: path
        description: Name of the repository.
        required: true
        schema:
          type: string
        example: libs-release-local
      - name: projectKey
        in: query
        description: Scope to the specified project.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Repository configuration retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  repo_name:
                    type: string
                  repo_config:
                    type: object
                    properties:
                      vuln_contextual_analysis:
                        type: boolean
                      retention_in_days:
                        type: integer
                      exposures:
                        type: object
                        properties:
                          scanners_category:
                            type: object
                            properties:
                              services_scan:
                                type: boolean
                              secrets_scan:
                                type: boolean
                              applications_scan:
                                type: boolean
                  repo_paths_config:
                    type: object
                    properties:
                      patterns:
                        type: array
                        items:
                          type: object
                          properties:
                            include:
                              type: string
                            exclude:
                              type: string
                            index_new_artifacts:
                              type: boolean
                            retention_in_days:
                              type: integer
                      all_other_artifacts:
                        type: object
                        properties:
                          index_new_artifacts:
                            type: boolean
                          retention_in_days:
                            type: integer
              example:
                repo_name: libs-release-local
                repo_config:
                  vuln_contextual_analysis: true
                  retention_in_days: 90
        '400':
          description: Empty repository name.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/diff/build:
    post:
      operationId: build-vulnerability-diff
      summary: Build Vulnerability Diff
      description: 'Compares security vulnerabilities between two builds and returns
        the differences grouped by severity or package ID. The response contains added,
        removed, changed, and unchanged vulnerability lists for each group.


        Requires a user with Read permission.

        '
      tags:
      - Artifacts V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactsBuildVulnerabilityDiffRequest'
            example:
