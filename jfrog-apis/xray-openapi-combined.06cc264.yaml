                    author: admin
                    created: 1709582260
                    notes: Ignore notes
                    is_expired: false
                  extended_information:
                    short_description: Improper temporary directory management in
                      Spring Boot can lead to local privilege escalation.
                    full_description: "[Spring Boot](https://spring.io/projects/spring-boot)\
                      \ is a project that is built on the top of the Spring Framework.\
                      \ It provides an easier and faster way to set up, configure,\
                      \ and run both simple and web-based applications. Spring Boot\
                      \ is the combination of the Spring Framework and an embedded\
                      \ application server such as Tomcat or Jetty. When the application\
                      \ instantiates a web server, it creates by default a work directory\
                      \ for configuration files, class files and others. \n\nSpring\
                      \ Boot is vulnerable to temporary directory hijacking. The temporary\
                      \ directory creation function [`createTempDir`](https://github.com/spring-projects/spring-boot/blob/ce70e7d768977242a8ea6f93188388f273be5851/spring-boot-project/spring-boot/src/main/java/org/springframework/boot/web/server/AbstractConfigurableWebServerFactory.java#L165-L177)\
                      \ deletes the temporary directory first, and then creates it\
                      \ again so that it will be empty and clean. A local attacker\
                      \ can monitor the Spring Boot process, catch the deletion of\
                      \ a temporary directory and start a race to create the directory\
                      \ before Spring Boot dies. If successful, the attacker will\
                      \ be the owner of the directory and will be able to dump and\
                      \ modify any created temporary files.\nThis can potentially\
                      \ lead to application takeover (running code with the privileges\
                      \ of Spring Boot) if the temporary directory contains important\
                      \ files such as configuration files, class files and others.\n\
                      \nNote: Spring Boot Autoconfiguration's popular annotations\
                      \ `@SpringBootApplication` and `@EnableAutoConfiguration` are\
                      \ instantiating a web server at runtime. Thus, if one of the\
                      \ annotations is present, it always makes the application vulnerable\
                      \ for this CVE."
                    jfrog_research_severity: Medium
                    jfrog_research_severity_reasons:
                    - name: The issue is trivial to exploit and does not require a
                        published writeup or PoC
                      description: Requires the attacker to create a temporary directory
                        before the Spring Boot process
                      is_positive: false
                    - name: The issue can only be exploited by an attacker that can
                        execute code on the vulnerable machine (excluding exceedingly
                        rare circumstances)
                      description: The attacker should be able to monitor temporary
                        directories
                      is_positive: true
                    - name: The impact of exploiting the issue depends on the context
                        of surrounding software. A severe impact such as RCE is not
                        guaranteed.
                      description: The impact depends on the contents of the hijacked
                        directory
                      is_positive: true
                    - name: The issue has a detailed technical explanation published,
                        that can aid in exploit development
                      is_positive: false
                    remediation: '##### Deployment mitigations


                      Setting the `java.io.tmpdir` system environment variable to
                      a directory that is exclusively owned by the executing user
                      will fix this vulnerability for all operating systems as follows:

                      ```

                      export _JAVA_OPTIONS=-Djava.io.tmpdir=/my/tmp/dir

