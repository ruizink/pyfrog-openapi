  /api/v1/violations:
    post:
      operationId: get-violations
      summary: Get Violations
      description: 'Gets Xray violations based on a set of search criteria. Returns
        violations with details about severity, type, infected components, and impacted
        artifacts. Use the `filters` object to narrow results by violation type, watch,
        severity, time range, CVE, issue ID, and specific resources. Use the `pagination`
        object to control sorting and paging.


        Starting from Xray version 3.42.3, JFrog Security CVE Research and Enrichment
        data is supported in the response. Fields short_description, full_description,
        and remediation are markdown.


        Requires a user with Read permissions.

        '
      tags:
      - Violations V1
      parameters:
      - name: projectKey
        in: query
        description: 'When included, the response is scoped to the specified project.

          '
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ViolationsSearchRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_violations:
                    type: integer
                  violations:
                    type: array
                    items:
                      type: object
                      properties:
                        description:
                          type: string
                        severity:
                          type: string
                        type:
                          type: string
                        infected_components:
                          type: array
                          items:
                            type: string
                        created:
                          type: string
                        watch_name:
                          type: string
                        issue_id:
                          type: string
                        violation_details_url:
                          type: string
                        impacted_artifacts:
                          type: array
                          items:
                            type: string
                        applicability:
                          type: 'null'
                      required:
                      - description
                      - severity
                      - type
                      - infected_components
                      - created
                      - watch_name
                      - issue_id
                      - violation_details_url
                      - impacted_artifacts
                required:
                - total_violations
                - violations
              example:
                total_violations: 1
                violations:
                - description: Number of new versions and Version Age
                  severity: High
                  type: Operational_Risk
                  infected_components:
                  - gav://joda-time:joda-time:2.9.9
                  created: '2022-03-24T14:54:42+02:00'
                  watch_name: OpRiskWatch
                  issue_id: 1ea7a8e0904b4a6c1a837e8ab437e0892dd00ad203814f3b9edfd2a3d8be3b88
                  violation_details_url: http://test.jfrog.io/xray/api/v1/violations?watch_id=8d5a6d7364154c5c2455993a&issue_id=1ea7a8e0904b4a6c1a837e8ab437e0892dd00ad203814f3b9edfd2a3d8be3b88&comp_id=gav:%2F%2Forg.jruby:jruby-complete:9.2.0.0
                  impacted_artifacts:
                  - default/generic-local/jruby-complete-9.2.0.0.jar
                  applicability: null
  /api/v1/violations/ignored:
    post:
      operationId: list-ignored-violations
      summary: List Ignored Violations
      description: 'Returns ignored violations by filters. Accepts objective filters
        (vulnerabilities, licenses, cves, operational_risk, exposures) and scope filters
        (policies, watches, components, artifacts, builds, release-bundles, etc.)
        in the request body. Pagination parameters are passed as query parameters.


        Requires the "Manage Watches" permission. Since Xray 3.11. Applicable to JFrog
        SaaS and Self-Hosted.

        '
      tags:
      - Violations V1
      parameters:
      - name: offset
        in: query
        description: Offset for pagination.
        required: false
        schema:
          type: integer
      - name: limit
        in: query
        description: Limit for pagination.
        required: false
        schema:
          type: integer
      - name: order_by
        in: query
        description: 'Field to order results. Possible values: updated, severity.'
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: 'Filters for listing ignored violations. All fields are
                optional.

                '
              properties:
                vulnerabilities:
                  type: array
                  description: List of vulnerability IDs (XRAY-nnnnn) to filter by.
                  items:
                    type: string
                licenses:
                  type: array
                  description: List of licenses to filter by.
                  items:
                    type: string
                cves:
                  type: array
                  description: List of CVEs to filter by.
                  items:
                    type: string
                operational_risk:
                  type: array
                  description: List of operational risk packages to filter by.
                  items:
                    type: string
                exposures:
                  type: array
                  description: List of exposures to filter by.
                  items:
                    type: string
                packages:
                  type: array
                  description: List of packages to filter by.
                  items:
                    type: string
                policies:
                  type: array
                  description: List of policies to filter by.
                  items:
                    type: string
                watches:
                  type: array
                  description: List of watches to filter by.
                  items:
                    type: string
                projects:
                  type: array
                  description: List of projects to filter by.
                  items:
                    type: string
                git_repositories:
                  type: array
                  description: List of git repositories to filter by.
                  items:
                    type: string
                components:
                  type: array
                  description: List of components to filter by (name required, version
                    optional).
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      version:
                        type: string
                docker-layers:
                  type: array
                  description: List of Docker layer SHA256 hashes.
                  items:
                    type: string
                artifacts:
                  type: array
                  description: List of artifacts to filter by (name required).
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                builds:
                  type: array
                  description: List of builds to filter by.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      version:
                        type: string
                release-bundles:
                  type: array
                  description: List of release bundles to filter by.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      version:
                        type: string
                release_bundles_v2:
                  type: array
                  description: List of v2 release bundles to filter by.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      version:
                        type: string
            example:
              vulnerabilities:
              - XRAY-521512
              artifacts:
              - name: docker://redis
      responses:
        '200':
          description: Successfully retrieved ignored violations.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: List of ignored violations.
                    items:
                      type: object
                  total_count:
                    type: integer
                    description: Total count of matching ignored violations.
        '400':
          description: Failed to parse filters or invalid parameters.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to parse filters
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to list ignored user issues by filters
  /api/v1/violations/restore:
    post:
      operationId: restore-ignored-violations
      summary: Restore Ignored Violations
      description: 'Restores violations that were previously ignored by an Ignore
        Rule. The violations are identified by their violation IDs. Maximum of 500
        violations can be restored per request (configurable).


        Requires the "Manage Watches" permission. Since Xray 3.16. Applicable to JFrog
        SaaS and Self-Hosted.

        '
      tags:
      - Violations V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - ids
              properties:
                ids:
                  type: array
                  description: Array of violation IDs to restore.
                  items:
                    type: string
            example:
              ids:
              - id1
              - id2
      responses:
        '200':
          description: Violations restored successfully.
        '400':
          description: 'No violation IDs provided, or too many IDs (limit 500 per
            request).

            '
          content:
