        in v2 only.

        '
      properties:
        mails:
          type: array
          description: Email addresses to notify.
          items:
            type: string
          example:
          - security-team@example.com
        webhooks:
          type: array
          description: Webhook names to invoke.
          items:
            type: string
          example:
          - sec_webhook
        fail_build:
          type: boolean
          description: Whether builds are failed when this rule triggers.
          example: true
        block_download:
          $ref: '#/components/schemas/PolicyBlockDownload'
        custom_severity:
          type: string
          description: 'Overridden severity for the generated violation.

            '
          enum:
          - critical
          - high
          - medium
          - low
        notify_watch_recipients:
          type: boolean
          description: Whether watch subscribers are notified.
        notify_deployer:
          type: boolean
          description: Whether the deployer is notified.
    PolicyApiV2Response:
      type: object
      description: 'A policy object as returned by the v2 GET endpoints. Includes
