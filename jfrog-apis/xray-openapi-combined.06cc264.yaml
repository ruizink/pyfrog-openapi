                    notes: Ignore notes
                    is_expired: false
                  extended_information:
                    short_description: Unsafe deserialization in Spring RemoteInvocationSerializingExporter
                      could lead to remote code execution.
                    full_description: Spring-based applications that export service
                      beans as endpoints using classes that extend the [RemoteInvocationSerializingExporter](https://docs.spring.io/spring-framework/docs/current/javadoc-api/org/springframework/remoting/rmi/RemoteInvocationSerializingExporter.html)
                      class are vulnerable to Java deserialization attacks which could
                      lead to RCE (Remote Code Execution). As of 2016, this vulnerability
                      is still not fixed, as the Pivotal team (the maintainers of
                      the Spring framework) disputed it as a security vulnerability
                      in Spring itself and decided not to issue a fix. Instead, they
                      deprecated `HttpInvokerServiceExporter` and `SimpleHttpInvokerServiceExporter`,
                      the potentially vulnerable exporter classes that extend `RemoteInvocationSerializingExporter`
                      and warned application developers not to use them when exposed
                      to untrusted user input (see "WARNING" in the [documentation](https://docs.spring.io/spring-framework/docs/current/javadoc-api/org/springframework/remoting/httpinvoker/HttpInvokerServiceExporter.html)).
