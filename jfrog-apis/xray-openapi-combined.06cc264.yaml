      properties:
        name:
          type: string
          description: Name of the rule.
          example: sec_rule
        priority:
          type: integer
          description: Priority for ordering between rules.
          example: 1
        criteria:
          $ref: '#/components/schemas/PolicyCriteria'
        actions:
          $ref: '#/components/schemas/PolicyApiActionsResponse'
    PolicyApiActionsResponse:
      type: object
      description: 'Actions configured for a v1 policy rule. Note: v1 actions do not
