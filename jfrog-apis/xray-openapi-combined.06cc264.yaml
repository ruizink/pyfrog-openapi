  /api/v1/repository/advancedScan/scan:
    post:
      operationId: repository-advanced-scans
      summary: Repository Advanced Scans
      description: Triggers an advanced security scan (JAS Exposures and Contextual
        Analysis) on a repository. Only artifacts already scanned by Xray (SCA) can
        be scanned. Requires the Manage Xray Metadata permission. Since Xray 3.73.
      tags:
      - Scanning V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                repository:
                  type: string
                  description: Name of the repository to scan.
                filters:
                  type: object
                  description: Filters to determine which artifacts to scan.
                  properties:
                    date_range:
                      type: object
                      description: Date range filter for artifact selection.
                      properties:
                        type:
                          type: string
                          description: 'Date filter type: artifact_deployment_date
                            or artifact_download_date.'
                        date_start:
                          type: string
                          format: date-time
                          description: Start of the date range (RFC 3339).
                        date_end:
                          type: string
                          format: date-time
                          description: End of the date range (RFC 3339).
                    patterns:
                      type: array
                      description: Path patterns to select artifacts.
                      items:
                        type: object
                        properties:
                          include_path_pattern:
                            type: string
                            description: Wildcard pattern for including artifact paths.
                          exclude_path_pattern:
                            type: string
                            description: Wildcard pattern for excluding artifact paths.
                contextual_analysis:
                  type: boolean
                  description: Whether to perform Contextual Analysis.
                exposures:
                  type: object
                  description: Exposures scan configuration.
                  properties:
                    categories:
                      type: object
                      description: Categories to scan.
                      properties:
                        secrets:
                          type: boolean
                          description: Scan Secrets category (Docker repos only).
                        services:
                          type: boolean
                          description: Scan Services category (Docker repos only).
                        applications:
                          type: boolean
                          description: Scan Applications category (Docker repos only).
                        iac:
                          type: boolean
                          description: Scan IaC category (Terraform repos only).
              required:
              - repository
            example:
              repository: docker-trial
              filters:
                date_range:
                  type: artifact_download_date
                  date_start: '2023-01-05T00:00:00Z'
                  date_end: '2023-01-22T20:00:00Z'
                patterns:
                - include_path_pattern: a/b/*
              contextual_analysis: true
              exposures:
                categories:
                  secrets: true
                  services: true
                  applications: false
      responses:
        '200':
          description: Advanced scan started.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                    description: Status message.
                  scan_id:
                    type: integer
                    format: int64
                    description: Unique scan identifier for tracking progress.
              example:
                info: 'Repository advanced scan started for: docker-trial'
                scan_id: 1652639558081437700
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
  /api/v1/repository/advancedScan/{id}/cancelScan:
    post:
      operationId: abort-a-running-repository-scan
      summary: Cancel Repository Advanced Scan
      description: Cancels a running advanced repository scan. Only artifacts in pending
        status will be canceled; already-scanned artifacts retain their results. Requires
        the Manage Xray Metadata permission. Since Xray 3.73.
      tags:
      - Scanning V1
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: The scan ID returned by the advanced scan endpoint.
      responses:
        '200':
          description: Scan canceled successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                    description: Status message.
              example:
                info: Scan was canceled successfully
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Scan ID not found
          content:
            application/json:
              schema:
                type: object
  /api/v1/scanArtifact:
    post:
      operationId: scan-artifact
      summary: Scan Artifact
      description: Invokes scanning of an artifact. The artifact is identified by
        its component ID (e.g. docker://image:tag). Requires the Manage Xray Metadata
        permission.
      tags:
      - Scanning V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                componentID:
                  type: string
                  description: The component ID of the artifact to scan (e.g. docker://image_name:image_tag).
              required:
              - componentID
            example:
              componentID: docker://image_name:image_tag
      responses:
        '200':
          description: Scan of artifact is in progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                required:
                - info
              example:
                info: Scan of artifact is in progress
        '415':
          description: Failed to parse artifact
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Failed to write message to the queue
          content:
            application/json:
              schema:
                type: object
  /api/v1/scanBuild:
    post:
      operationId: scan-build-v1
      summary: Scan Build V1
      description: Invokes scanning of a build that was uploaded to Artifactory as
        requested by a CI server. Requires the Manage Xray Metadata permission.
      tags:
      - Scanning V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                buildName:
                  type: string
                  description: Name of the build.
                buildNumber:
                  type: string
                  description: Build number.
                rescan:
                  type: boolean
                  description: Flag to rescan the build.
                project:
                  type: string
                  description: Project key the build belongs to.
                filters:
                  type: object
                  description: Filters for scanning options.
                  properties:
                    includeLicenses:
                      type: boolean
                      description: Include license information in the scan results.
              required:
              - buildName
              - buildNumber
            example:
              buildName: example-build
              buildNumber: '4'
              rescan: true
              filters:
                includeLicenses: true
      responses:
        '200':
          description: Build scanned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                    description: Summary of the scan result.
                    properties:
                      total_alerts:
                        type: integer
                        description: Total number of alerts generated.
                      fail_build:
                        type: boolean
                        description: Whether the build should fail.
                      message:
                        type: string
                        description: Informational message about the scan.
                      more_details_url:
                        type: string
                        description: Link to all created alerts in Xray.
                  alerts:
                    type: array
                    description: Alert details generated from the scan.
                    items:
                      type: object
                      properties:
                        created:
                          type: string
                          description: Alert creation time.
                        top_severity:
                          type: string
                          description: Highest severity in the alert.
                        watch_name:
                          type: string
                          description: Watch name that triggered the alert.
                        issues:
                          type: array
                          description: Issues included in the alert.
                          items:
                            type: object
                            properties:
                              severity:
                                type: string
                              type:
                                type: string
                                description: 'Issue type: Security, License, or Operational_Risk.'
                              provider:
                                type: string
                              created:
                                type: string
                              summary:
                                type: string
                              description:
                                type: string
                              cve:
                                type: string
                  licenses:
                    type: array
                    description: License details from the scan.
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: License name.
                        full_name:
                          type: string
                          description: Full license name.
                        components:
                          type: array
                          description: Component IDs with this license.
                          items:
                            type: string
        '400':
          description: Request is missing mandatory fields
          content:
            application/json:
              schema:
                type: object
        '403':
          description: No valid license was found
          content:
            application/json:
              schema:
                type: object
        '415':
          description: Failed to parse scan build request
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Failed to send build to scan
          content:
            application/json:
              schema:
                type: object
  /api/v1/repository/advancedScan/{id}/scanStatus:
    get:
      operationId: get-the-status-of-a-running-repository-scan
      summary: Get Repository Advanced Scan Status
      description: Returns the status of an advanced repository scan. Requires the
        Manage Xray Metadata permission. Since Xray 3.73.
      tags:
      - Scanning V1
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: The scan ID returned by the advanced scan endpoint.
      responses:
        '200':
          description: Scan status returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Scan identifier.
                  start_time:
                    type: string
                    format: date-time
                    description: Scan start time.
                  end_time:
                    type: string
                    format: date-time
                    description: Scan end time.
                  author:
                    type: string
                    description: User who initiated the scan.
                  status:
                    type: string
                    description: Current scan status (e.g. done, running, canceled).
                  total_artifacts:
                    type: integer
                    description: Total number of artifacts in the scan.
                  scanned_artifacts:
                    type: integer
                    description: Number of artifacts successfully scanned.
                  failed_artifacts:
                    type: integer
                    description: Number of artifacts that failed scanning.
                  canceled_artifacts:
                    type: integer
                    description: Number of artifacts whose scan was canceled.
              example:
                id: 165277458558724096O
                start_time: '2023-04-30T12:39:02Z'
                end_time: '2023-04-30T12:55:02Z'
                author: admin
                status: done
                total_artifacts: 100
                scanned_artifacts: 100
                failed_artifacts: 0
                canceled_artifacts: 0
  /api/v1/{groupCategoryPathPart}/results:
    get:
      operationId: get-exposure-result-list
      summary: Exposures Scanning - Get Results List
      description: Returns a paginated list of exposures scan results for a specific
        artifact. The category is specified in the path (e.g. secrets, applications,
        services, iac). Requires Read permission. Since Xray 3.59.4.
      tags:
      - Scanning V1
      parameters:
      - name: groupCategoryPathPart
        in: path
        required: true
        schema:
          type: string
          enum:
          - secrets
          - applications
          - services
          - iac
        description: 'Exposures category: secrets, applications, services, or iac.'
      - name: repo
        in: query
        required: true
        schema:
          type: string
        description: Repository name.
      - name: path
        in: query
        required: true
        schema:
          type: string
        description: Path to the artifact.
      - name: page_num
        in: query
        required: false
        schema:
          type: integer
          default: 1
        description: Page number (starting from 1).
      - name: num_of_rows
        in: query
        required: false
        schema:
          type: integer
          default: 10
        description: Number of rows per page.
      - name: order_by
        in: query
        required: false
        schema:
          type: string
          enum:
          - status
          - jfrog_severity
          - exposure_id
          - description
          - file_path
          - cve
          - fix_cost
          - outcomes
        description: Field to order results by.
      - name: direction
        in: query
        required: false
        schema:
          type: string
          enum:
          - asc
          - desc
        description: Sort direction.
      - name: search
        in: query
        required: false
        schema:
          type: string
        description: Search string matched against result descriptions.
      responses:
        '200':
          description: Results returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: List of exposure results.
                    items:
                      type: object
                      properties:
                        status:
                          type: string
                        jfrog_severity:
                          type: string
                        id:
                          type: string
                        description:
                          type: string
                        abbreviation:
                          type: string
                        cwe:
                          type: object
                          properties:
                            cwe_id:
                              type: string
                            cwe_name:
                              type: string
                        outcomes:
                          type: array
                          items:
                            type: string
                        fix_cost:
                          type: string
                  total_count:
                    type: integer
                    description: Total number of results.
              example:
                data:
                - status: to_fix
                  jfrog_severity: low
                  id: EXP-1519-00001
                  description: Hardcoded random buffer was found (Python)
                  abbreviation: REQ.PYTHON.HARDCODED-SECRETS
                  cwe:
                    cwe_id: CWE-798
                    cwe_name: Use of Hard-coded Credentials
                  outcomes:
                  - Credential extraction
                  fix_cost: low
                total_count: 1
