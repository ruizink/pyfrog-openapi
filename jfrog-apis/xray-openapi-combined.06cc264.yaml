  /api/v1/applyWatch:
    post:
      operationId: apply-watch-on-existing-content
      summary: Apply Watch on Existing Content
      description: Applies watches on existing content within a specified date range.
        This triggers watch evaluation on artifacts that were already indexed before
        the watch was created. Requires the Manage Watches permission.
      tags:
      - Scanning V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                watch_names:
                  type: array
                  description: List of watch names to apply.
                  items:
                    type: string
                date_range:
                  type: object
                  description: Date range to filter which content the watches are
                    applied to.
                  properties:
                    start_date:
                      type: string
                      format: date-time
                      description: Start date in ISO 8601 format.
                    end_date:
                      type: string
                      format: date-time
                      description: End date in ISO 8601 format.
                  required:
                  - start_date
                  - end_date
              required:
              - watch_names
              - date_range
            example:
              watch_names:
              - Watcher
              - segev-w
              date_range:
                start_date: '2001-01-02T00:00:00+02:00'
                end_date: '2021-01-02T00:00:00+02:00'
      responses:
        '202':
          description: Accepted - watches are being applied in the background.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                    description: Status message.
              example:
                info: Watches are being applied
        '400':
          description: One or more fields are missing/invalid
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Watch name does not exist
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Failed to apply the watch
          content:
            application/json:
              schema:
                type: object
  /api/v1/artifact/exposures/cancelScan:
    post:
      operationId: cancel-a-running-scan
      summary: Cancel Artifact Exposures Scan
      description: Cancels a running exposures scan for a specific artifact. Only
        artifacts that are in pending status can be canceled. Requires the Manage
        Xray Metadata permission.
      tags:
      - Scanning V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Identifies the artifact to cancel the scan for.
              required:
              - repo
              - path
              properties:
                repo:
                  type: string
                  description: Repository name.
                path:
                  type: string
                  description: Artifact path in the repository.
            example:
              repo: my-repository
              path: path-to/manifest.json
      responses:
        '200':
          description: Scan canceled successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                    description: Status message.
              example:
                info: Scan Canceled
        '404':
          description: Not found
          content:
            application/json:
              schema:
                type: object
  /api/v1/artifact/exposures/scan:
    post:
      operationId: scan-artifact-for-exposures
      summary: Scan Artifact for Exposures
      description: Triggers an exposures scan for a specific artifact. Only artifacts
        already scanned by Xray (SCA) can be scanned for exposures. Requires the Manage
        Xray Metadata permission.
      tags:
      - Scanning V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: 'Identifies the artifact and specifies which exposure categories
                to scan. All three fields are required.

                '
              required:
              - repo
              - path
              - categories
              properties:
                repo:
                  type: string
                  description: Repository name.
                path:
                  type: string
                  description: Artifact path in the repository.
                categories:
                  type: object
                  description: 'Map of exposure categories to scan. Set each category
                    to true to include it. Valid categories: secrets, services, applications,
                    iac.

                    '
                  properties:
                    secrets:
                      type: boolean
                    services:
                      type: boolean
                    applications:
                      type: boolean
                    iac:
                      type: boolean
            example:
              repo: my-repository
              path: path-to/manifest.json
              categories:
                secrets: true
                applications: true
                services: false
                iac: false
      responses:
        '200':
          description: Exposures scan started.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                    description: Status message.
              example:
                info: Exposures Scan Started
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Not found
          content:
            application/json:
              schema:
                type: object
  /api/v1/artifact/exposures/scanStatus:
    post:
      operationId: scan-status-of-an-artifact
      summary: Get Artifact Exposures Scan Status
      description: Returns the exposures scan status for a specific artifact. Requires
        the Manage Xray Metadata permission.
