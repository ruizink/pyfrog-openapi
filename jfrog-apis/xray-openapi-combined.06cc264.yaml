                      <li><code>UndertowServletWebServerFactory.getWebServer()</code></li>

                      <li><code>TomcatReactiveWebServerFactory.getWebServer()</code></li>

                      </ul>

                      <p>It additionally checks whether the <code>@SpringBootApplication</code>
                      or <code>@EnableAutoConfiguration</code> annotations are used,
                      since Spring-Boot-based web servers also lead to the vulnerable
                      inner function.</p>'
