  /api/v1/licenses/assign:
    post:
      operationId: add-custom-license
      summary: Add Custom License
      description: 'Assigns a license to a single component in Xray. The license must
        be a known license (already existing in the system). The request body contains
        a `component` object identifying the target and a `license` object specifying
        which license to assign.


        Requires a valid user with MANAGE_DATA permission.

        '
      tags:
      - Legal V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegalAssignCustomLicenseRequest'
            example:
              component:
                package_id: npm://lodash
                component_name: lodash
                pkg_type: npm
                version: 4.17.21
              license:
                name: MIT
                aliases:
                - MIT License
      responses:
        '200':
          description: License successfully added to the component.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                    description: Success message.
              example:
                info: license 'MIT' has been successfully added to component 'npm://lodash'
        '415':
          description: 'Failed to parse request, or the license name is not a known
            license.

            '
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: License name is not valid
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to add license to component
