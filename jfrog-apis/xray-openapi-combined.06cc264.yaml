            type: string
        fixed_versions:
          type: array
          items:
            type: string
        issue_id:
          type: string
        project_keys:
          type: array
          items:
            type: string
        applicability:
          type: boolean
        applicability_result:
          type: string
        vulnerable_components:
          type: array
          items:
            type: string
        impacted_artifacts:
          type: array
          items:
            type: string
        paths:
          type: array
          items:
            type: string
        jfrog_severity:
          type: string
        cwe:
          type: array
          items:
            type: string
    ReportsVulnerabilityContentResponse:
      type: object
      required:
      - total_rows
      - rows
      properties:
        total_rows:
          type: integer
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ReportsVulnerabilityContentRow'
    ReportsVulnerabilityContentRequestBody:
      type: object
      properties:
        filters:
          type: object
          description: Optional advanced filters (e.g. severity, applicability_result).
          additionalProperties: true
    ReportsCveSearchReportRequest:
      type: object
      description: 'Request body for generating a CVE Search Report. The CVE and resources
        scope are required. Filters are optional.

        '
      required:
      - cve
      - resources
      properties:
        cve:
          type: string
          description: The CVE identifier to search for (e.g., CVE-2021-45046).
          example: CVE-2021-45046
        name:
          type: string
          description: Display name for the report.
          example: report-name
        resources:
          $ref: '#/components/schemas/ReportsResourcesBlock'
        filters:
          type: object
          description: Optional filters to narrow the search results.
          properties:
            vulnerable_component:
              type: string
              description: Wildcard pattern for filtering components.
            impacted_artifact:
              type: string
              description: Wildcard pattern for filtering artifacts.
            scan_date:
              $ref: '#/components/schemas/ReportsDateRange'
            runtime_filter:
              type: boolean
              description: Filter by runtime context.
            ca_filter:
              type: boolean
              description: Filter by contextual analysis results.
    ReportsReportContentFiltersBody:
      type: object
      description: Optional filters for report table content; pagination is usually
        via query parameters.
      additionalProperties: true
    ViolationsSearchRequest:
      type: object
      description: 'Request body for searching violations. Contains a filters object
        for narrowing results and a pagination object for controlling sort order and
        paging.

        '
      properties:
        filters:
          type: object
          description: Filtering parameters for the search.
          properties:
            name_contains:
              type: string
              description: Filter results where the description contains this string.
            include_details:
              type: boolean
              description: Include additional violation detail properties in the response.
            violation_type:
              type: string
              description: Filter by violation type.
              enum:
              - Security
              - License
              - Operational_Risk
            watch_name:
              type: string
              description: Filter by watch name.
            min_severity:
              type: string
              description: Filter violations with severity equal to or higher than
                this value.
              enum:
              - Critical
              - High
              - Medium
              - Low
              - Information
              - Unknown
            created_from:
              type: string
              format: date-time
              description: Filter violations created from this time (RFC 3339).
            created_until:
              type: string
              format: date-time
              description: Filter violations created until this time (RFC 3339).
            issue_id:
              type: string
              description: Filter by issue ID (e.g., XRAY-94620).
            cve_id:
              type: string
              description: Filter by CVE ID (e.g., CVE-2019-17531).
            resources:
              type: object
              description: Filter by specific resources.
              properties:
                artifacts:
                  type: array
                  items:
                    type: object
                    properties:
                      repo:
                        type: string
                      path:
                        type: string
                builds:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      number:
                        type: string
                      project:
                        type: string
                release_bundles:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      version:
                        type: string
                release_bundles_v2:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      version:
                        type: string
                      project:
                        type: string
        pagination:
          type: object
          description: Pagination and sorting parameters.
          properties:
            order_by:
              type: string
              description: 'Sort field. Valid values: created, summary, severity,
                type, watcher_name, issue_id.'
              example: created
            direction:
              type: string
              description: Sort direction.
              enum:
              - asc
              - desc
            limit:
              type: integer
              description: 'Maximum number of items to return. Default: 25.'
              example: 25
            offset:
              type: integer
              description: 'Page offset. Default: 1.'
              example: 1
    ArtifactsDependencyGraphNode:
      type: object
      description: Recursive dependency node (nested components arrays in responses).
      properties:
        component_name:
          type: string
        component_id:
          type: string
        package_type:
          type: string
        version:
          type: string
        created:
          type: string
        modified:
          type: string
        components:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactsDependencyGraphNode'
    ArtifactsCompareArtifactsRequest:
      type: object
      required:
      - source_artifact_path
      - target_artifact_path
      description: Two artifact paths to diff (see Get Artifact Delta in Xray documentation).
      properties:
        source_artifact_path:
          type: string
          description: Path of the source artifact
        target_artifact_path:
          type: string
          description: Path of the target artifact
    ArtifactsArtifactDependencyGraphResponse:
      type: object
      properties:
        artifact:
          type: object
          properties:
            name:
              type: string
            path:
              type: string
            pkg_type:
              type: string
            sha256:
              type: string
            sha1:
              type: string
            component_id:
              type: string
        components:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactsDependencyGraphNode'
    ArtifactsArtifactScanStatusRequest:
      type: object
      description: Request body for looking up the scan status of a specific artifact.
      properties:
        repo:
          type: string
          description: Repository name containing the artifact.
        path:
          type: string
          description: Path to the artifact in the repository.
      required:
      - repo
      - path
    WatchApiV2Request:
      type: object
      description: Request body for creating or updating a Watch in Xray.
      required:
      - general_data
      properties:
        general_data:
          type: object
          description: General information about the Watch.
          required:
          - name
          properties:
            name:
              type: string
              description: Name of the Watch.
            description:
              type: string
              description: Description of the Watch.
            active:
              type: boolean
              description: Indicates if the Watch is active. Defaults to true if project_resources
                is included, false otherwise.
        project_resources:
          type: object
          description: Resources the Watch monitors and their filters.
          properties:
            resources:
              type: array
              description: List of resources to watch.
              items:
                type: object
                properties:
                  type:
                    type: string
                    description: Type of the resource to watch.
                    enum:
                    - repository
                    - build
                    - releaseBundle
                    - releaseBundleV2
                    - all-repos
                    - all-builds
                    - all-releaseBundles
                    - all-releaseBundlesV2
                    - all-projects
                    - project
                    - gitRepository
                  name:
                    type: string
                    description: Name of the resource.
                  bin_mgr_id:
                    type: string
                    description: Binary manager ID. Omit or set to default.
                  repo_type:
                    type: string
                    description: Type of repository (local or remote). Relevant only
                      for repository resources.
                    enum:
                    - local
                    - remote
                  build_repo:
                    type: string
                    description: The build or bundle repository. Relevant only for
                      resources under a project.
                  project:
                    type: string
                    description: Project key for the resource.
                  filters:
                    type: array
                    description: Filters to apply to the resource.
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          description: Filter type. Acceptable types depend on the
                            resource type.
                          enum:
                          - regex
                          - path-regex
                          - package-type
                          - mime-type
                          - property
                          - ant-patterns
                          - path-ant-patterns
                        value:
                          description: 'Filter value. Type depends on filter type:
                            string for regex/path-regex/package-type/mime-type, object
                            with IncludePatterns/ExcludePatterns arrays for ant-patterns/path-ant-patterns,
                            or object with key/value for property.'
                required:
                - type
            global_filters:
              type: array
              description: Global filters applied across all resources.
              items:
                type: object
                properties:
                  type:
                    type: string
                    description: Filter type.
                  value:
                    description: Filter value.
        assigned_policies:
          type: array
          description: Policies assigned to the Watch.
          items:
            type: object
            properties:
              name:
                type: string
                description: Name of the policy.
              type:
                type: string
                description: Type of the policy.
                enum:
                - security
                - license
                - operational_risk
            required:
            - name
            - type
        watch_recipients:
          type: array
          description: Email addresses that will receive Watch notifications.
          items:
            type: string
        create_ticket_enabled:
          type: boolean
          description: Indicates whether Jira ticket creation is enabled for this
            Watch.
        ticket_profile:
          type: string
          description: Jira profile name for ticket generation.
        ticket_generation:
          type: object
          description: Ticket generation settings for the Watch.
          properties:
            create_duplicate_tickets:
              type: object
              description: Settings for creating duplicate tickets.
              properties:
                by_version:
                  type: object
                  description: Settings for creating duplicate tickets by version.
                  properties:
                    build:
                      type: boolean
                      description: Create duplicate tickets for builds.
                    package:
                      type: boolean
                      description: Create duplicate tickets for packages.
                    release_bundle:
                      type: boolean
                      description: Create duplicate tickets for release bundles.
            impact_path_profiles_mapping:
              type: object
              description: Mapping of impact path profiles.
              properties:
                include:
                  type: array
                  description: Impact path to Jira profile mappings.
                  items:
                    type: object
                    properties:
                      profile:
                        type: string
                        description: Jira profile name.
                      pattern:
                        type: string
                        description: Pattern for the impact path.
                    required:
                    - profile
                    - pattern
            create_tickets_for_ignored_violation:
              type: boolean
              description: Whether to create Jira tickets for policy violations that
                have been marked as ignored.
