    put:
      operationId: update-policy_policies-v2-openapi
      summary: Update Policy
      description: 'Updates an existing policy (v2 API). The policy name in the URL
        path is authoritative — it overrides any `name` field in the request body.
        The full policy definition must be provided (full replacement, not partial
        update).


        Requires the "Manage Policies" role to be set on the User or Group level.

        '
      tags:
      - Policies V2
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: 'The name of the policy to update. This value takes precedence
          over any name in the request body.

          '
        example: sec-policy
      - name: projectKey
        in: query
        required: false
        description: 'When provided, the update is scoped to the specified project.

          '
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoliciesPolicyMutationRequest'
            examples:
              updateWithGracePeriod:
                summary: Update with build failure grace period
                value:
                  name: sec-policy
                  type: security
                  description: Updated security policy
                  rules:
                  - name: sec_rule
                    priority: 1
                    criteria:
                      min_severity: medium
                    actions:
                      fail_build: true
                      build_failure_grace_period_in_days: 5
                      block_download:
                        active: true
                        unscanned: true
                      block_release_bundle_distribution: true
                      block_release_bundle_promotion: true
                      create_ticket_enabled: true
      responses:
        '200':
          description: Policy updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                    description: Success message.
              example:
                info: Policy was edited successfully
        '400':
          description: Policy name is empty or the policy is not valid.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Got Invalid Policy 'sec-policy':Mandatory fields are missing
        '403':
          description: Permission denied or unsupported policy type for current license.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: cannot create license policy with existing jfrog license
        '404':
          description: Policy not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: 'Failed to get policy by name sec-policy : Policy was not found'
        '500':
          description: Internal server error while updating the policy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to edit Policy
    delete:
      operationId: delete-policy_policies-v2-openapi
      summary: Delete Policy
      description: 'Deletes an existing policy by name. A policy cannot be deleted
        if it is currently assigned to one or more watches — you must unassign it
        first.


        Requires the "Manage Policies" role to be set on the User or Group level.


        Note: This endpoint does not support the `projectKey` query parameter.

        '
      tags:
      - Policies V2
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: The name of the policy to delete.
        example: sec-policy
      responses:
        '200':
          description: Policy deleted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                    description: Success message.
              example:
                info: Policy sec-policy was deleted successfully
        '400':
          description: 'Policy name is empty, or the policy is still assigned to watches.

            '
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: 'Failed to delete Policy sec-policy : Policy is assigned to
                  2 watches'
        '404':
          description: Policy not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Policy sec-policy was not found
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to delete Policy sec-policy
  /api/v1/reports:
    post:
      operationId: get-reports-list
      summary: Get Reports List
      description: 'Returns a paginated list of reports that have been generated.
        All pagination query parameters are mandatory (direction, page_num, num_of_rows,
        order_by).


        For Xray version 3.21.2 and above with Projects, a Project Admin with Manage
        Security Assets privilege can get a list of reports in the scope of a project
        by using the additional query parameter `projectKey`.


        Requires a user with the Manage Reports role. Since Xray 3.8.

        '
      tags:
      - Reports V1
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportsGetListRequestBody'
      responses:
        '200':
          description: OK - Reports list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportsReportListResponse'
              example:
                total_reports: 100
                reports:
                - id: 1234
                  name: vul_report_1
                  status: completed
                  total_artifacts: 1000
                  num_of_processed_artifacts: 10
                  progress: 1
                  number_of_rows: 10
                  start_time: '1970-01-01T02:00:00+02:00'
                  end_time: '1970-01-01T03:00:00+02:00'
                  author: admin
                  report_type: vulnerability
      parameters:
      - name: direction
        in: query
        required: true
        description: 'Sort direction: asc or desc'
        schema:
          type: string
          enum:
          - asc
          - desc
      - name: page_num
        in: query
        required: true
        description: Page number (starting at 1)
        schema:
          type: integer
          minimum: 1
      - name: num_of_rows
        in: query
        required: true
        description: Rows per page
        schema:
          type: integer
          minimum: 1
      - name: order_by
        in: query
        required: true
        description: 'One of: name, type, author, start_time, status'
        schema:
          type: string
      - name: projectKey
        in: query
        description: Project scope (when Projects are enabled)
        required: false
        schema:
          type: string
  /api/v1/reports/abort/{id}:
    post:
      operationId: abort
      summary: Abort Report Generation
      description: 'Aborts a report that is currently being generated. Use the report
        ID returned from a generate report request.


        For Xray version 3.21.2 and above with Projects, a Project Admin with Manage
        Security Assets privilege can abort a report in the scope of a project by
        using the additional query parameter `projectKey`.


        Requires a user with the Manage Reports role. Since Xray 3.8.

        '
      tags:
      - Reports V1
      parameters:
      - name: id
        in: path
        description: The unique identifier of the report to abort.
        required: true
        schema:
          type: string
      - name: projectKey
        in: query
        description: Project scope (when Projects are enabled).
        required: false
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportsAbortRequestBody'
      responses:
        '200':
          description: Report generation aborted successfully
