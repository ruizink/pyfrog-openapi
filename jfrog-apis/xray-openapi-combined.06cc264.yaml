                    cvss_v3_vector: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H
                  cvss2_max_score: 9.3
                  cvss3_max_score: 10
                  severity: Critical
                  severity_source: NVD
                  fixed_versions:
