      description: 'Creates a custom license for license compliance management. Custom
        licenses are user-defined and can be assigned to components for tracking and
        compliance purposes. The license name must be unique and cannot exceed 128
        characters. Aliases also have a 128 character limit each.


        Requires Admin permission. Since Xray 3.132.0.

        '
      tags:
      - Legal V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegalCreateCustomLicenseRequest'
            example:
              name: MyCustomLicense
              full_name: My Custom License Full Name
              text: This is a custom license description
              references:
              - https://example.com/license
              - https://example.com/legal
              aliases:
              - MCL
              - MyLicense
              category: Permissive
      responses:
        '200':
          description: Custom license created successfully. Returns the created license.
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                    example: MyCustomLicense
                  full_name:
                    type: string
                    example: My Custom License Full Name
                  text:
                    type: string
                  references:
                    type: array
                    items:
                      type: string
                  aliases:
                    type: array
                    items:
                      type: string
                  category:
                    type: string
                    example: Permissive
                  priority:
                    type: integer
                  default_priority:
                    type: integer
                  isCustom:
                    type: boolean
                    description: Always true for custom licenses.
                    example: true
              example:
                name: MyCustomLicense
                full_name: My Custom License Full Name
                text: This is a custom license description
                references:
                - https://example.com/license
                - https://example.com/legal
                aliases:
                - MCL
                - MyLicense
                category: Permissive
                isCustom: true
        '400':
          description: 'License name already exists, or validation failed (name or
            alias exceeds 128 characters).

            '
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: License name already exists
        '415':
          description: Failed to parse the request body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to parse message
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to set custom license
  /api/v1/licensesNames/priorities:
