  /api/v1/reports/vulnerabilities:
    post:
      operationId: generate-vulnerabilities-report
      summary: Generate Vulnerabilities Report
      description: 'Generates a Vulnerabilities report with data defined by scope
        and filters. This request starts the report generation process which runs
        in the background. The returned report ID is used in other requests such as
        Get Report Content, Export, Delete Report, etc.


        For Xray version 3.21.2 and above with Projects, a Project Admin with Manage
        Security Assets privilege can generate a report in the scope of a project
        by using the additional query parameter `projectKey`.


        Requires a user with the Manage Reports role. Since Xray 3.8.

        '
      tags:
      - Reports V1
      parameters:
      - name: projectKey
        in: query
        required: false
        description: Generate the report in the scope of the specified project.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportsGenerateVulnerabilitiesRequest'
            example:
              name: report1
              resources:
                repositories:
                - name: libs-release-local
                - name: plugins-release-local
                  include_path_patterns:
                  - '*folder1/*path'
                builds:
                  names:
                  - art-docker-test
                  - art-docker-prod
                  include_patterns:
                  - release*
                  - feature
                  exclude_patterns:
                  - snapshots*
                  - test*
                  number_of_latest_versions: 5
                projects:
                  keys:
                  - test1
                  - test2
                  include_key_patterns:
                  - test*
                  number_of_latest_versions: 5
              filters:
                vulnerable_component: '*vulnerable:component*'
                impacted_artifact: some://impacted*artifact
                has_remediation: false
                cve: CVE-1234-1234
                issue_id: XRAY-1234
                severities:
                - High
                - Medium
                cvss_score:
                  min_score: 6.3
                  max_score: 9
                published:
                  start: '2020-06-29T12:22:16Z'
                  end: '2020-06-29T12:22:16Z'
                scan_date:
                  start: '2020-06-29T12:22:16Z'
                  end: '2020-06-29T12:22:16Z'
      responses:
        '200':
          description: 'Report generation started. Use the returned report_id to check
            status, retrieve content, or export the report.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportsReportIdStatusResponse'
              example:
                report_id: 23
                status: pending
  /api/v1/reports/vulnerabilities/{id}:
    post:
      operationId: get-vulnerabilities-report-content
      summary: Get Vulnerabilities Report Content
      description: 'Retrieves the content of a previously generated Vulnerabilities
        report by its ID. Results are paginated; all pagination query parameters are
        mandatory. An optional request body may be provided to apply advanced filters.


        For Xray version 3.21.2 and above with Projects, a Project Admin with Manage
        Security Assets privilege can access report content in the scope of a project
        by using the additional query parameter `projectKey`.


        Requires a user with the Manage Reports role. Since Xray 3.8.

        '
      tags:
      - Reports V1
      parameters:
      - name: id
        in: path
        description: The unique identifier of the vulnerability report.
        required: true
        schema:
          type: string
      - name: search
        in: query
        description: Search term to filter results across CVEs, impacted artifacts,
          vulnerable components, paths, and project keys.
        required: false
        schema:
          type: string
      - name: direction
        in: query
        description: 'Sort direction: asc or desc. Default: asc.'
        required: false
        schema:
          type: string
      - name: num_of_rows
        in: query
        description: Number of rows per page.
        required: true
        schema:
          type: integer
      - name: order_by
        in: query
        description: Field to sort by.
        required: false
        schema:
          type: string
      - name: page_num
        in: query
        description: Page number (1-based).
        required: true
        schema:
          type: integer
      - name: projectKey
        in: query
        description: Project scope (when Projects are enabled).
        required: false
        schema:
          type: string
      requestBody:
