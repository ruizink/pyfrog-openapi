  /api/v1/ignore_rules:
    post:
      operationId: create-ignore-rule
      summary: Create Ignore Rule
      description: 'Creates an Ignore Rule that suppresses violations matching the
        specified filters. Ignore rules apply only to future scans. To apply to past
        scans, you must manually trigger Apply on Existing Content on the relevant
        watch or watches.


        The `ignore_filters` object defines what to ignore. You must specify at least
        one objective filter (vulnerabilities, licenses, cves, operational_risk, or
        exposures) and can optionally scope it with source filters (components, artifacts,
        builds, etc.).


        Requires the "Manage Watches" permission. Since Xray 3.11.

        '
      tags:
      - Ignore Rules V1
      parameters:
      - name: projectKey
        in: query
        required: false
        description: 'When provided, the ignore rule is created in the scope of the
          specified project.

          '
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IgnoreRulesCreateRequest'
            examples:
              licenseBuildScope:
                summary: Ignore licenses for a build component
                value:
                  notes: ignore any license for any version of alpine for the base
                    layer within all myApp builds
                  ignore_filters:
                    licenses:
                    - any
                    builds:
                    - name: myApp
                    components:
                    - name: docker://alpine
                    docker-layers:
