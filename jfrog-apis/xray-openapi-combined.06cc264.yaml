  /api/v2/watches:
    post:
      operationId: create-watch_watches-v2-openapi
      summary: Create Watch
      description: 'Creates a new Watch. A Watch defines a set of resources (repositories,
        builds, release bundles, projects) to be monitored by assigned security and
        license policies.


        **Notes:**

        - For Xray version 3.21.2 and above with Projects, a Project Admin with Manage
        Security Assets privilege can create a Watch in the scope of a project by
        using the `projectKey` query parameter.

        - A Watch can include both Global and Project Policies.


        Requires the ''Manage Watches'' role to be set on the User or Group level.'
      tags:
      - Watches V2
      parameters:
      - name: projectKey
        in: query
        description: Project key for creating a Watch in the scope of a project.
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WatchApiV2Request'
            example:
              general_data:
                name: example1-watch
                description: 'This is an example watch #1'
                active: true
              project_resources:
                resources:
                - type: repository
                  bin_mgr_id: default
                  name: libs-release-local
                  filters:
                  - type: regex
                    value: .*
              assigned_policies:
              - name: medium_vuln_policy
                type: security
              watch_recipients:
              - mymail@acme.com
              - sec@acme.com
      responses:
