  /api/v2/ci/build:
    post:
      operationId: scan-build-v2
      summary: Scan Build V2
      description: Triggers a CI build scan (v2 API). Invokes scanning of a build
        that was uploaded to Artifactory as requested by a CI server. Requires the
        Manage Xray Metadata permission.
      tags:
      - Scanning V2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                build_name:
                  type: string
                  description: Name of the build.
                build_number:
                  type: string
                  description: Build number.
                project:
                  type: string
                  description: Project key the build belongs to.
                rescan:
                  type: boolean
                  description: Flag to rescan the build.
              required:
              - build_name
              - build_number
            example:
              build_name: my-build
              build_number: '8'
      responses:
        '200':
          description: Build scan initiated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                    description: Status message about the scan progress.
              example:
                info: “Scan of build name 'my-build', build number '8' is in progress”
        '400':
          description: Request is missing mandatory fields
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                type: object
        '415':
          description: Failed to parse scan build request
          content:
            application/json:
              schema:
                type: object
  /api/v2/ci/build/{build_name}/{build_number}:
    get:
      operationId: get-builds-scan-results
      summary: Get Build Scan Results
      description: Returns CI build scan results for a specific build. Returns violations
        only if it determines a build failure. To retrieve full scan results including
        vulnerabilities, use the include_vulnerabilities parameter. Requires the Manage
        Xray Metadata permission.
      tags:
      - Scanning V2
      parameters:
      - name: build_name
        in: path
        description: Name of the build.
        required: true
        schema:
          type: string
      - name: build_number
        in: path
        description: Build number.
        required: true
        schema:
          type: string
      - name: projectKey
        in: query
        description: Project key the build belongs to.
        required: false
        schema:
          type: string
      - name: include_vulnerabilities
        in: query
        description: Whether to include CVEs in the response.
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Build scan results returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  build_name:
                    type: string
                    description: Name of the build.
                  build_number:
                    type: string
                    description: Number of the build.
                  project:
                    type: string
                    description: Project associated with the build.
                  status:
                    type: string
                    description: Status of the build (e.g. completed).
                  more_details_url:
                    type: string
                    description: URL for more details about the build scan.
                  fail_build:
                    type: boolean
                    description: Whether the build should fail.
                  violations:
                    type: array
                    description: Detected violations.
                    items:
                      type: object
                      properties:
                        issue_id:
                          type: string
                        summary:
                          type: string
                        severity:
                          type: string
                          description: 'Possible values: Critical, High, Medium, Low,
                            Information, Unknown.'
                        type:
                          type: string
                          description: 'Violation type: security, license, or operational_risk.'
                        watch_name:
                          type: string
                        fail_build:
                          type: boolean
                  vulnerabilities:
                    type: array
                    description: Detected vulnerabilities (only if include_vulnerabilities=true).
                    items:
                      type: object
                      properties:
                        issue_id:
                          type: string
                        summary:
                          type: string
                        severity:
                          type: string
                        provider:
                          type: string
                        cves:
                          type: array
                          items:
                            type: object
                            properties:
                              cve:
                                type: string
                              cvss_v3_score:
                                type: string
                              cvss_v3_vector:
                                type: string
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Build does not exist or is not indexed in Xray
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Build doesn't exist or not indexed in Xray
  /api/v1/component/searchByCves:
    post:
      operationId: find-component-by-cve
      summary: Find Component by CVE
      description: 'Searches for components that are directly affected by the specified
        CVEs. Returns a list of matching components grouped by CVE, including component
        name, package type, version, and a link to the instance.


        Requires the Reports Manager permission.

        '
      tags:
      - Search V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cves:
                  type: array
                  items:
                    type: string
              required:
              - cves
            example:
              cves:
              - CVE-2024-12085
      responses:
        '200':
          description: Valid response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    cve_details:
                      type: string
                    components:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          package_type:
                            type: string
                          version:
                            type: string
                          link:
                            type: string
                        required:
                        - name
                        - package_type
                        - version
                        - link
                  required:
                  - cve_details
                  - components
              example:
              - cve_details: CVE-2024-12085
                components:
                - name: debian:jessie:rsync
                  package_type: Debian
                  version: 3.1.1-3+deb8u2
                  link: https://instanceid.jfrog.io/
                - name: ubuntu:jammy:rsync
                  package_type: Debian
                  version: 3.2.7-0ubuntu0.22.04.2
                  link: https://instanceid.jfrog.io/
                - name: 8:rsync
                  package_type: Rpm
                  version: 0:3.1.3-12.el8
                  link: https://instanceid.jfrog.io/
                - name: 8:rsync
                  package_type: Rpm
                  version: 0:3.1.3-14.el8_6.5
                  link: https://instanceid.jfrog.io/
                - name: 8:rsync
                  package_type: Rpm
                  version: 0:3.1.3-19.el8
                  link: https://instanceid.jfrog.io/
                - name: 8:rsync
                  package_type: Rpm
                  version: 0:3.1.3-19.el8_7.1
                  link: https://instanceid.jfrog.io/
        '400':
          description: Got invalid CVE
          content:
            application/json:
              schema:
                type: object
        '415':
          description: Failed to parse request
          content:
            application/json:
              schema:
                type: object
  /api/v1/component/searchCvesByComponents:
    post:
      operationId: find-cves-by-component
      summary: Find CVEs by Component
      description: 'Searches for CVEs that affect the specified components. Each component
        is identified by its component ID (e.g., gav://commons-collections:commons-collections:3.2.1).
        Returns CVE IDs grouped by component. If a component is not found, the response
        includes an error field for that component.


        Requires the Reports Manager permission.

        '
      tags:
      - Search V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                components_id:
                  type: array
                  items:
                    type: string
              required:
              - components_id
            example:
              components_id:
              - gav://commons-collections:commons-collections:3.2.1
              - c2
      responses:
        '200':
          description: Valid Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    component:
                      type: string
                    cves:
                      type: array
                      items:
                        type: string
                  required:
                  - component
                  - cves
              example:
              - component: gav://commons-collections:commons-collections:3.2.1
                cves:
                - CVE-2017-15708
              - component: c2
                error: Failed to get component
                cves: []
        '415':
          description: Failed to parse request
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Failed to search CVEs of components
          content:
            application/json:
              schema:
                type: object
  /api/v2/search/impactedResources:
    get:
      operationId: search-resources-by-vulnerability-and-package
      summary: Search Resources by Vulnerability and Package
      description: 'Search all resources (Artifacts, Builds, Release Bundles, etc.)
        that include a specific package or are impacted by a specific vulnerability
        (CVE or XRAY ID). Supports three search modes:


        - **Mode 1 - By Vulnerability**: `vulnerability` is required.

        - **Mode 2 - By Package Version**: `name` and `type` are required; `version`
        is optional.

        - **Mode 3 - By Package (all versions)**: `name` and `type` are required;
        omit `version`.


        **SBOM Requirement**: This capability depends on the SBOM Service. Self-Hosted
        users must enable the SBOM feature and complete the SBOM migration. If SBOM
        is disabled, the API returns 403.


        **Pagination**: Use `last_key` from the response to fetch subsequent pages;
        an empty `last_key` indicates no further results. Limit defaults to 1000,
        maximum 10000.


        Requires the Reports Manager permission. Since Xray 3.131.

        '
      tags:
      - Search V2
      parameters:
      - name: limit
        in: query
        description: 'Maximum number of resources to return. Default: 1000. Maximum:
          10000.'
        required: false
        schema:
          type: integer
      - name: last_key
        in: query
        description: Pagination cursor from the previous response. Include this value
          to retrieve the next page.
        required: false
        schema:
          type: string
      - name: vulnerability
        in: query
        description: Vulnerability ID in CVE format (CVE-YYYY-NNNNN) or XRAY format
          (XRAY-N). Required for Mode 1.
        required: false
        schema:
          type: string
      - name: name
        in: query
        description: Package name. Required for Mode 2 and Mode 3.
        required: false
        schema:
          type: string
      - name: type
        in: query
        description: Package type (e.g., npm, maven, pypi). Required for Mode 2 and
          Mode 3.
        required: false
        schema:
          type: string
      - name: version
        in: query
        description: Package version. When provided with name and type, searches for
          a specific version.
        required: false
        schema:
          type: string
      - name: namespace
        in: query
        description: 'Package namespace. Default: public.'
        required: false
        schema:
          type: string
      - name: ecosystem
        in: query
        description: 'Package ecosystem. Default: generic.'
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Search completed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    description: Array of resources matching the search criteria.
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          description: 'Resource type: Artifact, Build, ReleaseBundle,
                            ReleaseBundleV2, AppVersion, Component.'
                        name:
                          type: string
                          description: Name of the resource.
                        path:
                          type: string
                          description: Artifact path in the repository.
                        repo:
                          type: string
                          description: Repository name.
                        version:
                          type: string
                          description: Version of the resource.
                        artifact_name:
                          type: string
                          description: Name of the artifact within an aggregation.
                        artifact_pkg_version:
                          type: object
                          description: Package version info for the artifact containing
                            the impacted package.
                          properties:
                            type:
                              type: string
                            name:
                              type: string
                            namespace:
                              type: string
                            version:
                              type: string
                            ecosystem:
                              type: string
                        scan_date:
                          type: string
                          description: ISO 8601 timestamp of when the resource was
                            last scanned.
                        impacted_pkg_version:
                          type: object
                          description: Package version info for the impacted package
                            matching the search.
                          properties:
                            type:
                              type: string
                            name:
                              type: string
                            namespace:
                              type: string
                            version:
                              type: string
                            ecosystem:
                              type: string
                  last_key:
                    type: string
                    description: Pagination cursor. Empty string means no more results.
              example:
                result:
                - type: Artifact
                  name: app.jar
                  path: libs-release-local/com/example/app/1.0.0/app-1.0.0.jar
                  repo: libs-release-local
                  scan_date: '2024-01-15T10:30:00Z'
                  artifact_pkg_version:
                    type: maven
                    name: app
                    namespace: com.example
                    version: 1.0.0
                    ecosystem: generic
                  impacted_pkg_version:
                    type: maven
                    name: log4j-core
                    namespace: org.apache.logging.log4j
                    version: 2.14.1
                    ecosystem: generic
                last_key: eyJwcmltYXJ5S2V5IjoiMTIzNDU2Nzg5MCJ9
        '400':
          description: Missing required parameters or invalid values.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: 'Mandatory parameters: "vulnerability" OR ("type", "name",
                  ["version"])'
        '403':
          description: Permission denied or SBOM feature is disabled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: SBOM is disabled
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            example:
              result:
              - type: Artifact
                name: app.jar
                path: libs-release-local/com/example/app/1.0.0/app-1.0.0.jar
                repo: libs-release-local
                scan_date: '2024-01-15T10:30:00Z'
                artifact_pkg_version:
                  type: maven
                  name: app
                  namespace: com.example
                  version: 1.0.0
                  ecosystem: generic
                impacted_pkg_version:
                  type: maven
                  name: log4j-core
                  namespace: org.apache.logging.log4j
                  version: 2.14.1
                  ecosystem: generic
              last_key: eyJwcmltYXJ5IjoiMTIzNDU2Nzg5MCIsInNlY29uZGFyeSI6ImFiY2RlZjEyMzQ1Njc4OTAifQ==
  /api/v1/configuration/workersCount:
    get:
      operationId: get-the-workers-count
      summary: Get the Workers Count
      description: 'Returns the current worker thread counts for each processing lane
        (index, persist, analysis, alert, impact analysis, notification). Each lane
        has separate counts for new content and existing content processing.


        Available for Self-Hosted installation only, not in JFrog SaaS. Requires System
        Admin permission.

        '
      tags:
      - System V1
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  index:
                    type: object
                    properties:
                      new_content:
                        type: integer
                      existing_content:
                        type: integer
                    required:
                    - new_content
                    - existing_content
                  persist:
                    type: object
                    properties:
                      new_content:
                        type: integer
                      existing_content:
                        type: integer
                    required:
                    - new_content
                    - existing_content
                  analysis:
                    type: object
                    properties:
                      new_content:
                        type: integer
                      existing_content:
                        type: integer
                    required:
                    - new_content
                    - existing_content
                  alert:
                    type: object
                    properties:
                      new_content:
                        type: integer
                      existing_content:
                        type: integer
                    required:
                    - new_content
                    - existing_content
                  impact_analysis:
                    type: object
                    properties:
                      new_content:
                        type: integer
                    required:
                    - new_content
                  notification:
                    type: object
                    properties:
                      new_content:
                        type: integer
                    required:
                    - new_content
                required:
                - index
                - persist
                - analysis
                - alert
                - impact_analysis
                - notification
              example:
                index:
                  new_content: 8
                  existing_content: 4
                persist:
                  new_content: 8
                  existing_content: 4
                analysis:
                  new_content: 8
                  existing_content: 4
                alert:
                  new_content: 8
                  existing_content: 4
                impact_analysis:
                  new_content: 4
                notification:
                  new_content: 8
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Failed to get worker settings
          content:
            application/json:
              schema:
                type: object
    put:
      operationId: configuring-the-workers-count
      summary: Update Workers Count
      description: 'Updates the worker thread counts for each processing lane. Changes
        require a system restart to take effect.


        Available for Self-Hosted installation only, not in JFrog SaaS. Requires System
        Admin permission.

        '
      tags:
      - System V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                index:
                  type: object
                  properties:
                    new_content:
                      type: integer
                      description: Number of workers for indexing new content.
                    existing_content:
                      type: integer
                      description: Number of workers for indexing existing content.
                persist:
                  type: object
                  properties:
                    new_content:
                      type: integer
                    existing_content:
                      type: integer
                analysis:
                  type: object
                  properties:
                    new_content:
                      type: integer
                    existing_content:
                      type: integer
                alert:
                  type: object
                  properties:
                    new_content:
                      type: integer
                    existing_content:
                      type: integer
                impact_analysis:
                  type: object
                  properties:
                    new_content:
                      type: integer
                notification:
                  type: object
                  properties:
                    new_content:
                      type: integer
            example:
              index:
                new_content: 8
                existing_content: 4
              persist:
                new_content: 8
                existing_content: 4
              analysis:
                new_content: 8
                existing_content: 4
              alert:
                new_content: 8
                existing_content: 4
              impact_analysis:
                new_content: 4
              notification:
                new_content: 8
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Failed to parse workers count
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
        '415':
          description: Unsupported media type
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Failed to update workers count
          content:
            application/json:
              schema:
                type: object
  /api/v1/git/repositories:
    get:
      operationId: get-git-repositories
      summary: Get Git Repositories
      description: 'Retrieves a list of all git repositories that have been scanned.
        Allows fetching comprehensive information about git repositories based on
        scans that have been performed. You can apply various filters to refine the
        results.


        Requires a user with READ permissions. Since Xray 3.122.

        '
      tags:
      - Source Code V1
      parameters:
      - name: page
        in: query
        required: false
        description: 'Page number for pagination. Default: 1.'
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        description: 'Number of results per page. Default: 50.'
        schema:
          type: integer
      - name: order_by
        in: query
        required: false
        description: 'Sort field: id, name, or last_scanned_date.'
        schema:
          type: string
      - name: direction
