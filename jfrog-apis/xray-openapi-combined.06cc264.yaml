  /api/v2/component/attribution:
    post:
      operationId: license-attribution-report
      summary: License Attribution Report
      description: 'Generates a license attribution report for a specific resource
        in the platform. The report can be output in PDF, JSON, CSV, or TXT format.
        Requires the Catalog service to be available.


        Requires the "Manage Data" role. Supported from Xray Version 3.118.0 and above.

        '
      tags:
      - Legal V2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: Path of the requested resource in the platform.
                component_id:
                  type: string
                  description: Optional component identifier to scope the report.
                exclude_unknown_license:
                  type: boolean
                  description: If true, excludes components with unknown licenses.
                license_resolution:
                  type: boolean
                  description: If true, performs automatic license resolution for
                    multi-license components.
                full_license_text:
                  type: boolean
                  description: If true, includes the full license text inside the
                    report.
                include_package_versions:
                  type: boolean
                  description: If true, includes package versions as a column in the
                    report.
                format:
                  type: string
                  description: Output format. Valid values are pdf, json, csv, txt.
              required:
              - path
            example:
              path: docker-test/juice-shop/v10.0.0/manifest.json
              license_resolution: false
              full_license_text: true
              include_package_versions: true
              format: txt
      responses:
        '200':
          description: Attribution report generated successfully.
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Failed to parse input arguments or Catalog is not available.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Invalid request payload
        '403':
          description: Permission denied.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Permission denied
        '500':
          description: Failed to generate the attribution report.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to Export Attribution Report
  /api/v1/policies:
    post:
      operationId: create-policy
      summary: Create Policy
      description: 'Creates a new security, license, or operational risk policy. A
        policy contains rules that define criteria for matching issues and actions
        to take when issues are found (e.g., block downloads, fail builds, send notifications).
        Once created, assign the policy to one or more watches using the Assign Policy
        to Watches endpoint.


        Requires the "Manage Policies" role to be set on the User or Group level.
        For Xray version 3.21.2 and above with Projects, a Project Admin with Manage
        Security Assets privilege can create policies in the scope of a project by
        using the additional query parameter `projectKey`.

        '
      tags:
      - Policies V1
      parameters:
      - name: projectKey
        in: query
        required: false
        description: 'When provided, the policy is created in the scope of the specified
          project. Requires Xray 3.21.2+ with Projects enabled.

          '
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoliciesPolicyMutationRequest'
            examples:
              securityPolicy:
                summary: Security policy with minimum severity
                value:
                  name: securityPolicy
                  type: security
                  description: Block high severity vulnerabilities
                  rules:
                  - name: securityRule
                    priority: 1
                    criteria:
                      min_severity: High
                    actions:
                      mails:
                      - mail1@example.com
                      - mail2@example.com
                      fail_build: true
                      block_download:
                        unscanned: true
                        active: true
              licensePolicy:
                summary: License policy with allowed list
                value:
                  name: licensesPolicy
                  type: license
                  description: Only allow BSD and AAL licenses
                  rules:
                  - name: LicenseRule
                    priority: 1
                    criteria:
                      allowed_licenses:
                      - BSD
                      - AAL
                      allow_unknown: true
              securityCvePolicy:
                summary: Security policy targeting specific CVEs
                value:
                  name: sec_policy
                  type: security
                  description: This is a specific CVEs security policy
                  rules:
                  - name: some_cves
                    priority: 1
                    criteria:
                      vulnerability_ids:
                      - CVE-2022-23307
                      - CVE-2022-23305
                      - CVE-2022-23301
                      - XRAY-23432
                    actions:
                      webhooks:
                      - sec_webhook
                      block_download:
                        active: true
                        unscanned: true
                      block_release_bundle_distribution: true
                      fail_build: true
                      notify_deployer: true
                      notify_watch_recipients: true
      responses:
        '201':
          description: Policy created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                    description: Success message.
              example:
                info: Policy created successfully
        '400':
          description: 'Policy is not valid. Check mandatory fields (name, type, rules).

            '
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: 'Found Invalid Policy: Mandatory fields are missing'
        '403':
          description: Permission denied. User lacks the Manage Policies role.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Permission denied
        '409':
          description: A policy with the given name already exists.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Policy already exists
        '415':
          description: Failed to parse the request body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to parse request
        '500':
          description: Internal server error while creating the policy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to create Policy
    get:
      operationId: get-policies
      summary: Get Policies
      description: 'Returns a list of all policies in the system. When `projectKey`
        is provided, returns both Global and Project-scoped policies for that project.


        Requires the Read Policies role to be set on the User or Group level. For
        Xray version 3.21.2 and above with Projects, a Project Admin with Manage Security
        Assets privilege can get a list of Global and Project Policies by using the
        additional query parameter `projectKey`.

        '
      tags:
      - Policies V1
      parameters:
      - name: projectKey
        in: query
        required: false
        description: 'When provided, returns policies scoped to the specified project
          in addition to global policies. Requires Xray 3.21.2+ with Projects enabled.

          '
        schema:
          type: string
      - name: include_notify
        in: query
        required: false
        description: 'When set to true, includes notification-related action fields
          in the response.

          '
        schema:
          type: string
          enum:
          - 'true'
          - 'false'
      responses:
        '200':
          description: Successfully retrieved all policies.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyApiResponse'
              example:
              - name: sec-policy
                type: security
                description: Block critical vulnerabilities
                author: admin
                rules:
                - name: sec_rule
                  priority: 1
                  criteria:
                    min_severity: all severities
                  actions:
                    webhooks:
                    - sec_webhook
                    fail_build: true
                    block_download:
                      unscanned: true
                      active: true
                      grace_period_days: 0
                created: '2019-12-19T09:17:09.562Z'
                modified: '2024-01-15T10:30:00.000Z'
              - name: license-policy
                type: license
                description: Only allow approved licenses
                author: admin
                rules:
                - name: license_rule
                  priority: 1
                  criteria:
                    allowed_licenses:
                    - MIT
                    - Apache-2.0
                    allow_unknown: false
                  actions:
                    fail_build: true
                created: '2024-01-10T08:00:00.000Z'
                modified: '2024-01-10T08:00:00.000Z'
        '403':
          description: Permission denied. User lacks the Read Policies role.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Permission denied
        '500':
          description: Internal server error while retrieving policies.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to get all policies
  /api/v1/policies/{name}/assign:
    post:
      operationId: assign-policy-to-watches
      summary: Assign Policy to Watches
      description: 'Assigns an existing policy to one or more watches. Each watch
        name in the request is processed independently — the response reports the
        result for each watch separately. If a watch does not exist or the policy
        is already assigned, the response indicates the status per watch rather than
        failing the entire request.


        Requires the "Manage Watches" role to be set on the User or Group level.


        Note: This endpoint does not support the `projectKey` query parameter. The
        policy is looked up by name across all scopes.

        '
      tags:
      - Policies V1
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: The name of the policy to assign.
        example: sec-policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyAssignToWatchesRequest'
            example:
              watches:
              - prod-watch
              - staging-watch
      responses:
        '200':
          description: 'Assignment processed. Check the `result` map for per-watch
            status — some watches may have succeeded while others failed.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyAssignToWatchesResponse'
              example:
                result:
                  prod-watch: Policy assigned successfully to Watch
                  staging-watch: Watch was not found
        '404':
          description: The specified policy does not exist.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Policy sec-policy doesn't exist
        '415':
          description: Failed to parse the request body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to parse request
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to assign Policy to watches
  /api/v1/policies/{name}:
    get:
      operationId: get-policy-by-name
      summary: Get Policy
      description: 'Returns the details of a specific policy by name, including its
        rules, criteria, actions, and metadata (author, created/modified timestamps,
        assigned watches).


        Requires the Read Policies role to be set on the User or Group level. For
        Xray version 3.21.2 and above with Projects, a Project Admin with Manage Security
        Assets privilege can get a policy by using the additional query parameter
        `projectKey`. When `projectKey` is provided, the policy is looked up in both
        the project scope and globally.

        '
      tags:
      - Policies V1
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: The name of the policy to retrieve.
        example: sec-policy
      - name: projectKey
        in: query
        required: false
        description: 'When provided, looks up the policy in the scope of the specified
          project as well as globally. Requires Xray 3.21.2+ with Projects enabled.

          '
        schema:
          type: string
      - name: include_notify
        in: query
        required: false
        description: 'When set to true, includes notification-related action fields
          in the response.

          '
        schema:
          type: string
          enum:
          - 'true'
          - 'false'
      responses:
        '200':
          description: Successfully retrieved the policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyApiResponse'
              example:
                name: sec-policy
                type: security
                description: Block critical vulnerabilities
                author: admin
                rules:
                - name: sec_rule
                  priority: 1
                  criteria:
                    min_severity: all severities
                  actions:
                    webhooks:
                    - sec_webhook
                    fail_build: true
                    block_download:
                      unscanned: true
                      active: true
                      grace_period_days: 0
                created: '2019-12-19T09:17:09.562Z'
                modified: '2024-01-15T10:30:00.000Z'
                watches:
                - prod-watch
                project_key: ''
        '400':
          description: Empty policy name.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Empty policy name
        '404':
          description: Policy not found or not accessible in the current scope.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: 'Failed to get policy by name sec-policy : Policy was not found'
        '500':
          description: Internal server error while retrieving the policy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to get policy by name sec-policy
    put:
      operationId: update-policy
      summary: Update Policy
      description: 'Updates an existing policy. The policy name in the URL path is
        authoritative — it overrides any `name` field in the request body. The full
        policy definition must be provided (this is a full replacement, not a partial
        update).


        Requires the "Manage Policies" role to be set on the User or Group level.
        For Xray version 3.21.2 and above with Projects, a Project Admin with Manage
        Security Assets privilege can update a policy in the scope of a project by
        using the additional query parameter `projectKey`.

        '
      tags:
      - Policies V1
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: 'The name of the policy to update. This value takes precedence
          over any name in the request body.

          '
        example: sec-policy
      - name: projectKey
        in: query
        required: false
        description: 'When provided, the update is scoped to the specified project.
          Requires Xray 3.21.2+ with Projects enabled.

          '
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoliciesPolicyMutationRequest'
            examples:
              updateSeverity:
                summary: Update minimum severity to medium
                value:
                  name: sec-policy
                  type: security
                  description: Updated security policy
                  rules:
                  - name: sec_rule
                    priority: 1
                    criteria:
                      min_severity: medium
                    actions:
                      webhooks:
                      - sec_webhook
                      fail_build: true
                      block_download:
                        active: true
                        unscanned: true
              updateCveList:
                summary: Target specific CVEs
                value:
                  name: sec-policy
                  type: security
                  description: Block specific CVEs
                  rules:
                  - name: cve_rule
                    priority: 1
                    criteria:
                      vulnerability_ids:
                      - CVE-2022-23307
                      - CVE-2022-23305
                      - XRAY-23432
                    actions:
                      fail_build: true
                      notify_deployer: true
                      notify_watch_recipients: true
      responses:
        '200':
          description: Policy updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                    description: Success message.
              example:
                info: Policy edited successfully
        '400':
          description: 'Policy name is empty or the policy is not valid.

            '
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: 'Found Invalid Policy: Mandatory fields are missing'
        '403':
          description: 'Permission denied, or attempting to use a license-type policy
            without the required license entitlement.

            '
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: cannot create license policy with existing jfrog license
        '404':
          description: Policy not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: 'Failed to get policy by name sec-policy : Policy was not found'
        '415':
          description: Failed to parse the request body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to parse request
        '500':
          description: Internal server error while updating the policy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to edit Policy
    delete:
      operationId: delete-policy
      summary: Delete Policy
      description: 'Deletes an existing policy by name. A policy cannot be deleted
        if it is currently assigned to one or more watches — you must unassign it
        first. Upon successful deletion, any associated violations are updated asynchronously
        and related ignore rules are cleaned up.


        Requires the "Manage Policies" role to be set on the User or Group level.


        Note: This endpoint does not support the `projectKey` query parameter.

        '
      tags:
      - Policies V1
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: The name of the policy to delete.
        example: sec-policy
      responses:
        '200':
          description: Policy deleted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                    description: Success message.
              example:
                info: Policy sec-policy was deleted successfully
        '400':
          description: 'Policy name is empty, or the policy is still assigned to watches
            and cannot be deleted.

            '
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: 'Failed to delete Policy sec-policy : Policy is assigned to
                  2 watches'
        '404':
          description: Policy not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Policy sec-policy was not found
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to delete Policy sec-policy
  /api/v2/policies:
    post:
      operationId: create-policy_policies-v2-openapi
      summary: Create Policy
      description: 'Creates a new security, license, or operational risk policy (v2
        API). The v2 API supports additional action fields compared to v1, including
        `build_failure_grace_period_in_days`, `block_release_bundle_distribution`,
        `block_release_bundle_promotion`, and `create_ticket_enabled`.


        Requires the "Manage Policies" role to be set on the User or Group level.

        '
      tags:
      - Policies V2
      parameters:
      - name: projectKey
        in: query
        required: false
        description: 'When provided, the policy is created in the scope of the specified
          project. Requires Xray 3.21.2+ with Projects enabled.

          '
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoliciesPolicyMutationRequest'
            examples:
              securityPolicy:
                summary: Security policy with severity and build failure grace period
                value:
                  name: sec-policy
                  type: security
                  description: Block high severity vulnerabilities
                  rules:
                  - name: sec_rule
                    priority: 1
                    criteria:
                      min_severity: High
                    actions:
                      webhooks:
                      - sec_webhook
                      block_download:
                        active: true
                        unscanned: true
                      block_release_bundle_distribution: true
                      block_release_bundle_promotion: true
                      fail_build: true
                      build_failure_grace_period_in_days: 5
                      notify_deployer: true
                      create_ticket_enabled: true
              licensePolicy:
                summary: License policy with allowed list
                value:
                  name: license-policy
                  type: license
                  description: Only allow approved licenses
                  rules:
                  - name: license_rule
                    priority: 1
                    criteria:
                      allowed_licenses:
                      - BSD
                      - MIT
                      - Apache-2.0
                      allow_unknown: false
                    actions:
                      custom_severity: high
                      fail_build: true
              operationalRiskPolicy:
                summary: Operational risk policy
                value:
                  name: op-risk-policy
                  type: operational_risk
                  description: Flag risky packages
                  rules:
                  - name: op_risk_rule
                    priority: 1
                    criteria:
                      op_risk_min_risk: medium
                      op_risk_custom:
                        use_and_condition: true
                        is_eol: true
                        release_date_greater_than_months: 24
                    actions:
                      fail_build: true
                      notify_watch_recipients: true
      responses:
        '201':
          description: Policy created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: string
                    description: Success message.
              example:
                info: Policy created successfully
        '400':
          description: Policy is not valid. Check mandatory fields.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: 'Found Invalid Policy: Mandatory fields are missing'
        '403':
          description: Permission denied or unsupported policy type for current license.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: cannot create license policy with existing jfrog license
        '409':
          description: A policy with the given name already exists.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Policy already exists
        '415':
          description: Failed to parse the request body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to parse request
        '500':
          description: Internal server error while creating the policy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Failed to create Policy
    get:
