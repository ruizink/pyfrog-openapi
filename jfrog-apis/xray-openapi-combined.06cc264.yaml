          description: Webhook names to invoke.
          items:
            type: string
          example:
          - sec_webhook
        fail_build:
          type: boolean
          description: Whether builds are failed when this rule triggers.
          example: true
        build_failure_grace_period_in_days:
          type: integer
          description: 'Grace period in days before the build is failed.

            '
          example: 5
        block_download:
          $ref: '#/components/schemas/PolicyBlockDownload'
        block_release_bundle_distribution:
          type: boolean
          description: Whether distribution of release bundles is blocked.
          example: true
        block_release_bundle_promotion:
          type: boolean
          description: Whether promotion of release bundles is blocked.
        custom_severity:
          type: string
          description: 'Overridden severity for the generated violation. Applies only
            to Operational Risk and License type policies.

            '
          enum:
          - critical
          - high
          - medium
          - low
        notify_watch_recipients:
          type: boolean
          description: Whether watch subscribers are notified.
          example: true
        notify_deployer:
          type: boolean
          description: Whether the deployer is notified.
        create_ticket_enabled:
          type: boolean
          description: 'Whether a Jira ticket is automatically created. Requires a
            configured Jira integration.

            '
