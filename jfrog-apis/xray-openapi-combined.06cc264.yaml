  /api/v1/reports/cveSearch:
    post:
      operationId: generate-cve-search-report
      summary: Generate CVE Search Report
      description: 'Generates a CVE Search Report with data defined by scope and filters.
        This request starts the report generation process which runs in the background.
        The search only works on indexed resources. The report limit is up to 5 reports;
        any new reports beyond the limit will delete previously generated reports.


        The request must have exactly one resource type (repositories, builds, release
        bundles, or projects).


        Requires a user with the Manage Reports role. Since Xray 3.73.x.

        '
      tags:
      - Reports V1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportsCveSearchReportRequest'
            example:
              cve: CVE-2021-45046
              name: report-name
              filters:
                vulnerable_component: '*vulnerable:component*'
                impacted_artifact: '*impacted:artifact*'
                scan_date:
                  start: '2023-01-05T00:00:00Z'
                  end: '2023-01-22T20:00:00Z'
              resources:
                repositories:
                - name: repo-local
                - include_path_patterns:
                  - c/d/*
                  - t/s*
                  exclude_path_patterns:
                  - x/z/*
      responses:
        '200':
          description: 'Report generation started. Use the returned report_id to check
            status or retrieve content.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportsReportIdStatusResponse'
              example:
                report_id: 3
                status: pending
        '201':
          description: Report created (oldest report was overridden due to limit).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportsReportIdStatusResponse'
        '400':
          description: Bad request - missing or invalid parameters
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Version not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '412':
          description: Report feature is disabled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '429':
          description: Too many reports (limit exceeded).
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/reports/cveSearch/{id}:
    post:
      operationId: get-cve-search-report-details-by-id
      summary: Get CVE Search Report Details by ID
      description: 'Retrieves the content of a previously generated CVE Search report
        by its ID. Results are paginated; use the pagination query parameters to control
        page size and ordering. An optional request body may be provided with filters
        (impacted_artifact, scan_date, vulnerable_component).


        Requires a user with the Manage Reports role. Since Xray 3.73.x.

        '
      tags:
      - Reports V1
      parameters:
      - name: id
        in: path
        description: The unique identifier of the CVE Search report.
        required: true
        schema:
          type: string
      - name: direction
        in: query
        description: 'Sort direction: asc or desc.'
        required: true
        schema:
          type: string
      - name: page_num
        in: query
        description: Page number (starting at 1).
        required: true
        schema:
          type: integer
      - name: num_of_rows
        in: query
        description: Number of rows per page.
        required: true
        schema:
          type: integer
      - name: order_by
        in: query
        description: Field to sort by.
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: object
                  description: Optional filters to narrow the report results.
                  properties:
                    impacted_artifact:
                      type: string
                      description: Wildcard pattern for filtering artifact names.
                    scan_date:
                      type: string
                      format: date-time
                      description: Filter by scan date (RFC 3339 timestamp).
                    vulnerable_component:
                      type: string
                      description: Wildcard pattern for filtering component names.
            example:
              filters:
                impacted_artifact: '*artifact*'
                scan_date: '2023-01-05T08:00:00Z'
                vulnerable_component: '*component*'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  cve:
                    type: string
                  total_rows:
                    type: integer
                  produced_at:
                    type: string
                  created_by:
                    type: string
                  rows:
                    type: array
                    items:
                      type: object
                      properties:
                        vulnerable_component:
                          type: string
                        impacted_artifact:
                          type: string
                        path:
                          type: string
                        fixed_versions:
                          type: array
                          items:
                            type: string
                        artifact_scan_time:
                          type: string
                        package_type:
                          type: string
                        issue_id:
                          type: string
                        summary:
                          type: string
                        severity:
                          type: string
                        cvss_v2_score:
                          type: number
                        cvss_v2_vector:
                          type: string
                        cvss_v3_score:
                          type: number
                        cvss_v3_vector:
                          type: string
                        provider:
                          type: string
                        description:
                          type: string
                        references:
                          type: array
                          items:
                            type: string
                        published:
                          type: string
                      required:
                      - vulnerable_component
                      - impacted_artifact
                      - path
                      - fixed_versions
                      - artifact_scan_time
                      - package_type
                      - issue_id
                      - summary
                      - severity
                      - cvss_v3_score
                      - cvss_v3_vector
                      - provider
                      - description
                      - references
                      - published
                required:
                - cve
                - total_rows
                - produced_at
                - created_by
                - rows
              example:
                cve: CVE-2023-29402
                total_rows: 1
                produced_at: '2023-07-04T16:29:15+03:00'
                created_by: admin
                rows:
                - vulnerable_component: go://github.com/golang/go:1.19.5
                  impacted_artifact: docker://api-firewal:latest
                  path: docker1/api-firewal/latest/
                  fixed_versions:
                  - 1.19.10
                  - 1.20.5
                  artifact_scan_time: '2023-07-04T16:27:34+03:00'
                  package_type: go
                  issue_id: XRAY-521544
                  summary: The CVE issue summary
                  severity: Critical
                  cvss_v3_score: 9.8
                  cvss_v3_vector: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
                  provider: JFrog
                  description: The CVE issue description
                  references:
                  - https://go.dev/issue/60167
                  - https://pkg.go.dev/vuln/GO-2023-1839
                  published: '2023-06-09T07:17:42+03:00'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Report ID not found
          content:
            application/json:
              schema:
                type: object
        '500':
          description: server error
          content:
            application/json:
              schema:
                type: object
