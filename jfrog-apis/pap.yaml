    SearchName:
      type: string
      minLength: 1
      maxLength: 257
      description: 'Name pattern for searching resources in list/search APIs.

        Supports four patterns (ordered by search performance):

        - `name`: Exact match (e.g., `my-policy`)

        - `name*`: Prefix search (e.g., `policy*` matches names starting with "policy")

        - `*name`: Suffix search (e.g., `*policy` matches names ending with "policy")

