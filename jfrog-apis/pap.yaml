          rego:
            $ref: '#/components/schemas/Rego'
            x-oapi-codegen-extra-tags:
              binding: required
          parameters:
            type: array
            items:
              $ref: '#/components/schemas/TemplateParameter'
            description: List of configurable parameters for the template
            maxItems: 20
            x-oapi-codegen-extra-tags:
              binding: max=20,dive
    TemplatePayload:
      description: 'Template data for create and update operations.

        Contains the template configuration without system-managed fields.

        '
