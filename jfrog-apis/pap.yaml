        '
      allOf:
      - $ref: '#/components/schemas/TemplatePayload'
      - $ref: '#/components/schemas/CustomResource'
      - $ref: '#/components/schemas/ResourceIdentity'
    IsCustom:
      type: boolean
      description: Whether the resource is custom or built-in.
    TemplateCategory:
      type: string
      enum:
      - security
