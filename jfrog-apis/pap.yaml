          and the value must be compatible with the template parameter''s type.

          '
    TemplateParameterName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[a-zA-Z0-9]([a-zA-Z0-9._-]*[a-zA-Z0-9])?$
      description: "Parameter name (must be unique within the template).\nMust begin\
        \ and end with an alphanumeric character and may consist only of dashes, \n\
        underscores, dots and alphanumerics in between.\n"
      example: severity_threshold
      x-oapi-codegen-extra-tags:
        binding: required,min=1,max=100,regex=^[a-zA-Z0-9]([a-zA-Z0-9._-]*[a-zA-Z0-9])?$
    TemplateParameterType:
      type: string
      enum:
      - string
      - bool
      - int
      - float
      - object
      description: Data type of the parameter
      example: string
      x-oapi-codegen-extra-tags:
        binding: required,oneof=string bool int float object
    TemplateParameterValue:
      description: 'Parameter value (must match the template parameter type).

        The value format depends on the parameter type:

        - string: Any string value

        - bool: "true" or "false"

        - int: Integer number as string

        - float: Floating point number as string

        - object: JSON object as string

        '
      type: string
      example: critical
      x-oapi-codegen-extra-tags:
        binding: required
    RulePayload:
      description: 'Rule data for create and update operations.

        Contains the rule configuration without system-managed fields.


        When creating a rule from a template:

        - template_id must be provided

        - rule parameters must match the template parameters

        - all template parameters must be provided

        '
      allOf:
      - $ref: '#/components/schemas/ResourceBase'
      - type: object
        required:
        - template_id
        properties:
          template_id:
            $ref: '#/components/schemas/JFrogId'
          parameters:
            type: array
            items:
              $ref: '#/components/schemas/RuleParameter'
            description: 'Rule-specific parameter values.

              When template_id is provided, these must match the template parameters.

              All template parameters without default values must be provided.

              '
            maxItems: 20
            x-oapi-codegen-extra-tags:
              binding: omitempty,max=20,dive
    Rule:
      description: 'Complete rule resource including system-managed identity fields.

