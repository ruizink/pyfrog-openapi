openapi: 3.0.3
info:
  title: JFrog Unified Policy Service APIs
  description: 'JFrog Unified Policy Service APIs for managing policies across the
    JFrog Platform.


    This API provides endpoints for creating, updating, and managing policies

    that can be applied to various JFrog platform resources.


    ## Authentication

    All API requests require a valid JWT bearer token in the Authorization header.

    '
  version: 1.0.0
  contact:
    name: JFrog Support
    url: https://jfrog.com/contact-us/
    email: support@jfrog.com
  license:
    name: JFrog Terms of Service
    url: https://jfrog.com/terms-and-conditions/
servers:
- url: https://{jfrog_url}/unifiedpolicy/api/v1
  description: JFrog Unified Policy Service API
tags:
- name: template
  description: template rule with optional parameters to customize.
- name: rule
  description: rules to use in a policy.
- name: policy
  description: policies to apply rules to resources in the JFrog Platform.
paths:
  /templates:
    get:
      summary: List all templates
      description: 'Retrieve a paginated list of all templates in the system.

        '
      tags:
      - template
      operationId: templatesList
      parameters:
      - $ref: '#/components/parameters/idQueryParam'
      - $ref: '#/components/parameters/nameQueryParam'
      - $ref: '#/components/parameters/pageQueryParam'
      - $ref: '#/components/parameters/limitQueryParam'
      - $ref: '#/components/parameters/templateSortByParam'
      - $ref: '#/components/parameters/sortOrderQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/TemplatePaginatedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - bearerAuth: []
      - unifiedPolicyAuth:
        - template:read
    post:
      summary: Create a new template
      description: 'Create a new template in the system.

        '
      tags:
      - template
      operationId: templatesCreate
      requestBody:
        $ref: '#/components/requestBodies/TemplateRequest'
      responses:
        '201':
          $ref: '#/components/responses/TemplateResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - bearerAuth: []
      - unifiedPolicyAuth:
        - template:manage
  /templates/{templateId}:
    get:
      summary: Get a specific template
      description: 'Retrieve detailed information about a specific template by its
        unique identifier.

        '
      tags:
      - template
      operationId: templatesGet
      parameters:
      - $ref: '#/components/parameters/templateIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/TemplateResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - bearerAuth: []
      - unifiedPolicyAuth:
        - template:read
    put:
      summary: Update an existing template
      description: 'Update an existing template with new configuration.

        '
      tags:
      - template
      operationId: templatesUpdate
      parameters:
      - $ref: '#/components/parameters/templateIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/TemplateRequest'
      responses:
        '200':
          $ref: '#/components/responses/TemplateResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - bearerAuth: []
      - unifiedPolicyAuth:
        - internal:developer:w
      - unifiedPolicyAuth:
        - template:manage
    delete:
      summary: Delete a template
      description: 'Delete a template by its unique identifier.

        This endpoint removes the specified template from the system.

        '
      tags:
      - template
      operationId: templatesDelete
      parameters:
      - $ref: '#/components/parameters/templateIdPathParam'
      responses:
        '204':
          description: There is no content to send for this request, but the headers
            may be useful.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - bearerAuth: []
      - unifiedPolicyAuth:
        - internal:developer:w
      - unifiedPolicyAuth:
        - template:manage
  /rules:
    get:
      summary: List all rules
      description: 'Retrieve a paginated list of all rules in the system.

        This endpoint supports filtering by template category and other criteria.


        **Expand Parameter:**

        - Use `expand=template` to include complete template details with each rule

        '
      tags:
      - rule
      operationId: rulesList
      parameters:
      - $ref: '#/components/parameters/idQueryParam'
      - $ref: '#/components/parameters/nameQueryParam'
      - $ref: '#/components/parameters/ruleTemplateDataSourceQueryParam'
      - $ref: '#/components/parameters/ruleTemplateScannersQueryParam'
      - $ref: '#/components/parameters/ruleTemplateCategoryQueryParam'
      - $ref: '#/components/parameters/ruleExpandQueryParam'
      - $ref: '#/components/parameters/pageQueryParam'
      - $ref: '#/components/parameters/limitQueryParam'
      - $ref: '#/components/parameters/ruleSortByParam'
      - $ref: '#/components/parameters/sortOrderQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/RulePaginatedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - bearerAuth: []
      - unifiedPolicyAuth:
        - rule:read
    post:
      summary: Create a new rule
      description: 'Create a new rule in the system.

        '
      tags:
      - rule
      operationId: rulesCreate
      requestBody:
        $ref: '#/components/requestBodies/RuleRequest'
      responses:
        '201':
          $ref: '#/components/responses/RuleResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - bearerAuth: []
      - unifiedPolicyAuth: []
  /rules/{ruleId}:
    get:
      summary: Get a specific rule
      description: 'Retrieve detailed information about a specific rule by its unique
        identifier.

        This endpoint supports expanding template details using the expand parameter.

        '
      tags:
      - rule
      operationId: rulesGet
      parameters:
      - $ref: '#/components/parameters/ruleIdPathParam'
      - $ref: '#/components/parameters/ruleExpandQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/RuleExpandedResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - bearerAuth: []
      - unifiedPolicyAuth:
        - rule:read
    put:
      summary: Update an existing rule
      description: 'Update an existing rule with new configuration.

        '
      tags:
      - rule
      operationId: ruleUpdate
      parameters:
      - $ref: '#/components/parameters/ruleIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/RuleRequest'
      responses:
        '200':
          $ref: '#/components/responses/RuleResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - bearerAuth: []
      - unifiedPolicyAuth: []
    delete:
      summary: Delete a rule
      description: 'Delete a rule by its unique identifier.

        This endpoint removes the specified rule from the system.

        '
      tags:
      - rule
      operationId: ruleDelete
      parameters:
      - $ref: '#/components/parameters/ruleIdPathParam'
      responses:
        '204':
          description: There is no content to send for this request, but the headers
            may be useful.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - bearerAuth: []
      - unifiedPolicyAuth: []
  /policies:
    get:
      summary: List all policies
      description: 'Retrieve a paginated list of all policies in the system.

        This endpoint supports pagination and filtering of policies based on various
        criteria.

        '
      tags:
      - policy
      operationId: policiesList
      parameters:
      - $ref: '#/components/parameters/policyEnabledQueryParam'
      - $ref: '#/components/parameters/policyModeQueryParam'
      - $ref: '#/components/parameters/policyActionQueryParam'
      - $ref: '#/components/parameters/policyScopeTypeQueryParam'
      - $ref: '#/components/parameters/policyStageQueryParam'
      - $ref: '#/components/parameters/policyGateQueryParam'
      - $ref: '#/components/parameters/policyRuleIdQueryParam'
      - $ref: '#/components/parameters/policyProjectKeyQueryParam'
      - $ref: '#/components/parameters/policyHierarchicalQueryParam'
      - $ref: '#/components/parameters/policyApplicationLabelKeyQueryParam'
      - $ref: '#/components/parameters/policyApplicationLabelValueQueryParam'
      - $ref: '#/components/parameters/policyApplicationLabelsParam'
      - $ref: '#/components/parameters/policyApplicationKeyQueryParam'
      - $ref: '#/components/parameters/idQueryParam'
      - $ref: '#/components/parameters/nameQueryParam'
      - $ref: '#/components/parameters/pageQueryParam'
      - $ref: '#/components/parameters/limitQueryParam'
      - $ref: '#/components/parameters/policySortByParam'
      - $ref: '#/components/parameters/sortOrderQueryParam'
      - $ref: '#/components/parameters/policyExpandQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/PolicyPaginatedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - bearerAuth: []
      - unifiedPolicyAuth:
        - policy:read
    post:
      summary: Create a new policy
      description: 'Create a new policy in the system. The policy must include a unique
        name,

        description, and the policy rules to be enforced.

        '
      tags:
      - policy
      operationId: policiesCreate
      requestBody:
        $ref: '#/components/requestBodies/PolicyRequest'
      responses:
        '201':
          $ref: '#/components/responses/PolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - bearerAuth: []
      - unifiedPolicyAuth: []
  /policies/{policyId}:
    get:
      summary: Get a specific policy
      description: 'Retrieve detailed information about a specific policy by its unique
        identifier.

        This endpoint returns the complete policy configuration including rules and
        metadata.

        '
      tags:
      - policy
      operationId: policiesGet
      parameters:
      - $ref: '#/components/parameters/policyIdPathParam'
      responses:
        '200':
          $ref: '#/components/responses/PolicyExpandedResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - bearerAuth: []
      - unifiedPolicyAuth:
        - policy:read
    put:
      summary: Update an existing policy
      description: 'Update an existing policy with new configuration.

        This endpoint allows updating any aspect of the policy including rules,

        description, and other metadata.

        '
      tags:
      - policy
      operationId: policiesUpdate
      parameters:
      - $ref: '#/components/parameters/policyIdPathParam'
      requestBody:
        $ref: '#/components/requestBodies/PolicyRequest'
      responses:
        '200':
          $ref: '#/components/responses/PolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - bearerAuth: []
      - unifiedPolicyAuth: []
    delete:
      summary: Delete a policy
      description: 'Delete a policy by its unique identifier.

        This endpoint removes the specified policy from the system.

        '
      tags:
      - policy
      operationId: policiesDelete
      parameters:
      - $ref: '#/components/parameters/policyIdPathParam'
      responses:
        '204':
          description: There is no content to send for this request, but the headers
            may be useful.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - bearerAuth: []
      - unifiedPolicyAuth: []
components:
  securitySchemes:
    bearerAuth:
      description: JWT Bearer token authentication
      type: http
      scheme: bearer
      bearerFormat: JWT
    unifiedPolicyAuth:
      description: "Unified Policy OAuth2 security scheme defining required permission\
        \ scopes.\nUses JFrog's permission scope format: <resource-type>:<target>:<action>\n\
        \nWhile OAuth2 is defined here for permission documentation, the actual \n\
        implementation uses JWT Bearer tokens transported via Authorization header.\n\
        \nPermission scopes follow JFrog's standard format:\n- policy:*:read - Read\
        \ access to all policies\n- policy:project-key:write - Write access to project-specific\
        \ policies\n- template:*:manage - Full management access to all templates\n\
        - rule:rule-id:delete - Delete access to specific rule\n"
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://your-jfrog-instance.com/access/oauth/authorize
          tokenUrl: https://your-domain.jfrog.io/access/oauth/token
          scopes:
            policy:read: Read access to policies
            policy:manage: Full management access to policies
            policy:*:read: Read access to all policies
            policy:*:write: Write access to all policies
            policy:*:delete: Delete access to all policies
            policy:*:manage: Full management access to all policies
            policy:*:execute: Execute/evaluate all policies
            policy:project:read: Read access to project-scoped policies
            policy:project:write: Write access to project-scoped policies
            policy:project:delete: Delete access to project-scoped policies
            policy:project:manage: Full management of project-scoped policies
            policy:project:execute: Execute project-scoped policies
            template:read: Read access to templates
            template:manage: Full management access to templates
            template:*:read: Read access to all templates
            template:*:write: Write access to all templates
            template:*:delete: Delete access to all templates
            template:*:manage: Full management access to all templates
            rule:read: Read access to rules
            rule:*:read: Read access to all rules
            rule:*:write: Write access to all rules
            rule:*:delete: Delete access to all rules
            rule:*:manage: Full management access to all rules
            evaluation:*:read: Read access to all evaluations
            evaluation:*:write: Write access to create evaluations
            evaluation:*:delete: Delete access to evaluations
            system:admin: Full system administrative access
            internal:developer:w: Internal developer write access
            unifiedpolicy:admin: Full unified policy administrative access
  parameters:
    templateIdPathParam:
      name: templateId
      in: path
      description: Template identifier.
      required: true
      schema:
        $ref: '#/components/schemas/JFrogId'
    templateSortByParam:
      name: sort_by
      in: query
      description: Template attribute to sort by.
      required: false
      schema:
        type: string
        default: created_at
        example: created_at
        enum:
        - name
        - created_at
        x-oapi-codegen-extra-tags:
          binding: omitempty,oneof=name created_at
    ruleIdPathParam:
      name: ruleId
      in: path
      description: Rule identifier.
      required: true
      schema:
        $ref: '#/components/schemas/JFrogId'
    ruleSortByParam:
      name: sort_by
      in: query
      description: Rule attribute to sort by.
      required: false
      schema:
        type: string
        default: created_at
        example: created_at
        enum:
        - name
        - created_at
        x-oapi-codegen-extra-tags:
          binding: omitempty,oneof=name created_at
    ruleTemplateScannersQueryParam:
      name: scanner_types
      in: query
      description: Filter rules by template scanner types. Multiple values can be
        provided for filtering.
      required: false
      allowEmptyValue: true
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/TemplateScannerType'
    ruleTemplateDataSourceQueryParam:
      name: template_data_source
      in: query
      description: Filter rules by template data source type.
      required: false
      allowEmptyValue: true
      style: form
      explode: true
      schema:
        $ref: '#/components/schemas/TemplateDataSourceType'
    ruleTemplateCategoryQueryParam:
      name: template_category
      in: query
      description: Filter rules by template category.
      required: false
      allowEmptyValue: true
      schema:
        $ref: '#/components/schemas/TemplateCategory'
    ruleExpandQueryParam:
      name: expand
      in: query
      description: Comma-separated list of fields to expand in the response.
      required: false
      schema:
        type: string
        enum:
        - template
        example: template
        x-oapi-codegen-extra-tags:
          binding: omitempty,oneof=template
    policyIdPathParam:
      name: policyId
      in: path
      description: Policy identifier.
      required: true
      schema:
        $ref: '#/components/schemas/JFrogId'
    policyEnabledQueryParam:
      name: enabled
      in: query
      description: Filter by policy enabled status.
      required: false
      schema:
        $ref: '#/components/schemas/PolicyEnabled'
    policyModeQueryParam:
      name: mode
      in: query
      description: Filter by policy mode.
      required: false
      schema:
        $ref: '#/components/schemas/PolicyMode'
    policyActionQueryParam:
      name: action_type
      in: query
      description: Filter policies by action types.
      allowEmptyValue: true
      schema:
        $ref: '#/components/schemas/PolicyActionType'
    policyScopeTypeQueryParam:
      name: scope_type
      in: query
      description: Filter policies by scope type (project or application).
      allowEmptyValue: true
      schema:
        $ref: '#/components/schemas/PolicyScopeType'
    policyStageQueryParam:
      name: stage_key
      in: query
      description: Filter policies by stage. Multiple values can be provided for filtering.
      allowEmptyValue: true
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/StageKey'
    policyGateQueryParam:
      name: stage_gate
      in: query
      description: Filter policies by gate. Multiple values can be provided for filtering.
      allowEmptyValue: true
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/LifecycleStageGate'
    policyProjectKeyQueryParam:
      name: project_key
      in: query
      description: Filter policies by project key.
      allowEmptyValue: true
      schema:
        $ref: '#/components/schemas/ProjectKey'
    policyHierarchicalQueryParam:
      name: hierarchical
      in: query
      description: Adding hierarchy filter logic in combination with other scope filter.
      allowEmptyValue: true
      schema:
        type: boolean
    policyApplicationLabelKeyQueryParam:
      name: application_label_key
      in: query
      description: Filter policies by application label key. Multiple values can be
        provided for filtering.
      allowEmptyValue: true
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ApplicationLabelKey'
    policyApplicationLabelValueQueryParam:
      name: application_label_value
      in: query
      description: Filter policies by application label value. Multiple values can
        be provided for filtering.
      allowEmptyValue: true
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/JFrogResourceName'
    policyApplicationKeyQueryParam:
      name: application_key
      in: query
      description: Filter policies by application key. Multiple values can be provided
        for filtering.
      allowEmptyValue: true
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ApplicationKey'
    policyRuleIdQueryParam:
      name: rule_id
      in: query
      description: Filter policies by rule ID. Multiple values can be provided for
        filtering.
      allowEmptyValue: true
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/JFrogId'
    policyApplicationLabelsParam:
      name: application_labels
      in: query
      description: 'Filter policies by application labels with exact key/value matches
        using deepObject style.

        Provide each label as a key in the object with its value as the property value.


        Examples (preferred):

        - application_labels[environment]=production

        - application_labels[tier]=backend&application_labels[maturity]=beta


        Notes:

        - When this filter is present, the scope type is enforced as project.

        - Policies without labels are included only when no label filters are specified.

        '
      required: false
      style: deepObject
      explode: true
      schema:
        type: object
        additionalProperties:
          type: string
    policySortByParam:
      name: sort_by
      in: query
      description: Policy attribute to sort by.
      required: false
      schema:
        type: string
        default: created_at
        example: created_at
        enum:
        - name
        - enabled
        - mode
        - resource
        - action
        - created_at
        x-oapi-codegen-extra-tags:
          binding: omitempty,oneof=name enabled mode resource action created_at
    idQueryParam:
      name: id
      in: query
      description: Query by the resource id. Multiple values can be provided for filtering.
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/JFrogId'
    nameQueryParam:
      name: name
      in: query
      description: 'Query by the resource name. Multiple values can be provided for
        filtering.

        '
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/SearchName'
    pageQueryParam:
      name: offset
      in: query
      description: A page offset to the requested page.
      required: false
      schema:
        $ref: '#/components/schemas/JFPageOffset'
    limitQueryParam:
      name: limit
      in: query
      description: An integer value representing the maximum number of items to include
        in the response.
      required: false
      schema:
        $ref: '#/components/schemas/JFPageLimit'
    sortOrderQueryParam:
      name: sort_order
      in: query
      description: Sort direction.
      required: false
      schema:
        type: string
        default: desc
        example: desc
        enum:
        - asc
        - desc
        x-oapi-codegen-extra-tags:
          binding: omitempty,oneof=asc desc
    policyExpandQueryParam:
      name: expand
      in: query
      description: Expand policy response to include complete rule objects.
      required: false
      schema:
        type: string
        enum:
        - rules
        x-oapi-codegen-extra-tags:
          binding: omitempty,oneof=rules
  schemas:
    ResourceBase:
      type: object
      required:
      - name
      properties:
        name:
          $ref: '#/components/schemas/JFrogResourceName'
        description:
          $ref: '#/components/schemas/JFrogResourceDescription'
      description: 'Foundation schema for all named resources in the system.

        Provides common name and description fields that all resources inherit.

        Used as the base for all resource payload schemas.

        '
    ResourceIdentity:
      type: object
      required:
      - id
      - created_at
      - created_by
      - updated_at
      - updated_by
      properties:
        id:
          $ref: '#/components/schemas/JFrogId'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the resource was created
        created_by:
          $ref: '#/components/schemas/JFPrincipal'
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the resource was last updated
        updated_by:
          $ref: '#/components/schemas/JFPrincipal'
      description: 'System-managed identity and audit trail fields for all resources.

        These fields are automatically managed by the system and cannot be modified
        by clients.

        Included in all resource response schemas to provide complete resource information.

        '
    CustomResource:
      description: 'Custom resource flag

        '
      type: object
      properties:
        is_custom:
          $ref: '#/components/schemas/IsCustom'
    TemplatePayloadBase:
      description: 'Base template data without data_source_type field.

        Used as a base for both TemplatePayload and TemplateCreatePayload.

