        required:
        - version
        - category
        - rego
        - parameters
        properties:
          version:
            $ref: '#/components/schemas/JFrogResourceVersion'
            x-oapi-codegen-extra-tags:
              binding: required
          category:
            $ref: '#/components/schemas/TemplateCategory'
            x-oapi-codegen-extra-tags:
              binding: required
          scanners:
