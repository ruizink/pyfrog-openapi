openapi: 3.1.0
info:
  title: JFrog Artifactory Artifacts & Storage API
  description: REST API for managing artifacts, storage, and related operations in
    JFrog Artifactory
  version: 1.0.0
  contact:
    name: JFrog Support
servers:
- url: https://{jfrog_url}/artifactory/api
  description: JFrog Platform
  variables:
    jfrog_url:
      default: myserver.jfrog.io
      description: Your JFrog Platform hostname (e.g., mycompany.jfrog.io)
tags:
- name: Pruning Unreferenced Data
  description: Pruning Unreferenced Data (PUD) operations
- name: Item Management APIs
  description: Item management operations including properties, deployment, and deletion
- name: Deploy Artifact APIs
  description: Deploy artifact operations including standard deployment, checksum
    deployment, and archive deployment
- name: Storage Info
  description: Storage information operations
- name: Artifact Retrieval
  description: Artifact retrieval operations
- name: Artifact Management
  description: Artifact management operations (copy, move, delete)
- name: Signed URLs
  description: Signed URL operations
- name: Distribution
  description: Artifact distribution operations
- name: System Operations
  description: System-level operations
- name: Metrics
  description: Metrics and monitoring operations
paths:
  /system/storage/prune/start:
    post:
      tags:
      - Pruning Unreferenced Data
      summary: Start PUD Process
      description: This REST API is called to start a new PUD process, or resume a
        PUD process that was stopped before completion. The Pruning Unreferenced Data
        (PUD) APIs are used to delete randomly existing binaries in the filestore
        that are not referenced in Artifactory.
      operationId: startPudProcess
      requestBody:
        required: false
        description: PUD process parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartPudProcessRequest'
      responses:
        '202':
          description: Accepted - PUD process has been submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PudProcessResponse'
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have admin permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '412':
          description: Precondition Failed - PUD process is already running or cannot
            be started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PudProcessResponse'
  /system/storage/prune/status:
    get:
      tags:
      - Pruning Unreferenced Data
      summary: Get Status of the PUD Process
      description: Get the current status of the PUD process (i.e., running, stopped,
        finished, or error) along with relevant data on the process such as total
        binaries deleted, total size of disk space cleaned, information on the last
        handled directory, and other information.
      operationId: getPudProcessStatus
      responses:
        '200':
          description: Successfully retrieved PUD process status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PudProcessStatus'
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have admin permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '412':
          description: Precondition Failed - No Prune task found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PudProcessResponse'
  /system/storage/prune/stop:
    post:
      tags:
      - Pruning Unreferenced Data
      summary: Stop PUD Process
      description: This REST API is called to stop the PUD process.
      operationId: stopPudProcess
      responses:
        '202':
          description: Accepted - Prune task stop request submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PudProcessResponse'
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have admin permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '412':
          description: Precondition Failed - No running Prune task found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PudProcessResponse'
  /storage/{repoKey}/{itemPath}:
    get:
      tags:
      - Item Management APIs
      summary: Get Storage Item Information
      description: "Returns different types of information about an item based on\
        \ query parameters.\n\n**Query parameters are mutually exclusive** - only\
        \ one operation type can be requested at a time:\n- list - Get file/folder\
        \ listing (flat or deep)\n- stats - Get file statistics (download count, last\
        \ download info)\n- lastModified - Get last modified timestamp\n- properties\
        \ - Get item properties\n- permissions - Get item permissions\n- No parameters\
        \ - Get folder or file info\n\nSince: 2.2.1  \nSecurity: Requires a privileged\
        \ user (can be anonymous)\n"
      operationId: getStorageItem
      parameters:
      - name: repoKey
        in: path
        description: Repository key
        required: true
        schema:
          type: string
          minLength: 1
      - name: itemPath
        in: path
        description: Item path within the repository
        required: true
        schema:
          type: string
          minLength: 1
      - name: properties
        in: query
        description: Comma-separated list of property keys to retrieve. **Mutually
          exclusive with other query parameters.**
        required: false
        schema:
          type: string
      - name: lastModified
        in: query
        description: Returns the last modified item at the given path. If the given
          path is a folder, the latest last modified item is searched for recursively.
          **Mutually exclusive with other query parameters.**
        required: false
        schema:
          type: boolean
      - name: stats
        in: query
        description: Returns item statistics (download count, last download date,
          last downloader). **Mutually exclusive with other query parameters.**
        required: false
        schema:
          type: boolean
      - name: permissions
        in: query
        description: Returns item permissions. **Mutually exclusive with other query
          parameters.**
        required: false
        schema:
          type: boolean
      - name: list
        in: query
        description: Get a flat (the default) or deep listing of the files and folders.
          **Mutually exclusive with other query parameters except listing-related
          parameters (deep, depth, listFolders, etc.).**
        required: false
        schema:
          type: boolean
      - name: deep
        in: query
        description: Deep listing (0 or 1). Used with list parameter only.
        required: false
        schema:
          type: integer
          enum:
          - 0
          - 1
      - name: depth
        in: query
        description: Optional depth to limit the results for deep listing. Used with
          list parameter only.
        required: false
        schema:
          type: integer
      - name: listFolders
        in: query
        description: Include folders in listing (0 or 1). Used with list parameter
          only.
        required: false
        schema:
          type: integer
          enum:
          - 0
          - 1
      - name: mdTimestamps
        in: query
        description: Include metadata timestamp values (0 or 1). Used with list parameter
          only.
        required: false
        schema:
          type: integer
          enum:
          - 0
          - 1
      - name: includeRootPath
        in: query
        description: Include folder root path (0 or 1). Used with list parameter only.
        required: false
        schema:
          type: integer
          enum:
          - 0
          - 1
      responses:
        '200':
          description: Successfully retrieved item information
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/FileList'
                - $ref: '#/components/schemas/FileStatistics'
                - $ref: '#/components/schemas/ItemLastModified'
                - $ref: '#/components/schemas/ItemProperties'
                - $ref: '#/components/schemas/ItemPermissions'
                - $ref: '#/components/schemas/FolderInfo'
                - $ref: '#/components/schemas/FileInfo'
        '400':
          description: Bad Request - Invalid query parameter combination or malformed
            path.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - The specified item does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
      - Item Management APIs
      summary: Set Item Properties
      operationId: setItemProperties
      description: "Attach properties to an existing item (file, folder, repository,\
        \ or Release Bundle v2).\n\nTo supply special characters (comma (,), backslash(\\\
        ), pipe(|), equals(=)) as a key/value you must add an encoded backslash (%5C)\
        \ before them. For example: ..?properties=a=1%5C=1 will attach key a with\
        \ 1=1 as value.\n\nRequires Artifactory Pro, supported by local and local-cached\
        \ repositories only.\n\nSince: 2.3.0  \nSecurity: Requires a privileged user\
        \ (can be anonymous)\n\nTip: Starting with Artifactory 7.104.x, it is possible\
        \ to define an upper limit on the number of artifacts on which property updates\
        \ can be performed at one time. For example, if you revise a folder property\
        \ and the folder contains more items than the limit defined in this system\
        \ parameter, the operation will fail. This feature is useful for preventing\
        \ heavy loads on the database. The limit is defined using the system parameter,\
        \ artifactory.max.artifacts.set.properties.recursive. By default, this feature\
        \ is off. There is no default value when turned on.\n"
      parameters:
      - name: repoKey
        in: path
        description: Repository key
        required: true
        schema:
          type: string
          minLength: 1
      - name: itemPath
        in: path
        description: Item path within the repository
        required: true
        schema:
          type: string
          minLength: 1
      - name: properties
        in: query
        description: 'Properties to set in format: properties=key1=value1[,value2][|key2=value3].
          Multiple properties can be separated by semicolon (;) or pipe (|).'
        required: true
        schema:
          type: string
      - name: recursive
        in: query
        description: Apply properties recursively to all items in folder (0 or 1).
          For folders, , property attachment is recursive by default.
        required: false
        schema:
          type: integer
          enum:
          - 0
          - 1
          default: 1
      responses:
        '204':
          description: Properties set successfully (no content)
        '400':
          description: Bad Request - The properties parameter is missing or malformed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have annotate permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - The specified item or repository does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Item Management APIs
      summary: Delete Item Properties
      operationId: deleteItemProperties
      description: "Deletes the specified properties from an item (file, folder, or\
        \ repository).\n \nRequires Artifactory Pro, supported by local and local-cached\
        \ repositories only.\n\nSince: 2.3.2  \nSecurity: Requires a privileged user\
        \ (can be anonymous)\n"
      parameters:
      - name: repoKey
        in: path
        description: Repository key
        required: true
        schema:
          type: string
          minLength: 1
      - name: itemPath
        in: path
        description: Item path within the repository
        required: true
        schema:
          type: string
          minLength: 1
      - name: properties
        in: query
        description: Comma-separated list of property keys to delete. Required.
        required: true
        schema:
          type: string
      - name: recursive
        in: query
        description: 'Delete properties recursively from all items in folder (0 or
          1). Default: 1 (recursive) for folders.'
        required: false
        schema:
          type: integer
          enum:
          - 0
          - 1
          default: 1
      responses:
        '204':
          description: Properties deleted successfully (no content)
        '400':
          description: Bad Request - The properties parameter is missing or malformed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have the necessary permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - The specified item or repository does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /metadata/{repoKey}/{itemPath}:
    patch:
      tags:
      - Item Management APIs
      summary: Update Item Properties
      operationId: updateItemProperties
      description: 'Attach and modify properties to an item - file, folder, or repository.

        Requires Artifactory Pro, supported by local and local-cached repositories
        only.

        Since: 6.1.0

        Security: Requires a privileged user (Annotate authorization required)

        '
      parameters:
      - name: repoKey
        in: path
        description: Repository key
        required: true
        schema:
          type: string
          minLength: 1
      - name: itemPath
        in: path
        description: Item path within the repository
        required: true
        schema:
          type: string
          minLength: 1
      - name: recursiveProperties
        in: query
        description: Apply properties recursively (0 or 1)
        required: false
        schema:
          type: integer
          enum:
          - 0
          - 1
      - name: atomicProperties
        in: query
        description: Atomic properties update (0 or 1)
        required: false
        schema:
          type: integer
          enum:
          - 0
          - 1
      requestBody:
        required: true
        description: Properties to update
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePropertiesRequest'
      responses:
        '204':
          description: Properties updated successfully (no content)
        '400':
          description: Bad Request - The request body is malformed or invalid, or
            props/stats fields are missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have Annotate authorization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - The specified item or repository does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /checksum/sha256:
    post:
      tags:
      - Item Management APIs
      summary: Set Item SHA256 Checksum
      operationId: setItemSha256Checksum
      description: 'Calculates an artifact''s SHA256 checksum and attaches it as a
        property (with key "sha256"). If the artifact is a folder, then recursively
        calculates the SHA256 of each item in the folder and attaches the property
        to each item.

        Since: 4.2.1

        Security: Requires an admin user

        Note: Artifactory natively supports SHA-256 since version 5.5. This API has
        been maintained to provide backward compatibility for users of older Artifactory
        versions.

        '
      requestBody:
        required: true
        description: Repository and path information
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Sha256ChecksumRequest'
      responses:
        '200':
          description: SHA256 checksum calculated and attached successfully
        '400':
          description: Bad Request - The request body is malformed or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have admin permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /{repoKey}/{filePath}:
    put:
      tags:
      - Deploy Artifact APIs
      summary: Deploy Artifact or Create Directory
      operationId: deployArtifact
      description: '**Deploy Artifact**: Deploy an artifact to the specified destination.


        **Create Directory**: Create a new directory by specifying a path that ends
        with `/` and omitting the request body.


        You can also attach properties as part of deploying artifacts or creating
        directories.


        Important: In certain cases (particularly when working with large artifacts),
        the Created timestamp might be later than the Last Modified timestamp. This
        can occur because the Last Modified timestamp records when the upload began,
        whereas the Created timestamp is set only when the upload is complete and
        committed to the database.


        Security: Requires a user with ''deploy'' permissions (can be anonymous)

        '
      parameters:
      - name: repoKey
        in: path
        description: Repository key
        required: true
        schema:
          type: string
          minLength: 1
      - name: filePath
        in: path
        description: Path to the artifact or directory within the repository. For
          directories, the path must end with `/`.
        required: true
        schema:
          type: string
          minLength: 1
      - name: X-Checksum-Sha1
        in: header
        description: SHA1 checksum to verify the integrity of the deployment. Artifactory
          rejects the deployment if the checksum does not match. Only applicable for
          artifact deployment.
        required: false
        schema:
          type: string
      - name: X-Checksum-Sha256
        in: header
        description: SHA256 checksum to verify the integrity of the deployment. Artifactory
          rejects the deployment if the checksum does not match. Only applicable for
          artifact deployment.
        required: false
        schema:
          type: string
      requestBody:
        required: false
        description: Binary content of the artifact to deploy. Omit for directory
          creation.
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Created - Artifact deployed or directory created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemCreated'
        '400':
          description: Bad Request - Invalid path, invalid checksum header, or malformed
            request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have deploy permissions
            on this repository.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - Repository not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed - The target path resolves to a repository
            that does not accept PUT (e.g., a virtual repository).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - Duplicate artifact or checksum mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
      - Artifact Retrieval
      summary: Retrieve Artifact
      operationId: retrieveArtifact
      description: 'Returns an artifact from the specified destination.


        You can also use properties in deployment and resolution as part of retrieving
        artifacts.


        Special tokens for retrieving latest versions:

        - **Latest Maven Release/Integration**: Specify SNAPSHOT or [RELEASE] for
        the version in the requested path to get the latest Maven integration or release
        artifact.

        - **Latest Non-Maven Release/Integration**: Specify [INTEGRATION] and [RELEASE]
        for the version in the requested path (replacing [folderItegRev] and [fileItegRev],
        as defined by the repository''s Repository Layouts) to get the latest integration
        version or latest release version artifact accordingly based on alphabetical
        sorting.


        Notes:

        - Integration and release tokens cannot be mixed together.

        - Only local, cache and virtual repositories will be used for latest version
        resolution.

        - To change the retrieve latest behavior to retrieve the latest version based
        on the created date, add `artifactory.request.searchLatestReleaseByDateCreated=true`
        to `artifactory.system.properties` and restart Artifactory.

        - Both [folderItegRev] and [fileItegRev] have to be defined in the repository
        layout.

        - Latest version resolution requires Artifactory Pro.


        Since: Latest Maven: 2.6.0; Latest non-Maven: 2.6.2

        Security: Requires a user with ''read'' permission (can be anonymous)

        '
      parameters:
      - name: repoKey
        in: path
        description: Repository key
        required: true
        schema:
          type: string
          minLength: 1
      - name: filePath
        in: path
        description: 'Path to the artifact within the repository. Can include special
          tokens: SNAPSHOT, [RELEASE], [INTEGRATION] for latest version resolution.'
        required: true
        schema:
          type: string
          minLength: 1
      - name: skipUpdateStats
        in: query
        description: Skip updating download statistics for this artifact
        required: false
        schema:
          type: boolean
          default: false
      - name: trace
        in: query
        description: Simulates an artifact retrieval request and returns verbose output
          about the resolution process. Useful for debugging artifact retrieval issues.
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Successfully retrieved artifact or trace output
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            text/plain:
              schema:
                type: string
                description: Trace output when trace parameter is used
        '401':
          description: Bad Credentials - Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - User does not have read permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - Artifact does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Artifact Management
      summary: Delete Item
      operationId: deleteItem
      description: 'Deletes a file or a folder from the specified local repository
        or remote repository cache.


        Security: Requires a user with ''delete'' permission (can be anonymous)

        '
      parameters:
      - name: repoKey
        in: path
        description: Repository key
        required: true
        schema:
          type: string
          minLength: 1
      - name: filePath
        in: path
        description: Path to the file or folder within the repository
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        '204':
          description: No Content - Item deleted successfully
        '401':
          description: Bad Credentials - Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - User does not have delete permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - Item does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed - The target path resolves to a repository
            that does not support DELETE (e.g., a remote or virtual repository).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /{repoKey}/{archivePath}!/{entryPath}:
    get:
      tags:
      - Artifact Retrieval
      summary: Archive Entry Download
      operationId: archiveEntryDownload
      description: 'Returns an archived resource from the specified archive destination.


        The `!` must be between the archive file name and the archive entry path,
        and will not work without the `/` after the `!`.


        Security: Requires a user with ''read'' permission (can be anonymous)

        '
      parameters:
      - name: repoKey
        in: path
        description: Repository key
        required: true
        schema:
          type: string
          minLength: 1
      - name: archivePath
        in: path
        description: Path to the archive file
        required: true
        schema:
          type: string
          minLength: 1
      - name: entryPath
        in: path
        description: Path to the resource within the archive (e.g., META-INF/MANIFEST.MF)
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        '200':
          description: Successfully retrieved archived resource
          content:
            text/plain:
              schema:
                type: string
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Bad Request - Invalid path, non-existent archive, or malformed
            entry path.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - User does not have read permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - Archive or entry does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /{repoKey}/{filePath}/checksum:
    put:
      tags:
      - Deploy Artifact APIs
      summary: Deploy Artifact by Checksum
      operationId: deployArtifactByChecksum
      description: "Deploy an artifact to the specified destination by checking if\
        \ the artifact content already exists in Artifactory.\n\nIf Artifactory already\
        \ contains a user-readable artifact with the same checksum, the artifact content\
        \ is copied to the new location and returns a response without requiring content\
        \ transfer.\n\nOtherwise, a 404 error is returned to indicate that content\
        \ upload is expected to deploy the artifact.\n\nIf the X-Checksum-Deploy header\
        \ is set to false, the artifact will be uploaded successfully with a 201 response,\
        \ even if it didn't exist before, and submitted checksums will have the status\
        \ Uploaded: Identical.\n\nYou can also attach properties when deploying artifacts.\n\
        \nSince: 2.5.1  \nSecurity: Requires a user with Deploy permissions (can be\
        \ anonymous)\n"
      parameters:
      - name: repoKey
        in: path
        description: Repository key
        required: true
        schema:
          type: string
          minLength: 1
      - name: filePath
        in: path
        description: Path to the artifact within the repository
        required: true
        schema:
          type: string
          minLength: 1
      - name: X-Checksum-Deploy
        in: header
        description: Must be set to true for checksum-based deployment
        required: true
        schema:
          type: boolean
          enum:
          - true
      - name: X-Checksum-Sha1
        in: header
        description: SHA1 checksum value. At least one checksum header (X-Checksum-Sha1,
          X-Checksum-Sha256, or X-Checksum) must be provided.
        required: false
        schema:
          type: string
      - name: X-Checksum-Sha256
        in: header
        description: SHA256 checksum value. At least one checksum header (X-Checksum-Sha1,
          X-Checksum-Sha256, or X-Checksum) must be provided.
        required: false
        schema:
          type: string
      - name: X-Checksum
        in: header
        description: 'Generic checksum value (type resolved by length: 32 chars=MD5,
          40 chars=SHA1, 64 chars=SHA256). At least one checksum header (X-Checksum-Sha1,
          X-Checksum-Sha256, or X-Checksum) must be provided.'
        required: false
        schema:
          type: string
      requestBody:
        required: false
        description: Binary content of the artifact (not needed if artifact exists)
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Created - Artifact deployed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemCreated'
        '400':
          description: Bad Request - Missing required checksum header or invalid checksum
            value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have deploy permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - Artifact with checksum not found, content upload
            required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /{repoKey}/{archivePath}:
    put:
      tags:
      - Deploy Artifact APIs
      summary: Deploy Artifacts from Archive
      operationId: deployArtifactsFromArchive
      description: "Deploys an archive containing multiple artifacts and extracts\
        \ it at the specified destination while maintaining the archive's file structure.\n\
        \nDeployment is performed in a single HTTP request. Only the extracted content\
        \ is deployed, not the archive file itself.\n\nBy default, the deployment\
        \ of artifacts is performed sequentially. However, starting from Artifactory\
        \ 7.96.3, artifact deployment can be performed in multiple parallel threads\
        \ using the system parameter artifactory.explode.archive.threads. For example,\
        \ if you set artifactory.explode.archive.threads = 10, the deployment of the\
        \ artifacts contained in the archive will be performed in 10 parallel threads\
        \ per archive file, which can save considerable time for large archive files.\n\
        \nSupported archive types: zip, tar, tar.gz, tgz\n\nNote: Requires Artifactory\
        \ Pro. Deployment of compressed archives (unlike tar) may incur considerable\
        \ CPU overhead.\n\nSince: 2.6.3  \nSecurity: Requires a user with 'deploy'\
        \ permissions (can be anonymous)\n"
      parameters:
      - name: repoKey
        in: path
        description: Repository key
        required: true
        schema:
          type: string
          minLength: 1
      - name: archivePath
        in: path
        description: Path where the archive should be extracted (must end with archive
          filename)
        required: true
        schema:
          type: string
          minLength: 1
      - name: X-Explode-Archive
        in: header
        description: Must be set to true to explode the archive upon deployment
        required: true
        schema:
          type: boolean
          enum:
          - true
      - name: X-Explode-Archive-Atomic
        in: header
        description: If true, archive will be exploded in an atomic operation upon
          deployment
        required: false
        schema:
          type: boolean
      requestBody:
        required: true
        description: Binary content of the archive file (zip, tar, tar.gz, or tgz)
        content:
          application/zip:
            schema:
              type: string
              format: binary
          application/x-tar:
            schema:
              type: string
              format: binary
          application/gzip:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Created - Archive deployed and extracted successfully
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Bad Request - Invalid archive or missing required headers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Bad Credentials - Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - User does not have deploy permissions or
            Artifactory Pro required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
