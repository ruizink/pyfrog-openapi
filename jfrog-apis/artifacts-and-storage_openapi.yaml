            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /gems/{repoName}/api/v1/versions/{gemName}:
    get:
      tags:
      - Artifact Retrieval
      summary: Get RubyGem Version List
      description: Returns the list of versions and other metadata associated with
        a specific Ruby gem.
      operationId: getRubyGemVersionList
      parameters:
      - name: repoName
        in: path
        description: Repository name
        required: true
        schema:
          type: string
          minLength: 1
      - name: gemName
        in: path
        description: Gem name
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        '200':
          description: Successfully retrieved RubyGem version list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RubyGemVersion'
            application/yaml:
              schema:
                type: string
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - The specified gem does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/application:
    get:
      tags:
      - Metrics
      summary: Get Artifactory Application Metrics
      description: 'Returns application-related metrics for Cloud (SaaS) users in
        OpenMetrics/Prometheus exposition text format (`text/plain`). This feature
        is supported on the Cloud (SaaS) platform for all licenses.


        **Security**: Requires a valid admin user.


        Use `Accept: text/plain` or `Accept: */*` in the request header.

        '
      operationId: getArtifactoryApplicationMetrics
      responses:
        '200':
          description: Successfully retrieved application metrics in OpenMetrics text
            format.
          content:
            text/plain:
              schema:
                type: string
                description: Metrics in OpenMetrics/Prometheus exposition text format.
                example: '# HELP app_disk_free_bytes Free disk space in bytes

                  # TYPE app_disk_free_bytes gauge

                  app_disk_free_bytes 1.073741824e+09

                  '
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
        '403':
          description: Permission Denied - The user does not have admin permissions.
        '406':
          description: 'Not Acceptable - The server cannot produce a response matching
            the Accept header. This endpoint only serves text/plain. Ensure your request
            uses `Accept: text/plain` or `Accept: */*`.'
  /v1/metrics:
    get:
      tags:
      - Metrics
      summary: Get the Open Metrics for Artifactory
      description: 'Returns all open metrics collected for Artifactory in OpenMetrics/Prometheus
        exposition text format (`text/plain`). This feature is supported on the Self-Hosted
        platform, with a Pro, Pro X, Enterprise X, or Enterprise+ license.


        **Security**: Requires a valid admin user.


        Use `Accept: text/plain` or `Accept: */*` in the request header.

        '
      operationId: getOpenMetricsForArtifactory
      parameters:
      - name: Accept
        in: header
        required: true
        description: Must be `text/plain; version=0.0.4` (Prometheus exposition format).
        schema:
          type: string
          enum:
          - text/plain; version=0.0.4
      responses:
        '200':
          description: Successfully retrieved open metrics in OpenMetrics text format.
          content:
            text/plain:
              schema:
                type: string
                description: Metrics in OpenMetrics/Prometheus exposition text format.
                example: '# HELP jfrt_runtime_heap_freememory_bytes Free heap memory
                  in bytes

                  # TYPE jfrt_runtime_heap_freememory_bytes gauge

                  jfrt_runtime_heap_freememory_bytes 5.36870912e+08

                  '
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
        '403':
          description: Permission Denied - The user does not have admin permissions.
        '406':
          description: 'Not Acceptable - The server cannot produce a response matching
            the Accept header. This endpoint only serves text/plain. Ensure your request
            uses `Accept: text/plain` or `Accept: */*`.'
  /system/storage/optimize:
    post:
      tags:
      - System Operations
      summary: Optimize System Storage
      description: From Artifactory Self-Hosted 4.6.0 to 7.98.x - Raises a flag to
        invoke balancing between redundant storage units of a shared filestore following
        the next full garbage collection. From Artifactory Self-Hosted 7.104.5 and
        later - Immediately triggers balancing between redundant storage units of
        a sharded filestore. If balancing is already running, the process is skipped.
        This is an advanced feature intended for administrators.
      operationId: optimizeSystemStorage
      responses:
        '202':
          description: Successfully started system storage optimization
        '401':
          description: Bad Credentials - Authentication failed. A valid token is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Permission Denied - The user does not have admin permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Sharing balancer is already running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '412':
          description: Sharing balancer failed to run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    StartPudProcessRequest:
      type: object
      properties:
        dryRun:
          type: boolean
          default: false
          description: If false then unreferenced binaries will be actually removed
            from the filestore. If true then unreferenced binaries will not be removed
            from the filestore. This mode may be useful to estimate the number of
            unreferenced binaries in each directory without actually removing them.
        startFromDirectory:
          type: string
          description: If present, the PUD process will continue from the directory
            identified here. If this parameter is omitted, the PUD process starts
            to prune from the beginning of the directories list.
        startFromBinary:
          type: integer
          format: int32
          default: 0
          description: If present, the PUD process continues from this position in
            the last directory that the previous PUD process stopped at. This parameter
            can be found in the response of the Get Status API at lastHandledDirectory>binariesProcessed.
            If omitted, the PUD process starts to prune from the first binary in the
            directory.
        binaryOlderThanDays:
          type: integer
          format: int32
          default: 1
          description: If present, unreferenced binaries that are newer than binaryOlderThanDays
            are ignored by the PUD process. If binaryOlderThanDays = 0, the PUD process
            does not relate to the binary creation date.
    PudProcessResponse:
      type: object
      properties:
        info:
          type: string
          description: Information message about the PUD process
    PudProcessStatus:
      type: object
      properties:
        status:
          type: string
          enum:
          - running
          - stopped
          - finished
          - error
          description: The status of the PUD process
        dryRun:
          type: boolean
          description: Whether the PUD process is actually deleting binaries
        timing:
          $ref: '#/components/schemas/PudTiming'
        progress:
          type: string
          description: The number of directories that have been processed thus far
        report:
          $ref: '#/components/schemas/PudReport'
        lastHandledDirectory:
          $ref: '#/components/schemas/PudDirectoryInfo'
        error:
          type: string
          description: Error details (only appears when an error occurs)
    PudTiming:
      type: object
      properties:
        startedAtMillis:
          type: integer
          format: int64
          description: The time in milliseconds when the PUD process started
        startedAt:
          type: string
          description: 'The time when the PUD process started. Artifactory returns
            this without a

            timezone offset (e.g., "2024-06-09T15:07:01"), so the format is a

            local ISO 8601 datetime string rather than strict RFC 3339.

            '
        durationMillis:
          type: integer
          format: int64
          description: The duration of the PUD process in milliseconds up until the
            point when this report was issued
        duration:
          type: string
          description: The duration of the PUD process up until the point when this
            report was issued
        lastUpdatedMillis:
          type: integer
          format: int64
          description: The time in milliseconds at which this report was issued
        lastUpdated:
          type: string
          description: 'The time at which this report was issued. Artifactory returns
            this without a

            timezone offset (e.g., "2024-06-09T15:07:15"), so the format is a

            local ISO 8601 datetime string rather than strict RFC 3339.

            '
    PudReport:
      type: object
      properties:
        totalBinariesProcessed:
          type: integer
          format: int64
          description: The total number of binaries processed thus far
        totalBinariesCleaned:
          type: integer
          format: int64
          description: The total number of binaries removed thus far
        totalBytesCleaned:
          type: integer
          format: int64
          description: The total number of bytes reclaimed by the PUD process
    PudDirectoryInfo:
      type: object
      properties:
        name:
          type: string
          description: The name of the directory that was being processed when this
            report was issued
        status:
          type: string
          enum:
          - running
          - stopped
          - finished
          - error
          description: Status relating to this directory only
        binariesProcessed:
          type: integer
          format: int64
          description: The number of binaries processed in this directory
        binariesCleaned:
          type: integer
          format: int64
          description: The number of binaries removed in this directory
        bytesCleaned:
          type: integer
          format: int64
          description: The number of bytes reclaimed in this directory
        timing:
          $ref: '#/components/schemas/PudTiming'
    ItemProperties:
      type: object
      properties:
        uri:
          type: string
        properties:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    ItemPermissions:
      type: object
      properties:
        uri:
          type: string
        principals:
          type: object
          properties:
            users:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
            groups:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
    FolderInfo:
      type: object
      properties:
        uri:
          type: string
        repo:
          type: string
        path:
          type: string
        created:
          type: string
          format: date-time
        createdBy:
          type: string
        lastModified:
          type: string
          format: date-time
        modifiedBy:
          type: string
        lastUpdated:
          type: string
          format: date-time
        children:
          type: array
          items:
            $ref: '#/components/schemas/FolderChild'
    FolderChild:
      type: object
      properties:
        uri:
          type: string
        folder:
          type: boolean
    FileInfo:
      type: object
      properties:
        uri:
          type: string
        downloadUri:
          type: string
        repo:
          type: string
        path:
          type: string
        remoteUrl:
          type: string
        created:
          type: string
          format: date-time
        createdBy:
          type: string
        lastModified:
          type: string
          format: date-time
        modifiedBy:
          type: string
        lastUpdated:
          type: string
          format: date-time
        size:
          type: string
          description: Size in bytes
        mimeType:
          type: string
        checksums:
          $ref: '#/components/schemas/Checksums'
        originalChecksums:
          $ref: '#/components/schemas/Checksums'
    Checksums:
      type: object
      properties:
        md5:
          type: string
        sha1:
          type: string
        sha256:
          type: string
    ItemLastModified:
      type: object
      properties:
        uri:
          type: string
        lastModified:
          type: string
          format: date-time
    FileStatistics:
      type: object
      properties:
        uri:
          type: string
        lastDownloaded:
          type: integer
          format: int64
          description: Timestamp in milliseconds
        downloadCount:
          type: integer
          format: int64
        lastDownloadedBy:
          type: string
    FileList:
      type: object
      properties:
        uri:
          type: string
        created:
          type: string
          format: date-time
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileListItem'
    FileListItem:
      type: object
      properties:
        uri:
          type: string
        size:
          type: string
          description: Size in bytes, or "-1" for folders
        lastModified:
          type: string
          format: date-time
        folder:
          type: boolean
        sha1:
          type: string
        mdTimestamps:
          type: object
          additionalProperties:
            type: string
            format: date-time
    ItemCreated:
      type: object
      properties:
        repo:
          type: string
        path:
          type: string
        created:
          type: string
          format: date-time
        createdBy:
          type: string
        downloadUri:
          type: string
        mimeType:
          type: string
        size:
          type: string
          description: Size in bytes
        checksums:
          $ref: '#/components/schemas/Checksums'
        originalChecksums:
          $ref: '#/components/schemas/Checksums'
        uri:
          type: string
    UpdatePropertiesRequest:
      type: object
      properties:
        props:
          type: object
          additionalProperties:
            oneOf:
            - type: string
              description: Single property value
            - type: array
              items:
                type: string
              description: Multiple property values
            - type: 'null'
              description: Set to null to remove the property
          description: 'Properties to update. Each property can be:

            - A single string value: "value1"

            - An array of strings: ["value1", "value2"]

            - null to remove the property

            '
      example:
        props:
          singleValue: myValue
          multiValue:
          - value1
          - value2
          toBeRemoved: null
    Sha256ChecksumRequest:
      type: object
      required:
      - repoKey
      - path
      properties:
        repoKey:
          type: string
          minLength: 1
          description: Repository key
        path:
          type: string
          minLength: 1
          description: Path to the artifact or folder
    ErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              status:
                type: integer
                description: HTTP status code
              message:
                type: string
                description: Error message
    StorageSummaryInfo:
      type: object
      properties:
        binariesSummary:
          $ref: '#/components/schemas/BinariesSummary'
        fileStoreSummary:
          $ref: '#/components/schemas/FileStoreSummary'
        repositoriesSummaryList:
          type: array
          items:
            $ref: '#/components/schemas/RepositorySummary'
    BinariesSummary:
      type: object
      properties:
        binariesCount:
          type: string
        binariesSize:
          type: string
        artifactsSize:
          type: string
        optimization:
          type: string
        itemsCount:
          type: string
        artifactsCount:
          type: string
    FileStoreSummary:
      type: object
      properties:
        storageType:
          type: string
        storageDirectory:
          type: string
        totalSpace:
          type: string
        usedSpace:
          type: string
        freeSpace:
          type: string
    RepositorySummary:
      type: object
      properties:
        repoKey:
          type: string
        repoType:
          type: string
        foldersCount:
          type: integer
        filesCount:
          type: integer
        usedSpace:
          type: string
        usedSpaceInBytes:
          type: integer
        itemsCount:
          type: integer
        packageType:
          type: string
        projectKey:
          type: string
        percentage:
          type: string
    BuildArtifactsRequest:
      type: object
      required:
      - buildName
      - buildNumber
      - archiveType
      properties:
        buildName:
          type: string
          minLength: 1
          description: The build name for search by
        buildNumber:
          type: string
          minLength: 1
          description: The build number to search by, can be LATEST to search for
            the latest build number
        buildStatus:
          type: string
          description: Optionally search by latest build status (e.g "Released")
        repos:
          type: array
          items:
            type: string
          description: Optionally refine search for specific repos, omit to search
            within all repositories
        archiveType:
          type: string
          enum:
          - tar
          - zip
          - tar.gz
          - tgz
          description: The archive file type to return
        mappings:
          type: array
          items:
            $ref: '#/components/schemas/ArchiveMapping'
          description: Optionally refine the search by providing a list of regexp
            patterns to search by
    ArchiveMapping:
      type: object
      properties:
        input:
          type: string
          description: Regexp pattern to search by
        output:
          type: string
          description: Optionally provide different path of the found artifacts inside
            the result archive, supports regexp groups tokens
    CopyOrMoveResult:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/CopyOrMoveMessage'
    CopyOrMoveMessage:
      type: object
      properties:
        level:
          type: string
          enum:
          - INFO
          - WARNING
          - ERROR
        message:
          type: string
    CreateSignedUrlRequest:
      type: object
      required:
      - repo_path
      properties:
        repo_path:
          type: string
          minLength: 1
          description: Full path to the artifact
        valid_for_secs:
          type: integer
          format: int32
          description: Number of seconds since generation before the URL expires
        expiry:
          type: integer
          format: int64
          description: An expiry date for the URL after which the URL will be invalid,
            expiry value is in Unix epoch time in milliseconds
    DistributeArtifactRequest:
      type: object
      required:
      - targetRepo
      - packagesRepoPaths
      properties:
        publish:
          type: boolean
          default: true
          description: If true, artifacts are published when deployed to Bintray.
            Default true.
        overrideExistingFiles:
          type: boolean
          default: false
          description: If true, Artifactory overwrites files already existing in the
            target path in Bintray. Existing version attributes are also overridden
            if defined in the distribution repository Advanced Configuration. Default
            false.
        gpgPassphrase:
          type: string
          description: If specified, Artifactory will GPG sign the version deployed
            to Bintray and apply the specified passphrase
        async:
          type: boolean
          default: false
          description: If true, the artifact will be distributed asynchronously. Errors
            and warnings may be viewed in the log file. Default false.
        targetRepo:
          type: string
          description: The Distribution Repository into which artifacts should be
            deployed
        packagesRepoPaths:
          type: array
          items:
            type: string
          description: An array of local or distribution repositories and corresponding
            paths to artifacts that should be deployed to the specified target repository
            in Bintray
        dryRun:
          type: boolean
          default: false
          description: If true, distribution is only simulated. No files are actually
            moved. Default false.
    BackgroundTasks:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/BackgroundTask'
    BackgroundTask:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        state:
          type: string
          enum:
          - scheduled
          - running
          - stopped
          - cancelled
        description:
          type: string
        nodeId:
          type: string
        started:
          type: string
          format: date-time
    RubyGemVersion:
      type: object
      properties:
        authors:
          type: string
        built_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        description:
          type: string
        downloads_count:
          type: integer
        metadata:
          type: object
          additionalProperties: true
        number:
          type: string
        summary:
          type: string
        platform:
          type: string
        ruby_version:
          type: string
        prerelease:
          type: boolean
        licenses:
          type: array
          items:
            type: string
        requirements:
          type: array
          items:
            type: string
        sha:
          type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token authentication
    basicAuth:
      type: http
      scheme: basic
      description: Basic authentication
security:
- bearerAuth: []
- basicAuth: []
