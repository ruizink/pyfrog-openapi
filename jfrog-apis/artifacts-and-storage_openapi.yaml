        in: path
        description: Repository key
        required: true
        schema:
          type: string
          minLength: 1
      - name: filePath
        in: path
        description: File path within the repository
        required: true
        schema:
          type: string
          minLength: 1
      - name: content
        in: query
        description: Content mode (none, progress, or omit for full content)
        required: false
