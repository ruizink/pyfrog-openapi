openapi: 3.1.0
info:
  title: JFrog Artifactory Repositories API
  description: REST API for managing repositories in JFrog Artifactory, including
    local, remote, virtual, and federated repositories, as well as metadata calculation
    for various package types and VCS repository operations.
  version: 1.0.0
  contact:
    name: JFrog Support
servers:
- url: https://{jfrog_url}/artifactory/api
  description: JFrog Platform
  variables:
    jfrog_url:
      default: myserver.jfrog.io
      description: Your JFrog Platform hostname (e.g., mycompany.jfrog.io)
tags:
- name: Repositories
  description: Repository management operations
- name: Puppet
  description: Puppet repository operations
- name: Metadata Calculation
  description: Repository metadata calculation operations
- name: VCS
  description: Version Control System repository operations
paths:
  /repositories/{repoKey}:
    put:
      tags:
      - Repositories
      summary: Create Repository
      description: Creates a new repository in Artifactory with the provided configuration.
        Supported by local, remote, virtual, and Federated repositories.
      operationId: createRepository
      parameters:
      - name: repoKey
        in: path
        required: true
        schema:
          type: string
        description: The repository key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Bad Request - Repository already exists or invalid configuration
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
    get:
      tags:
      - Repositories
      summary: Get Repository Configuration
      description: Returns the current configuration of a repository. Supported by
        local, remote, virtual, and Federated repositories.
      operationId: getRepositoryConfiguration
      parameters:
      - name: repoKey
        in: path
        required: true
        schema:
          type: string
        description: The repository key
      responses:
        '200':
          description: Success
          content:
            application/vnd.org.jfrog.artifactory.repositories.LocalRepositoryConfiguration+json:
              schema:
                type: object
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '404':
          description: Not Found - The specified resource was not found.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
    post:
      tags:
      - Repositories
      summary: Update Repository Configuration
      description: Updates an existing repository configuration in Artifactory with
        the provided configuration elements. Supported by local, remote, virtual,
        and Federated repositories.
      operationId: updateRepositoryConfiguration
      parameters:
      - name: repoKey
        in: path
        required: true
        schema:
          type: string
        description: The repository key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '404':
          description: Not Found - The specified resource was not found.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
    delete:
      tags:
      - Repositories
      summary: Delete Repository
      description: Removes a repository configuration together with the whole repository
        content. Supported by local, remote, virtual and federated repositories.
      operationId: deleteRepository
      parameters:
      - name: repoKey
        in: path
        required: true
        schema:
          type: string
        description: The repository key
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '404':
          description: Not Found - The specified resource was not found.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
  /v2/repositories/{repoKey}:
    get:
      tags:
      - Repositories
      summary: Get Repository Configuration (v2)
      description: Returns the current configuration of a repository, providing only
        those fields that are relevant to the package type. Supported by local, remote,
        virtual, and Federated repositories.
      operationId: getRepositoryConfigurationV2
      parameters:
      - name: repoKey
        in: path
        required: true
        schema:
          type: string
        description: The repository key
      responses:
        '200':
          description: Success
          content:
            application/vnd.org.jfrog.artifactory.repositories.LocalRepositoryConfiguration+json:
              schema:
                type: object
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '404':
          description: Not Found - The specified resource was not found.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
  /v2/repositories/batch:
    put:
      tags:
      - Repositories
      summary: Create Multiple Repositories
      description: Creates multiple repositories using a batch request. The batch
        request can contain a mix of different package types and repository types.
      operationId: createMultipleRepositories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                - key
      responses:
        '201':
          description: Repositories created successfully
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Bad Request - Batch limit exceeded, mandatory keys not configured,
            or repository key conflict
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
    get:
      tags:
      - Repositories
      summary: Get Batch of Repositories by Name
      description: Returns a batch of repositories defined by name. The default batch
        size is 100 items (configurable).
      operationId: getBatchOfRepositoriesByName
      parameters:
      - name: names
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
        description: The repository names to return
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
        '400':
          description: Bad Request - Repository keys are missing or repository item
            limit exceeded
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
    post:
      tags:
      - Repositories
      summary: Update Multiple Repositories
      description: Updates the configuration of multiple repositories using a batch
        request. The batch request can contain a mix of different package types and
        repository types.
      operationId: updateMultipleRepositories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                - key
      responses:
        '200':
          description: Repositories updated successfully
          content:
            application/json:
              schema:
                type: string
        '400':
          description: Bad Request - Batch limit exceeded or mandatory keys not configured
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '404':
          description: Not Found - No repositories found for the specified keys
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
  /repositories:
    get:
      tags:
      - Repositories
      summary: Get Repositories by Type and Project
      description: Returns a list of minimal repository details for all repositories
        of the specified type. Filter the results using type, packageType, and project
        parameters.
      operationId: getRepositoriesByTypeAndProject
      parameters:
      - name: type
        in: query
        schema:
          type: string
          enum:
          - local
          - remote
          - virtual
          - federated
          - distribution
        description: Repository type filter
      - name: packageType
        in: query
        schema:
          type: string
          enum:
          - bower
          - cargo
          - chef
          - cocoapods
          - composer
          - conan
          - cran
          - debian
          - docker
          - gems
          - gitlfs
          - go
          - gradle
          - helm
          - ivy
          - maven
          - nuget
          - opkg
          - p2
          - pub
          - puppet
          - pypi
          - rpm
          - sbt
          - swift
          - terraform
          - vagrant
          - yum
          - generic
        description: Package type filter
      - name: project
        in: query
        schema:
          type: string
        description: Project key filter
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    key:
                      type: string
                    type:
                      type: string
                    description:
                      type: string
                    url:
                      type: string
                      format: uri
                    packageType:
                      type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
  /repositories/existence:
    get:
      tags:
      - Repositories
      summary: Check If Repository Exists
      description: Checks if repositories exist that match the repository types and
        the project key specified in the query parameters.
      operationId: checkIfRepositoryExists
      parameters:
      - name: type
        in: query
        schema:
          type: array
          items:
            type: string
            enum:
            - local
            - remote
            - virtual
            - federated
            - releaseBundle
        description: The type of repository to search for. Can be specified multiple
          times.
      - name: projectKey
        in: query
        schema:
          type: string
        description: The key to the project in which you want to search
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  exists:
                    type: boolean
                  matchingRepoTypes:
                    type: array
                    items:
                      type: string
                  projectKey:
                    type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
  /repositories/configurations:
    get:
      tags:
      - Repositories
      summary: Get All Repository Configurations
      description: Returns a list of all repository configurations.
      operationId: getAllRepositoryConfigurations
      parameters:
      - name: packageType
        in: query
        schema:
          type: string
        description: Filters the response according to the defined package type. Separate
          multiple entries with commas.
      - name: repoType
        in: query
        schema:
          type: string
        description: Filters the response according to the defined repository type.
          Separate multiple entries with commas.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  LOCAL:
                    type: array
                    items:
                      type: object
                  REMOTE:
                    type: array
                    items:
                      type: object
                  VIRTUAL:
                    type: array
                    items:
                      type: object
                  FEDERATED:
                    type: array
                    items:
                      type: object
                  RELEASE_BUNDLE:
                    type: array
                    items:
                      type: object
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
  /repositories/{remoteRepoName}/configuration:
    get:
      tags:
      - Repositories
      summary: Remote Repository Configuration (Deprecated)
      description: Returns the shared configuration of a remote repository. This API
        is deprecated. Use the Get Repository Configuration API instead.
      operationId: getRemoteRepositoryConfiguration
      deprecated: true
      parameters:
      - name: remoteRepoName
        in: path
        required: true
        schema:
          type: string
        description: The remote repository name
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '404':
          description: Not Found - The specified resource was not found.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
  /puppet/{repoKey}/v3/modules:
    get:
      tags:
      - Puppet
      summary: Get Puppet Modules
      description: Returns a list of all Puppet modules hosted by the specified repository.
        Results are paginated.
      operationId: getPuppetModules
      parameters:
      - name: repoKey
        in: path
        required: true
        schema:
          type: string
        description: The repository key
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
                  current:
                    type: string
                  next:
                    type: string
                  previous:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
  /puppet/{repoKey}/v3/modules/{userModule}:
    get:
      tags:
      - Puppet
      summary: Get Puppet Module Info
      description: Returns information about a specific Puppet module.
      operationId: getPuppetModuleInfo
      parameters:
      - name: repoKey
        in: path
        required: true
        schema:
          type: string
        description: The repository key
      - name: userModule
        in: path
        required: true
        schema:
          type: string
        description: The user-module identifier (format {user}-{module})
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '404':
          description: Not Found - The specified resource was not found.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
  /puppet/{repoKey}/v3/releases:
    get:
      tags:
      - Puppet
      summary: Get Puppet Releases
      description: Returns a list of all Puppet releases hosted by the specified repository.
        Results are paginated.
      operationId: getPuppetReleases
      parameters:
      - name: repoKey
        in: path
        required: true
        schema:
          type: string
        description: The repository key
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
                  current:
                    type: string
                  next:
                    type: string
                  previous:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
  /puppet/{repoKey}/v3/releases/{userModuleVersion}:
    get:
      tags:
      - Puppet
      summary: Get Puppet Release Info
      description: Returns information about the specific Puppet module's release.
      operationId: getPuppetReleaseInfo
      parameters:
      - name: repoKey
        in: path
        required: true
        schema:
          type: string
        description: The repository key
      - name: userModuleVersion
        in: path
        required: true
        schema:
          type: string
        description: The user-module-version identifier (format {user}-{module}-{version})
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '404':
          description: Not Found - The specified resource was not found.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
  /alpine/{repoKey}/reindex:
    post:
      tags:
      - Metadata Calculation
      summary: Calculate Alpine Repository Metadata
      description: Calculates/recalculates the metadata index for this repository,
        based on the Alpine packages in it. Calculation is asynchronous. Supported
        by local repositories only.
      operationId: calculateAlpineRepositoryMetadata
      parameters:
      - name: repoKey
        in: path
        required: true
        schema:
          type: string
        description: The repository key
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
  /cocoapods/{repoKey}/reindex:
    post:
      tags:
      - Metadata Calculation
      summary: Calculate CocoaPods Index
      description: Calculates a CocoaPods index for the specified repository.
      operationId: calculateCocoaPodsIndex
      parameters:
      - name: repoKey
        in: path
        required: true
        schema:
          type: string
        description: The repository key
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
  /yum/{repoKey}:
    post:
      tags:
      - Metadata Calculation
      summary: Calculate YUM Repository Metadata
      description: For Local repositories calculates/recalculates the YUM metadata
        for this repository, based on the RPM package currently hosted in the repository.
        Supported by local, virtual, and Federated repositories. Calculation can be
        synchronous (the default) or asynchronous.
      operationId: calculateYumRepositoryMetadata
      parameters:
      - name: repoKey
        in: path
        required: true
        schema:
          type: string
        description: The repository key
      - name: path
        in: query
        schema:
          type: string
        description: Path to repodata dir (for virtual repositories)
      - name: async
        in: query
        schema:
          type: boolean
        description: Whether to run asynchronously
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
