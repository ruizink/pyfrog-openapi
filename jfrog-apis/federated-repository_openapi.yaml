  /federation/state:
    get:
      tags:
      - Legacy Federation Monitoring
      summary: Get Federation Sync State
      description: Returns the synchronization state of all Federated repositories
        in the JPD. This API is not supported by the standalone Artifactory Federation
        service that was released in version 7.104.2.
      operationId: getFederationSyncState
      deprecated: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    key:
                      type: string
                    status:
                      type: string
                      enum:
                      - SYNCING
                      - FULL_SYNC_RUNNING
                      - DISABLED
                      - OUT_OF_SYNC
                    members:
                      type: array
                      items:
                        type: object
                        properties:
                          remoteKey:
                            type: string
                          remoteUrl:
                            type: string
