                  type: object
                  properties:
                    localRepoKey:
                      type: string
                    remoteUrl:
                      type: string
                    remoteRepoKey:
                      type: string
                    lagInMS:
                      type: integer
                      format: int64
                    eventRegistrationTimeStamp:
