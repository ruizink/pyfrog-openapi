  /federation/binaries/failures/list:
    get:
      tags:
      - Binary Tasks
      summary: Get List of Failed Binary Tasks
      description: Returns a list of tasks that failed because Artifactory was not
        able to retrieve the binary of the task. The number of attempts that Artifactory
        tries to retrieve the binary of the task is set by maximum, which is 10 by
        default.
      operationId: getListOfFailedBinaryTasks
      parameters:
      - name: repoKey
        in: query
        required: true
        schema:
          type: string
        description: The name of the repository
      - name: limit
        in: query
        schema:
          type: integer
          default: 1000
        description: The number of tasks to be returned in the response
      - name: page
        in: query
        schema:
          type: integer
        description: The page number for a group of tasks, starting from 1
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    sha1:
                      type: string
                    repoKey:
                      type: string
                    creationTime:
                      type: integer
                      format: int64
                    failuresCount:
                      type: integer
        '400':
          description: Bad Request - repoKey parameter is required
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
  /federation/binaries/failures/replay:
    put:
      tags:
      - Binary Tasks
      summary: Replay Failed Binary Tasks
      description: This API marks binary tasks that previously failed to be processed
        again. This can be done for the entire repository or for a particular binary
        task in the repository.
      operationId: replayFailedBinaryTasks
      parameters:
      - name: repoKey
        in: query
        required: true
        schema:
          type: string
        description: The name of the repository
      - name: sha1
        in: query
        schema:
          type: string
        description: The SHA1 of the artifact. If not provided, all failed tasks for
          the repository will be replayed.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  replayTasks:
                    type: integer
        '400':
          description: Bad Request - repoKey parameter is required or invalid request
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '401':
          description: Bad Credentials - The provided authentication is invalid.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Permission Denied - The user does not have the necessary permissions
            to perform this action.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
