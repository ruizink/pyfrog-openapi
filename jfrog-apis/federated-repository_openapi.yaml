      - Legacy Federation Monitoring
      summary: Get Federation Mirror Lag Time
      description: Returns the elapsed time since the last event that was not handled
        on each Federation mirror for all repositories. This API is not supported
        by the standalone Artifactory Federation service that was released in version
        7.104.2.
      operationId: getFederationMirrorLagTime
      deprecated: true
      parameters:
