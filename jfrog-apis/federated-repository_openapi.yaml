    delete:
      tags:
      - Binary Tasks
      summary: Delete Failed Binary Tasks
      description: This API deletes binary tasks that previously failed. This can
        be done for the entire repository or for a particular binary task in the repository.
      operationId: deleteFailedBinaryTasks
      parameters:
      - name: repoKey
        in: query
        required: true
        schema:
          type: string
